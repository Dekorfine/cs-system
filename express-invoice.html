<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const ORDERS_URL = 'https://pyfmuknvjqfwcqvbrsvw.supabase.co';
const ORDERS_KEY = 'sb_publishable_dFjk1WN_Hc0Te6IhXZysZg_SXvKQU4C';
let _client = null;
const getClient = () => { if (_client) return _client; try { _client = window.supabase.createClient(ORDERS_URL, ORDERS_KEY); return _client; } catch { return null; } };

// 灯具类型 → 中英文 + HS(昌晖 178 行 100% 反推)
const LAMP_TYPES = [
  { re:/chandelier/, en:'Chandelier', cn:'枝形吊灯', hs:'9405100000' },
  { re:/wall\s*(lamp|light|sconce)|sconce/, en:'Wall Lamp', cn:'壁灯', hs:'9405100000' },
  { re:/pendant|hanging|suspend/, en:'Pendant Lamp', cn:'吊灯', hs:'9405100000' },
  { re:/table\s*(lamp|light)|desk\s*lamp/, en:'Table Lamp', cn:'台灯', hs:'9405409000' },
  { re:/floor\s*(lamp|light)/, en:'Floor Lamp', cn:'落地灯', hs:'9405200090' },
  { re:/ceiling|flush\s*mount/, en:'Ceiling Lamp', cn:'吸顶灯', hs:'9405100000' },
  { re:/bulb|accessor|spare|part|cable|cord|shade|bracket|adapter|driver/, en:'Accessories', cn:'配件', hs:'3917400000' },
];
// 🆕 fix91: 材质按标题关键词 — 有黄铜→Brass;否则 铁 + 玻璃/塑料/亚克力(看标题)
function detectMaterial(t){
  const brass=/brass|黄铜|纯铜|红铜|red copper|bronze/i.test(t);
  const glass=/glass|玻璃|crystal|水晶|murano/i.test(t);
  const acrylic=/acrylic|亚克力|perspex/i.test(t);
  const plastic=/plastic|塑料|resin|树脂/i.test(t);
  const sec=[]; if(glass)sec.push('Glass'); if(acrylic)sec.push('Acrylic'); if(plastic)sec.push('Plastic');
  const metal=brass?'Brass':'Iron';
  if(sec.length) return metal+' + '+sec.join(' + ');
  return brass?'Brass':'Iron + Glass';   // 无副材料默认:黄铜→Brass;否则铁+玻璃(可在票里手改)
}
// 🆕 fix91: HS 优先取订单数据里自带的 HS 字段(产品简单,直接拉),没有再按灯具类型兜底
function getItemHs(item){
  for(const k of ['hs_code','hs','hsCode','harmonized_code','harmonized_system_code','customs_hs','tariff_code','hts_code']){
    const v=item&&item[k]; if(v){ const d=String(v).replace(/\D/g,''); if(d.length>=6) return d; }
  }
  return null;
}
function getLampInfo(item) {
  const t = ((item.title||'')+' '+(item.variant_title||'')).toLowerCase();
  const f = LAMP_TYPES.find(l => l.re.test(t)) || LAMP_TYPES[1];
  const material = detectMaterial(t);
  const hs = getItemHs(item) || f.hs;   // 有库里的 HS 就用库里的,否则按灯具类型
  return { en:f.en, cn:f.cn, hs, material };
}
const DECLARE = { unitPriceEach:500, usage:'illuminating' };
const CHANNELS = ['美森加班海运小包','美森普通海运小包'];

// 店铺字段探测 + 规范名映射(跟单已确认:店铺字段=shop_domain,方案A加 store_label/store_code)
// 双保险:① Martin 跑 SQL 后读 store_label(规范名)② 没跑也能用 shop_domain + 下方映射转规范名
const STORE_LABEL_FIELDS = ['store_label','store_code','store_canonical'];  // 优先读规范字段
const STORE_NAME_MAP = {
  // 原始 shop_domain(去 .myshopify.com 后缀, 小写) → 规范名(跟单确认)
  'vakkerlighting': 'vakkerlight',
  'dekorfine':      'dekorfine',
  'docolight':      'Docos',
  'vkfrench':       'Pinlighting',
  'vakkerge':       'Radium',
  'vkwholesale':    'Mooiehome',
  'docolamp':       'Lumioshine',
  'decormote':      'Rayonshine',
  'janedecor':      'Mooijane',
  'mooijane':       'Mooijane',
  'mooielight.com': 'Mooielight',
};
const STORE_FIELDS = ['shop_domain','store_name','store','shop_name','shop','site_name','site'];
function detectStoreField(row){ if(!row) return null; for(const f of STORE_LABEL_FIELDS){ if(row[f]) return f; } for(const f of STORE_FIELDS){ if(row[f]) return f; } return null; }
const SHOP_PREFIX_MAP = { VK:'vakkerlight', RD:'Radium', ML:'Mooielight', MO:'Mooielight', MJ:'Mooijane', JD:'Mooijane', DC:'Docos', DF:'dekorfine', LS:'Lumioshine', RS:'Rayonshine', MH:'Mooiehome', PL:'Pinlighting' };
function normalizeStore(raw){ if(!raw) return '未知'; const v=String(raw).replace(/\.myshopify\.com$/,''); return STORE_NAME_MAP[v.toLowerCase()] || v; }
function storeFromOrder(o, field) {
  if (field && o[field]) return normalizeStore(o[field]);
  const oid = o.shopify_order_id||''; if(/^woo-/.test(oid)){const p=oid.split('-'); if(p[1]) return normalizeStore(p[1]);}
  const m = (o.shopify_order_number||'').match(/^([A-Za-z]+)/);
  if(m){const pre=m[1].toUpperCase(); return SHOP_PREFIX_MAP[pre]||pre;}
  return '未知';
}
function parseOrder(o, field) {
  let addr=o.shipping_address; if(typeof addr==='string'){try{addr=JSON.parse(addr);}catch{addr={};}}
  let items=o.line_items; if(typeof items==='string'){try{items=JSON.parse(items);}catch{items=[];}}
  items=(items||[]).map((it,i)=>{ const lt=getLampInfo(it); return { lineId:o.shopify_order_id+'_'+i, title:it.title||'', sku:it.sku||'', quantity:it.quantity||1, image_url:it.image_url||'', lampEn:lt.en, lampCn:lt.cn, hs:lt.hs, material:lt.material, spec:it.variant_title||'' }; });
  // 🆕 fix87/89: 客户备注 — 显式字段 + 兜底扫描任意含 note/备注 的列 + 原始订单 JSON 里的 note + note_attributes
  let na=o.note_attributes; if(typeof na==='string'){try{na=JSON.parse(na);}catch{na=null;}}
  const naStr=Array.isArray(na)?na.map(x=>`${x.name||x.key||''}: ${x.value||x.v||''}`).filter(s=>/[^\s:]/.test(s.replace(/^[^:]*:/,''))).join(' · '):'';
  let noteMain=String(o.note||o.order_note||o.customer_note||o.notes||'').trim();
  if(!noteMain){ // 兜底1:任意列名含 note/remark/comment/备注/留言 的字符串字段(排除 attributes)
    for(const k in o){ if(/attribute/i.test(k)) continue; if(/note|remark|comment|备注|留言/i.test(k)){ const v=o[k]; if(typeof v==='string'&&v.trim()){ noteMain=v.trim(); break; } } }
  }
  if(!noteMain){ // 兜底2:原始订单 JSON 列里的 note
    for(const k in o){ let v=o[k]; if(typeof v==='string'&&/^\s*\{/.test(v)){try{v=JSON.parse(v);}catch{v=null;}} if(v&&typeof v==='object'&&typeof v.note==='string'&&v.note.trim()){ noteMain=v.note.trim(); break; } }
  }
  const note=[noteMain, naStr].filter(Boolean).join(' · ');
  return { orderId:o.shopify_order_id, orderNumber:o.shopify_order_number||o.shopify_order_id, platform:o.platform, store:storeFromOrder(o,field), customerName:o.customer_name, customerEmail:o.customer_email, customerPhone:o.customer_phone, address:addr||{}, items, note, createdAt:o.shopify_created_at };
}

// 昌晖 73 列
const CH_BASE=['客户订单号（必填）','渠道必填）','目的国家（必填）','外包装件数（必填）','重量（必填）','收件人公司名','收件人姓名（必填）','收件人省州（必填）','收件人城市（必填）','收件人邮编（必填）','收件人地址（必填）','收件人门牌号','收件人电话（必填）','收件人传真','收件人邮箱','收件人证件类型'];
function chProd(){const a=[];for(let i=1;i<=5;i++){a.push(`英文申报品名${i}${i===1?'（必填）':''}`,`中文申报品名${i}${i===1?'（必填）':''}`,`申报单价${i}${i===1?'（必填）':''}`,`申报数量${i}${i===1?'（必填）':''}`,`销售地址${i}`,`海关货物编号${i}${i===1?'（必填）':''}`,`配货备注${i}`,`SKU${i}`,`材质${i}${i===1?'（必填）':''}`);if(i===1)a.push('个数');a.push(`规格型号${i}${i===1?'（必填）':''}`,`用途${i}${i===1?'（必填）':''}`);}return a;}
const CH_HEADERS=[...CH_BASE,...chProd(),'运单备注'];
function buildChanghuiRow(t){
  const a=t.address||{}; const row=new Array(CH_HEADERS.length).fill('');
  const totalQty=t.items.reduce((s,it)=>s+(parseInt(it.quantity)||1),0);  // 🆕 fix88: 个数 = 整单数量总和
  row[0]=t.orderNumber||t.carrierRef; row[1]=t.channel||''; row[2]=a.country_code||a.country||'US';  // 🆕 fix89: 客户订单号以我们的订单号(MH4490)为准
  row[3]=t.packageCount||''; row[4]=t.weight||'';
  row[6]=a.name||t.customerName||''; row[7]=a.province||''; row[8]=a.city||'';
  row[9]={v:a.zip||'',t:'s'}; row[10]=[a.address1,a.address2].filter(Boolean).join(' ');
  row[12]=a.phone||t.customerPhone||''; row[14]=t.customerEmail||'';
  t.items.slice(0,5).forEach((it,bi)=>{ const first=bi===0; const start=16+(first?0:12+(bi-1)*11); let c=start; const qty=parseInt(it.quantity)||1;
    row[c++]=it.lampEn; row[c++]=it.lampCn; row[c++]=DECLARE.unitPriceEach*qty; row[c++]=qty; row[c++]=''; row[c++]=it.hs||'9405100000'; row[c++]=''; row[c++]=''; row[c++]=it.material||'Plastic + metal'; if(first)row[c++]=totalQty; row[c++]=''; row[c++]=DECLARE.usage; });
  // 🆕 fix88: 北简对单用「客户参考号」作客户订单号时,把我们的订单号(MH4490)写进运单备注
  // 🆕 fix89: MH4490 已在客户订单号[0],运单备注只放北简备注(如超长/超重)
  row[row.length-1]=t.prepNote||'';
  return row;
}
const COURIERS={ changhui:{name:'昌晖',headers:CH_HEADERS,build:buildChanghuiRow} };
const PAGE_SIZE=24;

function MakeInvoice(){
  const [courier,setCourier]=useState('changhui');
  const [dateStr,setDateStr]=useState(new Date().toISOString().slice(0,10));
  const [search,setSearch]=useState('');
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(false);
  const [conn,setConn]=useState('loading');
  const [err,setErr]=useState('');
  const [tickets,setTickets]=useState([]);
  const [importing,setImporting]=useState(false);          // 🆕 fix86: 批量建票中
  const [importReport,setImportReport]=useState(null);     // 🆕 fix86: {total,matched,unmatched[]}
  const importRef=useRef(null);                            // 🆕 fix86
  const [lightboxImg,setLightboxImg]=useState(null);       // 🆕 fix90: 点缩略图看大图
  const [storeField,setStoreField]=useState(null);
  const [stores,setStores]=useState([]);      // [{name,count}] 全部店铺
  const [activeStore,setActiveStore]=useState('all');
  const [page,setPage]=useState(1);
  const [showPreview,setShowPreview]=useState(false);  // 🆕 导出前预览全部
  const [selectedOrders,setSelectedOrders]=useState(new Set());  // 🆕 fix72: 订单批量多选
  const [batchChannel,setBatchChannel]=useState('');             // 🆕 批量统一渠道

  const handleErr=(e)=>{ setConn('fail'); const m=e.message||String(e);
    if(/permission|RLS|policy|JWT|401|Bad cred/i.test(m)) setErr('读取订单被拒(RLS 权限)— 让 Martin 跑 cs-readonly-orders.sql 给客服 anon 开只读。原始:'+m);
    else setErr('加载失败:'+m); };

  // 扫描全部店铺(只拉店铺一列,轻量)
  const scanStores=async(field)=>{
    const c=getClient(); if(!c||!field) return;
    try{
      const {data,error}=await c.from('shopify_orders').select(field).limit(5000);
      if(error) throw error;
      const cnt={}; (data||[]).forEach(r=>{ const s=normalizeStore(r[field]); cnt[s]=(cnt[s]||0)+1; });
      setStores(Object.entries(cnt).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count));
    }catch(e){ /* 扫描失败不阻塞,用已加载订单提取 */ }
  };

  // 初次:加载最近 + 探测字段 + 扫描店铺
  const loadRecent=async()=>{
    const c=getClient(); if(!c){setConn('fail');setErr('Supabase 初始化失败');return;}
    setLoading(true); setErr(''); setActiveStore('all'); setPage(1);
    try{
      const {data,error}=await c.from('shopify_orders').select('*').order('shopify_created_at',{ascending:false}).limit(120);
      if(error) throw error;
      setConn('ok');
      const field=detectStoreField((data||[])[0]); setStoreField(field);
      setOrders((data||[]).map(o=>parseOrder(o,field)));
      if(field) scanStores(field);
    }catch(e){ handleErr(e); }
    setLoading(false);
  };
  useEffect(()=>{ loadRecent(); },[]);

  // 点店铺 → 服务端按店铺查
  const loadByStore=async(store)=>{
    setActiveStore(store); setPage(1);
    if(store==='all'){ loadRecent(); return; }
    const c=getClient(); if(!c||!storeField) {
      // 没探测到字段 → 客户端过滤已加载
      return;
    }
    setLoading(true); setErr('');
    try{
      const {data,error}=await c.from('shopify_orders').select('*').eq(storeField,store).order('shopify_created_at',{ascending:false}).limit(300);
      if(error) throw error;
      setOrders((data||[]).map(o=>parseOrder(o,storeField)));
    }catch(e){ handleErr(e); }
    setLoading(false);
  };

  const doSearch=async()=>{
    const raw=search.trim(); const c=getClient(); if(!c){setConn('fail');return;}
    setLoading(true); setErr(''); setActiveStore('all'); setPage(1);
    try{
      let q=c.from('shopify_orders').select('*');
      if(raw){
        const nums=raw.split(/[\s,;，；\n\r]+/).map(s=>s.trim()).filter(Boolean);
        if(nums.length>1) q=q.or(nums.map(n=>`shopify_order_number.eq.${n},shopify_order_id.eq.${n}`).join(','));
        else { const k=nums[0]; q=q.or(`shopify_order_number.ilike.%${k}%,shopify_order_id.ilike.%${k}%,customer_name.ilike.%${k}%,customer_email.ilike.%${k}%`).limit(120); }
      } else q=q.order('shopify_created_at',{ascending:false}).limit(120);
      const {data,error}=await q; if(error) throw error;
      setConn('ok'); const field=storeField||detectStoreField((data||[])[0]);
      setOrders((data||[]).map(o=>parseOrder(o,field)));
      if(raw && (data||[]).length===0) setErr('未找到匹配订单(可搜订单号/客户名/邮箱)');
    }catch(e){ handleErr(e); }
    setLoading(false);
  };

  // 店铺列表:优先扫描结果,否则从已加载提取
  const storeList=useMemo(()=>{
    if(stores.length) return stores;
    const cnt={}; orders.forEach(o=>{cnt[o.store]=(cnt[o.store]||0)+1;});
    return Object.entries(cnt).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  },[stores,orders]);

  // 当前展示订单(若 activeStore 且服务端没按店铺查到,客户端兜底过滤)
  const filtered=useMemo(()=> activeStore==='all'?orders:orders.filter(o=>o.store===activeStore),[orders,activeStore]);
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  const pageOrders=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);

  const assignedLineIds=useMemo(()=>{const s=new Set();tickets.forEach(t=>t.items.forEach(it=>s.add(it.lineId)));return s;},[tickets]);
  const makeTicket=(order,items)=>({ id:'tk_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), sourceOrderId:order.orderId, orderNumber:order.orderNumber, carrierRef:'', platform:order.platform, store:order.store, customerName:order.customerName, customerEmail:order.customerEmail, customerPhone:order.customerPhone, address:order.address, note:order.note||'', items, channel:'', weight:'', packageCount:1, prepNote:'' });
  const addWhole=(o)=>setTickets(p=>[...p,makeTicket(o,o.items.map(it=>({...it})))]);
  const addPartial=(o,ids)=>{const items=o.items.filter(it=>ids.has(it.lineId)).map(it=>({...it}));if(items.length)setTickets(p=>[...p,makeTicket(o,items)]);};
  // 🆕 fix72: 订单批量多选
  const toggleSelect=(id)=>setSelectedOrders(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});
  const selectAllPage=()=>setSelectedOrders(p=>{const s=new Set(p);const allSel=pageOrders.every(o=>s.has(o.orderId));pageOrders.forEach(o=>allSel?s.delete(o.orderId):s.add(o.orderId));return s;});
  const batchAdd=()=>{
    const toAdd=filtered.filter(o=>selectedOrders.has(o.orderId)&&!o.items.every(it=>assignedLineIds.has(it.lineId)));
    if(!toAdd.length){alert('请先勾选订单');return;}
    setTickets(p=>[...p,...toAdd.map(o=>makeTicket(o,o.items.map(it=>({...it}))))]);
    setSelectedOrders(new Set());
  };
  // 🆕 批量统一渠道(应用到所有票)
  const applyBatchChannel=()=>{ if(!batchChannel){alert('先选渠道');return;} setTickets(p=>p.map(t=>({...t,channel:batchChannel}))); };
  const upTicket=(id,patch)=>setTickets(p=>p.map(t=>t.id===id?{...t,...patch}:t));
  const upItem=(id,idx,patch)=>setTickets(p=>p.map(t=>t.id!==id?t:{...t,items:t.items.map((it,i)=>i===idx?{...it,...patch}:it)}));
  const rmTicket=(id)=>setTickets(p=>p.filter(t=>t.id!==id));

  const validate=(t)=>{const m=[];if(!t.channel)m.push('渠道');if(!t.weight)m.push('重量');if(!t.packageCount)m.push('件数');const a=t.address||{};if(!(a.name||t.customerName))m.push('收件人');if(!a.zip)m.push('邮编');if(!a.address1)m.push('地址');return m;};
  const allValid=tickets.length>0&&tickets.every(t=>validate(t).length===0);
  const exportExcel=()=>{const tpl=COURIERS[courier];const ws=XLSX.utils.aoa_to_sheet([tpl.headers,...tickets.map(tpl.build)]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Sheet1');XLSX.writeFile(wb,`${tpl.name}发票_${dateStr}_${tickets.length}票.xlsx`);};

  // 🆕 fix86/88: 批量查库(分批 .or;map 同时按 订单号 + order_id 建索引)
  const bulkFetchByKeys=async(keys)=>{
    const c=getClient(); if(!c) throw new Error('订单库未连接');
    const map={}; let field=storeField; const CH=20;
    const uniq=[...new Set(keys.filter(Boolean).map(k=>String(k).trim()))];
    for(let i=0;i<uniq.length;i+=CH){
      const chunk=uniq.slice(i,i+CH);
      const orExpr=chunk.map(n=>`shopify_order_number.eq.${n},shopify_order_id.eq.${n}`).join(',');
      const {data,error}=await c.from('shopify_orders').select('*').or(orExpr).limit(chunk.length*4);
      if(error) throw error;
      if(!field && (data||[]).length) field=detectStoreField(data[0]);
      (data||[]).forEach(o=>{ const p=parseOrder(o,field);
        const k1=String(o.shopify_order_number||'').trim(), k2=String(o.shopify_order_id||'').trim();
        if(k1) map[k1]=p; if(k2) map[k2]=p; });
    }
    if(field && !storeField) setStoreField(field);
    return map;
  };
  // 🆕 fix86/88: 上传北简表 → 按「订单编号」(或客户参考号)查库自动建票
  //   昌晖客户订单号[0] = 客户参考号(XM8T,对单用);我们的订单号(MH4490)写进运单备注
  //   渠道/件数/重量/备注 取自北简表;地址/品名/申报 取自跟单库
  const importOrderSheet=async(file)=>{
    setImporting(true); setErr(''); setImportReport(null);
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
      if(!aoa.length) throw new Error('表格是空的');
      const header=(aoa[0]||[]).map(h=>String(h||'').trim());
      const find=(...res)=>{ for(const re of res){ const i=header.findIndex(h=>re.test(h)); if(i>=0) return i; } return -1; };
      let orderCol=find(/订单编号/, /订单号/, /^订单$/, /\border\b/i);   // 我们手填 MH4490
      const refCol=find(/客户参考号/, /参考号/, /reference/i);          // 北简 XM8T
      const channelCol=find(/收货渠道/, /渠道/, /channel/i);
      const weightCol=find(/收货结算重/, /结算重/, /重量/, /weight/i);   // 结算重优先
      const piecesCol=find(/总件数/, /件数/, /箱数/, /pieces/i);        // 总件数优先
      const noteCol=find(/^备注$/, /备注/, /remark/i);
      let startRow=1;
      if(orderCol<0 && refCol<0){ orderCol=0; startRow=0; }            // 没表头 → 首列当订单号
      const get=(r,i)=> i>=0 ? String(r[i]==null?'':r[i]).trim() : '';
      const seen=new Set(); const inputs=[];
      for(let i=startRow;i<aoa.length;i++){
        const r=aoa[i]||[]; const on=get(r,orderCol), ref=get(r,refCol);
        const key=on||ref; if(!key||seen.has(key)) continue; seen.add(key);
        inputs.push({ orderNumber:on, carrierRef:ref, channel:get(r,channelCol), weight:get(r,weightCol), pieces:get(r,piecesCol), note:get(r,noteCol) });
      }
      if(!inputs.length) throw new Error('没读到订单号 — 请确认表里有「订单编号」或「客户参考号」列');
      const allKeys=[]; inputs.forEach(x=>{ if(x.orderNumber)allKeys.push(x.orderNumber); if(x.carrierRef)allKeys.push(x.carrierRef); });
      const map=await bulkFetchByKeys(allKeys);
      const newTickets=[]; const unmatched=[];
      inputs.forEach(inp=>{
        const o=map[inp.orderNumber]||map[inp.carrierRef];
        if(!o){ unmatched.push(inp.orderNumber||inp.carrierRef); return; }
        const t=makeTicket(o,o.items.map(it=>({...it})));
        t.carrierRef=inp.carrierRef||'';
        if(inp.channel) t.channel=inp.channel;
        if(inp.weight)  t.weight=inp.weight;
        if(inp.pieces)  t.packageCount=inp.pieces;
        if(inp.note)    t.prepNote=inp.note;
        newTickets.push(t);
      });
      setTickets(prev=>[...prev,...newTickets]);
      setImportReport({ total:inputs.length, matched:newTickets.length, unmatched });
      setConn('ok');
    }catch(e){ setErr('导入失败:'+(e.message||e)); }
    setImporting(false);
  };

  return (
    <>
      {/* 工具栏 */}
      <div className="card">
        <div style={{display:'flex',gap:14,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div><span className="lbl">快递公司</span>
            <select className="inp" style={{width:130}} value={courier} onChange={e=>setCourier(e.target.value)}>
              {Object.entries(COURIERS).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
            </select></div>
          <div><span className="lbl">日期</span><input type="date" className="inp" style={{width:150}} value={dateStr} onChange={e=>setDateStr(e.target.value)}/></div>
          <div style={{flex:1,minWidth:240}}><span className="lbl">搜索 · 订单号 / 客户名 / 邮箱(留空=最近订单)</span>
            <div style={{display:'flex',gap:8}}>
              <input className="inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="XM8T31234602 / Karen / xxx@gmail.com" onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
              <button className="btn-pri btn" onClick={doSearch} disabled={loading} style={{whiteSpace:'nowrap'}}>{loading?'⏳':'🔍 搜索'}</button>
            </div></div>
          <div>
            {conn==='ok'&&<span className="dot" style={{background:'#dcfce7',color:'#15803d'}}>● 订单库已连接</span>}
            {conn==='fail'&&<span className="dot" style={{background:'#fee2e2',color:'#b91c1c'}}>● 连接失败</span>}
            {conn==='loading'&&<span className="dot" style={{background:'#f0f0f2',color:'#86868b'}}>● 连接中…</span>}
          </div>
        </div>
        {err&&<div style={{marginTop:12,padding:'11px 14px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,fontSize:12,color:'#92400e',lineHeight:1.6}}>⚠ {err}</div>}
      </div>

      {/* 🆕 fix86: 批量建票 · 上传订单表 */}
      <div className="card" style={{border:'1.5px dashed #0071e3',background:'#f5faff'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <strong style={{fontSize:15}}>📤 批量建票 · 上传订单表</strong>
          <span className="muted" style={{flex:1,minWidth:220}}>上传北简表(已手填「订单编号」如 MH4490)→ 按订单号查库自动建票:地址 / 品名 / 申报全自动;渠道 / 总件数 / 收货结算重 / 备注 取自北简表。昌晖「客户订单号」= 我们的订单号(MH4490)。</span>
          <button className="btn-pri btn" onClick={()=>importRef.current?.click()} disabled={importing} style={{whiteSpace:'nowrap'}}>{importing?'⏳ 建票中…':'📂 选择订单表'}</button>
          <input ref={importRef} type="file" accept=".xls,.xlsx,.csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])importOrderSheet(e.target.files[0]);e.target.value='';}}/>
        </div>
        {importReport&&(
          <div style={{marginTop:10,fontSize:12,lineHeight:1.7}}>
            <span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ 建票 {importReport.matched}</span>{' '}
            <span className="pill" style={{background:importReport.unmatched.length?'#fee2e2':'#f0f0f2',color:importReport.unmatched.length?'#b91c1c':'#86868b'}}>✗ 未找到 {importReport.unmatched.length}</span>
            {importReport.unmatched.length>0&&<div className="muted" style={{marginTop:6,color:'#b91c1c'}}>未在订单库找到(请核对订单号):{importReport.unmatched.join('、')}</div>}
            <div className="muted" style={{marginTop:6}}>✅ 已加入下方发票篮 — 补齐缺项(渠道/重量/件数)后一键导出整张表。</div>
          </div>
        )}
      </div>

      {/* 发票篮 */}
      {tickets.length>0&&(
        <div className="card" style={{border:'2px solid #34c759',background:'linear-gradient(180deg,#f0fdf4,#ffffff)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
            <strong style={{fontSize:16}}>🧾 待导出发票篮</strong>
            <span className="pill" style={{background:'#34c759',color:'white'}}>{tickets.length} 票</span>
            {allValid?<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ 必填齐全</span>:<span className="pill" style={{background:'#fee2e2',color:'#b91c1c'}}>⚠ 有必填未填</span>}
            <div style={{flex:1}}/>
            {/* 🆕 fix72: 批量统一渠道 */}
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              <span className="muted" style={{whiteSpace:'nowrap'}}>批量渠道:</span>
              <select className="inp" style={{width:150,padding:'5px 8px'}} value={batchChannel} onChange={e=>setBatchChannel(e.target.value)}>
                <option value="">— 选 —</option>{CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <button className="btn btn-sm" onClick={applyBatchChannel} title="应用到全部票">应用全部</button>
            </div>
            <button className="btn btn-sm" onClick={()=>setTickets([])}>清空</button>
            <button className="btn" onClick={()=>setShowPreview(true)}>👁 预览全部</button>
            <button className="btn-good btn" onClick={exportExcel} disabled={!allValid}>📤 导出 {COURIERS[courier].name} Excel</button>
          </div>
          {tickets.map(t=>{const miss=validate(t);const a=t.address||{};const same=tickets.filter(x=>x.sourceOrderId===t.sourceOrderId);const idx=same.indexOf(t)+1;
            return(
              <div key={t.id} style={{border:'1px solid #e0e0e3',borderRadius:12,padding:12,marginBottom:10,background:miss.length?'#fffdf8':'white'}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:7}}>
                  <strong style={{fontSize:13}}>🧾 {t.orderNumber}</strong>
                  {same.length>1&&<span className="pill" style={{background:'#fef9c3',color:'#854d0e'}}>第 {idx}/{same.length} 票</span>}
                  <span className="pill" style={{background:'#e0f2fe',color:'#075985'}}>🏪 {t.store}</span>
                  <span className="muted">{a.name||t.customerName} · {a.city} {a.province} {a.zip}</span>
                  {miss.length>0&&<span className="pill" style={{background:'#fee2e2',color:'#b91c1c'}}>缺:{miss.join('/')}</span>}
                  <div style={{flex:1}}/><button className="btn btn-sm" onClick={()=>rmTicket(t.id)}>移除</button>
                </div>
                {t.note&&<div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:9,padding:'8px 11px',marginBottom:8,fontSize:12,lineHeight:1.6,color:'#92400e',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>📝 客户备注(留意改地址):{t.note}</div>}
                <div style={{background:'#f8fafc',borderRadius:9,padding:'9px 11px',marginBottom:8}}>
                  <div className="muted" style={{fontSize:11,marginBottom:6,fontWeight:600}}>📍 收件地址(客户改过地址可在此手动修正)</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <div style={{flex:'1 1 140px'}}><span className="lbl">收件人 *</span><input className="inp" value={a.name||t.customerName||''} onChange={e=>upTicket(t.id,{address:{...a,name:e.target.value}})}/></div>
                    <div style={{flex:'2 1 220px'}}><span className="lbl">街道地址 *</span><input className="inp" value={a.address1||''} onChange={e=>upTicket(t.id,{address:{...a,address1:e.target.value}})}/></div>
                    <div style={{flex:'1 1 120px'}}><span className="lbl">门牌/单元(address2)</span><input className="inp" value={a.address2||''} onChange={e=>upTicket(t.id,{address:{...a,address2:e.target.value}})}/></div>
                    <div style={{flex:'1 1 110px'}}><span className="lbl">城市 *</span><input className="inp" value={a.city||''} onChange={e=>upTicket(t.id,{address:{...a,city:e.target.value}})}/></div>
                    <div style={{flex:'0 1 70px'}}><span className="lbl">州</span><input className="inp" value={a.province||''} onChange={e=>upTicket(t.id,{address:{...a,province:e.target.value}})}/></div>
                    <div style={{flex:'0 1 100px'}}><span className="lbl">邮编 *</span><input className="inp" style={{borderColor:a.zip?'#d8d8dc':'#fca5a5'}} value={a.zip||''} onChange={e=>upTicket(t.id,{address:{...a,zip:e.target.value}})}/></div>
                    <div style={{flex:'0 1 70px'}}><span className="lbl">国家</span><input className="inp" value={a.country_code||a.country||'US'} onChange={e=>upTicket(t.id,{address:{...a,country_code:e.target.value}})}/></div>
                    <div style={{flex:'1 1 130px'}}><span className="lbl">电话</span><input className="inp" value={a.phone||t.customerPhone||''} onChange={e=>upTicket(t.id,{address:{...a,phone:e.target.value}})}/></div>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                  <div><span className="lbl">渠道 *</span><select className="inp" style={{width:160,borderColor:t.channel?'#d8d8dc':'#fca5a5'}} value={t.channel} onChange={e=>upTicket(t.id,{channel:e.target.value})}><option value="">— 选 —</option>{CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}{t.channel&&!CHANNELS.includes(t.channel)&&<option value={t.channel}>{t.channel}</option>}</select></div>
                  <div><span className="lbl">重量 kg *</span><input className="inp" style={{width:90,borderColor:t.weight?'#d8d8dc':'#fca5a5'}} type="number" step="0.001" value={t.weight} onChange={e=>upTicket(t.id,{weight:e.target.value})}/></div>
                  <div><span className="lbl">件数 *</span><input className="inp" style={{width:68}} type="number" value={t.packageCount} onChange={e=>upTicket(t.id,{packageCount:e.target.value})}/></div>
                  <div style={{flex:1,minWidth:150}}><span className="lbl">运单备注</span><input className="inp" value={t.prepNote} onChange={e=>upTicket(t.id,{prepNote:e.target.value})} placeholder="实重复测/改加班船…"/></div>
                </div>
                <div className="scroll-x">
                  <table><thead><tr><th>英文</th><th>中文</th><th>HS编码</th><th>数量</th><th>材质</th></tr></thead>
                  <tbody>{t.items.map((it,ii)=>(<tr key={ii}>
                    <td><input value={it.lampEn} onChange={e=>upItem(t.id,ii,{lampEn:e.target.value})}/></td>
                    <td><input value={it.lampCn} onChange={e=>upItem(t.id,ii,{lampCn:e.target.value})} style={{minWidth:55}}/></td>
                    <td><input value={it.hs} onChange={e=>upItem(t.id,ii,{hs:e.target.value})} style={{minWidth:90}}/></td>
                    <td><input type="number" value={it.quantity} onChange={e=>upItem(t.id,ii,{quantity:e.target.value})} style={{minWidth:45}}/></td>
                    <td><input value={it.material} onChange={e=>upItem(t.id,ii,{material:e.target.value})} style={{minWidth:90}}/></td>
                  </tr>))}</tbody></table>
                </div>
                <div className="muted" style={{fontSize:11,marginTop:5}}>💰 申报单价 = 500 × 数量(导出时算)· 用途 illuminating</div>
                {t.items.length>5&&<div style={{fontSize:11,color:'#b91c1c',marginTop:4}}>⚠ 超 5 个产品,昌晖每票最多 5 个,请拆票</div>}
              </div>
            );})}
        </div>
      )}

      {/* 订单列表 */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
          <strong style={{fontSize:16}}>📦 订单列表</strong>
          <span className="muted">{filtered.length} 单{activeStore!=='all'?` · ${activeStore}`:''}</span>
          <div style={{flex:1}}/>
          <button className="btn btn-sm" onClick={selectAllPage}>{pageOrders.length>0&&pageOrders.every(o=>selectedOrders.has(o.orderId))?'☑ 取消本页':'☐ 全选本页'}</button>
          {selectedOrders.size>0&&<button className="btn-pri btn btn-sm" onClick={batchAdd}>➕ 批量加入 {selectedOrders.size} 单</button>}
          {selectedOrders.size>0&&<button className="btn btn-sm" onClick={()=>setSelectedOrders(new Set())}>清除选择</button>}
          <button className="btn btn-sm" onClick={loadRecent}>🔄 刷新(取跟单最新)</button>
        </div>
        {/* 店铺筛选 */}
        {storeList.length>0&&(
          <div style={{display:'flex',gap:7,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
            <span className="muted" style={{whiteSpace:'nowrap'}}>🏪 店铺:</span>
            <button className={`chip ${activeStore==='all'?'on':''}`} onClick={()=>loadByStore('all')}>全部</button>
            {storeList.map(s=>(<button key={s.name} className={`chip ${activeStore===s.name?'on':''}`} onClick={()=>loadByStore(s.name)}>{s.name} <span style={{opacity:.7}}>{s.count}</span></button>))}
          </div>
        )}
        {loading&&<div style={{padding:36,textAlign:'center',color:'#86868b'}}>⏳ 加载中…</div>}
        {!loading&&filtered.length===0&&<div style={{padding:36,textAlign:'center',color:'#86868b'}}>{conn==='fail'?'连不上订单库,见上方提示':'暂无订单'}</div>}
        {!loading&&pageOrders.map(o=><OrderCard key={o.orderId} order={o} assignedLineIds={assignedLineIds} selected={selectedOrders.has(o.orderId)} onToggleSelect={()=>toggleSelect(o.orderId)} onWhole={()=>addWhole(o)} onPartial={ids=>addPartial(o,ids)} onPreview={setLightboxImg}/>)}
        {totalPages>1&&(
          <div className="pager">
            <button className="btn btn-sm" disabled={page<=1} onClick={()=>setPage(1)}>« 首页</button>
            <button className="btn btn-sm" disabled={page<=1} onClick={()=>setPage(page-1)}>‹ 上页</button>
            <span className="muted" style={{padding:'0 8px'}}>第 {page} / {totalPages} 页</span>
            <button className="btn btn-sm" disabled={page>=totalPages} onClick={()=>setPage(page+1)}>下页 ›</button>
            <button className="btn btn-sm" disabled={page>=totalPages} onClick={()=>setPage(totalPages)}>末页 »</button>
          </div>
        )}
      </div>

      {/* 🆕 导出前预览全部 */}
      {lightboxImg&&(
        <div onClick={()=>setLightboxImg(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:1100,display:'flex',alignItems:'center',justifyContent:'center',padding:'4vh 4vw',cursor:'zoom-out'}}>
          <img src={lightboxImg} alt="" style={{maxWidth:'100%',maxHeight:'92vh',objectFit:'contain',borderRadius:8,boxShadow:'0 8px 40px rgba(0,0,0,.5)'}}/>
          <div style={{position:'fixed',top:16,right:20,color:'white',fontSize:28,cursor:'pointer',lineHeight:1}} onClick={()=>setLightboxImg(null)}>✕</div>
        </div>
      )}
      {showPreview&&(
        <div onClick={()=>setShowPreview(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'4vh 16px',overflow:'auto'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:16,maxWidth:1200,width:'100%',padding:18,maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <strong style={{fontSize:16}}>👁 全部发票预览</strong>
              <span className="pill" style={{background:'#dbeafe',color:'#1e40af'}}>{tickets.length} 票</span>
              {allValid?<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ 必填齐全</span>:<span className="pill" style={{background:'#fee2e2',color:'#b91c1c'}}>⚠ 有必填未填,补齐后再导出</span>}
              <div style={{flex:1}}/>
              <button className="btn-good btn" onClick={()=>{setShowPreview(false);exportExcel();}} disabled={!allValid}>📤 确认导出</button>
              <button className="btn" onClick={()=>setShowPreview(false)}>关闭</button>
            </div>
            <div className="scroll-x" style={{overflow:'auto',flex:1}}>
              <table>
                <thead><tr><th>#</th><th>订单号</th><th>店铺</th><th>渠道</th><th>重量</th><th>件数</th><th>收件人</th><th>地址</th><th>邮编</th><th>电话</th><th>产品(中文)</th><th>HS</th><th>申报价</th><th>缺</th></tr></thead>
                <tbody>{tickets.map((t,i)=>{const a=t.address||{};const miss=validate(t);const prod=t.items.map(it=>`${it.lampCn}×${it.quantity}`).join(', ');const hs=[...new Set(t.items.map(it=>it.hs))].join('/');const price=t.items.reduce((s,it)=>s+500*(parseInt(it.quantity)||1),0);return(
                  <tr key={t.id} style={{background:miss.length?'#fff7ed':'white'}}>
                    <td>{i+1}</td><td style={{fontWeight:600}}>{t.orderNumber}</td><td>{t.store}</td>
                    <td style={{color:t.channel?'inherit':'#dc2626'}}>{t.channel||'缺'}</td>
                    <td style={{color:t.weight?'inherit':'#dc2626'}}>{t.weight||'缺'}</td><td>{t.packageCount}</td>
                    <td>{a.name||t.customerName}</td>
                    <td style={{maxWidth:200,whiteSpace:'normal'}}>{[a.address1,a.address2,a.city,a.province].filter(Boolean).join(' ')}</td>
                    <td>{a.zip}</td><td>{a.phone||t.customerPhone}</td>
                    <td style={{maxWidth:160,whiteSpace:'normal'}}>{prod}</td><td>{hs}</td><td>{price}</td>
                    <td style={{color:'#b91c1c',fontWeight:600}}>{miss.join('/')}</td>
                  </tr>);})}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function OrderCard({order,assignedLineIds,onWhole,onPartial,selected,onToggleSelect,onPreview}){
  const [chosen,setChosen]=useState(new Set());
  const a=order.address||{}; const multi=order.items.length>1;
  const allAssigned=order.items.every(it=>assignedLineIds.has(it.lineId));
  const toggle=id=>setChosen(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});
  return (
    <div className="ocard" style={{opacity:allAssigned?.6:1,borderColor:selected?'#0071e3':undefined,boxShadow:selected?'0 0 0 2px rgba(0,113,227,.15)':undefined}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:8}}>
        {onToggleSelect&&<input type="checkbox" checked={!!selected} disabled={allAssigned} onChange={onToggleSelect} title="选中以批量加入" style={{width:16,height:16,cursor:'pointer'}}/>}
        <strong style={{fontSize:14}}>#{order.orderNumber}</strong>
        <span className="pill" style={{background:'#e0f2fe',color:'#075985'}}>🏪 {order.store}</span>
        <span className="pill" style={{background:'#eef2ff',color:'#4338ca'}}>{order.platform||'?'}</span>
        {multi&&<span className="pill" style={{background:'#fef9c3',color:'#854d0e'}}>{order.items.length} 个产品</span>}
        {allAssigned&&<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ 已加入</span>}
        <div style={{flex:1}}/>
        <span className="muted">{order.createdAt?new Date(order.createdAt).toLocaleDateString('zh-CN'):''}</span>
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        {/* 地址 */}
        <div style={{flex:'1 1 240px',background:'#fafafa',borderRadius:10,padding:'9px 12px',fontSize:12,lineHeight:1.65}}>
          <div style={{fontWeight:600,marginBottom:2}}>📍 {a.name||order.customerName}</div>
          <div className="muted">{[a.address1,a.address2].filter(Boolean).join(' ')}</div>
          <div className="muted">{a.city} {a.province} {a.zip} · {a.country_code||a.country}</div>
          <div className="muted">📞 {a.phone||order.customerPhone||'-'}</div>
        </div>
        {/* 产品 */}
        <div style={{flex:'2 1 320px'}}>
          {order.items.map(it=>{const assigned=assignedLineIds.has(it.lineId);return(
            <div key={it.lineId} className="prow">
              {multi&&<input type="checkbox" checked={chosen.has(it.lineId)} disabled={assigned} onChange={()=>toggle(it.lineId)}/>}
              {it.image_url?<img className="thumb" src={it.image_url} alt="" style={{cursor:'zoom-in'}} onClick={()=>onPreview&&onPreview(it.image_url)} title="点击看大图"/>:<div className="thumb" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>💡</div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><span className="pill" style={{background:'#f0f0f2',color:'#6e6e73',marginRight:5}}>{it.lampCn}</span>{it.title}</div>
                <div className="muted">{it.sku}{it.spec?' · '+it.spec:''} · ×{it.quantity}</div>
              </div>
              {assigned&&<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>已分票</span>}
            </div>
          );})}
        </div>
      </div>
      {order.note&&(
        <div style={{marginTop:10,background:'#fffbeb',border:'1px solid #fde68a',borderRadius:9,padding:'8px 11px',fontSize:12,lineHeight:1.6,color:'#92400e',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
          📝 客户备注(留意是否改地址):{order.note}
        </div>
      )}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:10}}>
        <button className="btn-pri btn btn-sm" onClick={()=>{onWhole();setChosen(new Set());}} disabled={allAssigned}>整单做 1 票</button>
        {multi&&<button className="btn btn-sm" onClick={()=>{onPartial(chosen);setChosen(new Set());}} disabled={chosen.size===0}>➕ 勾选 {chosen.size} 个做 1 票(拆票)</button>}
      </div>
    </div>
  );
}

function Reconcile(){
  const [rows,setRows]=useState([]); const [fileName,setFileName]=useState(''); const fileRef=useRef(null);
  const handleFile=(file)=>{const r=new FileReader();r.onload=(e)=>{const wb=XLSX.read(e.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];const aoa=XLSX.utils.sheet_to_json(ws,{header:1});const dr=aoa.slice(1).filter(rr=>rr&&rr[1]);setRows(dr.map(rr=>({date:rr[0],orderNumber:String(rr[1]||''),waybill:rr[2],channel:rr[4],totalPieces:rr[12],recvWeight:rr[13],settleWeight:rr[15],girth:rr[11],note:rr[16]||''})));setFileName(file.name);};r.readAsBinaryString(file);};
  const flag=r=>/超长|超围|超重|加纸箱/.test((r.note||'').toString());
  const abn=rows.filter(flag).length;
  return (
    <div className="card">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
        <strong style={{fontSize:16}}>📥 收货回传对账</strong>
        <span className="muted">导入快递回传表(北简 17 列)· 附加费标红</span>
        <div style={{flex:1}}/>
        <button className="btn-pri btn" onClick={()=>fileRef.current?.click()}>📂 导入回传表</button>
        <input ref={fileRef} type="file" accept=".xls,.xlsx" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
      </div>
      {fileName&&<div className="muted" style={{marginBottom:8}}>📄 {fileName} · {rows.length} 条 · {abn>0?<span style={{color:'#b91c1c',fontWeight:600}}>⚠ {abn} 条有附加费</span>:<span style={{color:'#15803d'}}>✓ 无异常</span>}</div>}
      {rows.length>0?(
        <div className="scroll-x"><table>
          <thead><tr><th>订单号</th><th>运单号</th><th>渠道</th><th>件数</th><th>收货实重</th><th>结算重</th><th>围长</th><th>备注</th></tr></thead>
          <tbody>{rows.map((r,i)=>{const f=flag(r);return(<tr key={i} style={{background:f?'#fef2f2':'white'}}>
            <td style={{fontWeight:600}}>{r.orderNumber}</td><td>{r.waybill}</td><td>{r.channel}</td><td>{r.totalPieces}</td><td>{r.recvWeight}</td><td>{r.settleWeight}</td><td>{r.girth}</td>
            <td style={{maxWidth:160,whiteSpace:'normal',color:f?'#b91c1c':'inherit',fontWeight:f?600:400}}>{r.note}</td></tr>);})}</tbody>
        </table></div>
      ):<div style={{padding:40,textAlign:'center',color:'#86868b'}}>导入快递回传的收货 Excel 开始对账</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
