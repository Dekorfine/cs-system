<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快递发票制作</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px;}
  .wrap{padding:18px;max-width:1320px;margin:0 auto;}
  .card{background:white;border:1px solid #ececef;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .btn{padding:7px 14px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;border:1px solid #e0e0e3;background:white;color:#424245;font-weight:500;transition:all .12s;}
  .btn:hover{background:#f5f5f7;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-pri{background:#0071e3;color:white;border-color:#0071e3;}
  .btn-pri:hover{background:#0066cc;}
  .btn-good{background:#34c759;color:white;border-color:#34c759;}
  .btn-good:hover{filter:brightness(.96);}
  .btn-sm{padding:4px 11px;font-size:12px;border-radius:8px;}
  .inp{padding:8px 11px;border:1px solid #d8d8dc;border-radius:9px;width:100%;font-family:inherit;font-size:13px;background:white;}
  .inp:focus{outline:none;border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.12);}
  .tab-btn{padding:8px 18px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:#86868b;transition:all .12s;}
  .tab-btn.active{background:#0071e3;color:white;box-shadow:0 2px 8px rgba(0,113,227,.25);}
  .pill{padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
  .muted{color:#86868b;font-size:12px;}
  .lbl{display:block;font-size:11px;color:#86868b;margin-bottom:5px;font-weight:500;}
  .dot{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 11px;border-radius:99px;font-weight:500;}
  .chip{padding:5px 13px;border-radius:99px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid #e0e0e3;background:white;color:#424245;font-weight:500;transition:all .12s;white-space:nowrap;}
  .chip:hover{border-color:#0071e3;color:#0071e3;}
  .chip.on{background:#0071e3;color:white;border-color:#0071e3;}
  table{border-collapse:collapse;width:100%;font-size:12px;}
  th,td{border:1px solid #ececef;padding:5px 7px;text-align:left;white-space:nowrap;}
  th{background:#fafafa;font-weight:600;color:#6e6e73;}
  td input{border:1px solid transparent;background:transparent;padding:3px 5px;border-radius:5px;width:100%;min-width:60px;font-family:inherit;}
  td input:focus{border-color:#0071e3;background:white;outline:none;}
  .scroll-x{overflow-x:auto;border:1px solid #ececef;border-radius:10px;}
  .ocard{border:1px solid #ececef;border-radius:14px;padding:14px;margin-bottom:11px;background:white;transition:all .12s;}
  .ocard:hover{border-color:#d0d0d5;box-shadow:0 2px 12px rgba(0,0,0,.05);}
  .prow{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;}
  .prow:hover{background:#fafafa;}
  .thumb{width:46px;height:46px;object-fit:contain;border-radius:8px;border:1px solid #ececef;background:#fafafa;flex-shrink:0;}
  .pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const ORDERS_URL = 'https://pyfmuknvjqfwcqvbrsvw.supabase.co';
const ORDERS_KEY = 'sb_publishable_dFjk1WN_Hc0Te6IhXZysZg_SXvKQU4C';
let _client = null;
const getClient = () => { if (_client) return _client; try { _client = window.supabase.createClient(ORDERS_URL, ORDERS_KEY); return _client; } catch { return null; } };

// 灯具类型 → 中英文 + HS(昌晖 178 行 100% 反推)
const LAMP_TYPES = [
  { re:/chandelier/, en:'Chandelier', cn:'枝形吊灯', hs:'9405100000' },
  { re:/wall\s*(lamp|light|sconce)|sconce/, en:'Wall Lamp', cn:'壁灯', hs:'9405100000' },
  { re:/pendant|hanging|suspend/, en:'Pendant Lamp', cn:'吊灯', hs:'9405100000' },
  { re:/table\s*(lamp|light)|desk\s*lamp/, en:'Table Lamp', cn:'台灯', hs:'9405409000' },
  { re:/floor\s*(lamp|light)/, en:'Floor Lamp', cn:'落地灯', hs:'9405200090' },
  { re:/ceiling|flush\s*mount/, en:'Ceiling Lamp', cn:'吸顶灯', hs:'9405100000' },
  { re:/bulb|accessor|spare|part|cable|cord|shade|bracket|adapter|driver/, en:'Accessories', cn:'配件', hs:'3917400000' },
];
function getLampInfo(item) {
  const t = ((item.title||'')+' '+(item.variant_title||'')).toLowerCase();
  const f = LAMP_TYPES.find(l => l.re.test(t)) || LAMP_TYPES[1];
  const material = /brass|黄铜|纯铜|red copper/.test(t) ? 'Brass' : 'Plastic + metal';
  return { en:f.en, cn:f.cn, hs:f.hs, material };
}
const DECLARE = { unitPriceEach:500, usage:'illuminating' };
const CHANNELS = ['美森加班海运小包','美森普通海运小包'];

// 店铺字段探测
const STORE_FIELDS = ['store_name','store','shop_name','shop','shop_domain','site_name','site'];
function detectStoreField(row){ if(!row) return null; for(const f of STORE_FIELDS){ if(row[f]) return f; } return null; }
const SHOP_PREFIX_MAP = { VK:'Vakkerlight', RD:'Radilum', ML:'Mooielight', MO:'Mooielight', MJ:'Mooijane', DC:'Docos.us', DF:'Dekorfine', LS:'Lumioshine', RS:'Rayonshine', MH:'Mooiehome', PL:'Pinlighting', K:'Mooiehome' };
function storeFromOrder(o, field) {
  if (field && o[field]) return String(o[field]).replace(/\.myshopify\.com$/,'');
  const oid = o.shopify_order_id||''; if(/^woo-/.test(oid)){const p=oid.split('-'); if(p[1]) return p[1];}
  const m = (o.shopify_order_number||'').match(/^([A-Za-z]+)/);
  if(m){const pre=m[1].toUpperCase(); return SHOP_PREFIX_MAP[pre]||pre;}
  return '未知';
}
function parseOrder(o, field) {
  let addr=o.shipping_address; if(typeof addr==='string'){try{addr=JSON.parse(addr);}catch{addr={};}}
  let items=o.line_items; if(typeof items==='string'){try{items=JSON.parse(items);}catch{items=[];}}
  items=(items||[]).map((it,i)=>{ const lt=getLampInfo(it); return { lineId:o.shopify_order_id+'_'+i, title:it.title||'', sku:it.sku||'', quantity:it.quantity||1, image_url:it.image_url||'', lampEn:lt.en, lampCn:lt.cn, hs:lt.hs, material:lt.material, spec:it.variant_title||'' }; });
  return { orderId:o.shopify_order_id, orderNumber:o.shopify_order_number||o.shopify_order_id, platform:o.platform, store:storeFromOrder(o,field), customerName:o.customer_name, customerEmail:o.customer_email, customerPhone:o.customer_phone, address:addr||{}, items, createdAt:o.shopify_created_at };
}

// 昌晖 73 列
const CH_BASE=['客户订单号（必填）','渠道必填）','目的国家（必填）','外包装件数（必填）','重量（必填）','收件人公司名','收件人姓名（必填）','收件人省州（必填）','收件人城市（必填）','收件人邮编（必填）','收件人地址（必填）','收件人门牌号','收件人电话（必填）','收件人传真','收件人邮箱','收件人证件类型'];
function chProd(){const a=[];for(let i=1;i<=5;i++){a.push(`英文申报品名${i}${i===1?'（必填）':''}`,`中文申报品名${i}${i===1?'（必填）':''}`,`申报单价${i}${i===1?'（必填）':''}`,`申报数量${i}${i===1?'（必填）':''}`,`销售地址${i}`,`海关货物编号${i}${i===1?'（必填）':''}`,`配货备注${i}`,`SKU${i}`,`材质${i}${i===1?'（必填）':''}`);if(i===1)a.push('个数');a.push(`规格型号${i}${i===1?'（必填）':''}`,`用途${i}${i===1?'（必填）':''}`);}return a;}
const CH_HEADERS=[...CH_BASE,...chProd(),'运单备注'];
function buildChanghuiRow(t){
  const a=t.address||{}; const row=new Array(CH_HEADERS.length).fill('');
  row[0]=t.orderNumber; row[1]=t.channel||''; row[2]=a.country_code||a.country||'US';
  row[3]=t.packageCount||''; row[4]=t.weight||'';
  row[6]=a.name||t.customerName||''; row[7]=a.province||''; row[8]=a.city||'';
  row[9]={v:a.zip||'',t:'s'}; row[10]=[a.address1,a.address2].filter(Boolean).join(' ');
  row[12]=a.phone||t.customerPhone||''; row[14]=t.customerEmail||'';
  t.items.slice(0,5).forEach((it,bi)=>{ const first=bi===0; const start=16+(first?0:12+(bi-1)*11); let c=start; const qty=parseInt(it.quantity)||1;
    row[c++]=it.lampEn; row[c++]=it.lampCn; row[c++]=DECLARE.unitPriceEach*qty; row[c++]=qty; row[c++]=''; row[c++]=it.hs||'9405100000'; row[c++]=''; row[c++]=it.sku||''; row[c++]=it.material||'Plastic + metal'; if(first)row[c++]=qty; row[c++]=it.spec||''; row[c++]=DECLARE.usage; });
  row[row.length-1]=t.prepNote||''; return row;
}
const COURIERS={ changhui:{name:'昌晖',headers:CH_HEADERS,build:buildChanghuiRow} };
const PAGE_SIZE=24;

function App(){
  const [tab,setTab]=useState('make');
  return (
    <div className="wrap">
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button className={`tab-btn ${tab==='make'?'active':''}`} onClick={()=>setTab('make')}>📋 制作发票</button>
        <button className={`tab-btn ${tab==='reconcile'?'active':''}`} onClick={()=>setTab('reconcile')}>📥 收货对账</button>
      </div>
      {tab==='make'?<MakeInvoice/>:<Reconcile/>}
    </div>
  );
}

function MakeInvoice(){
  const [courier,setCourier]=useState('changhui');
  const [dateStr,setDateStr]=useState(new Date().toISOString().slice(0,10));
  const [search,setSearch]=useState('');
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(false);
  const [conn,setConn]=useState('loading');
  const [err,setErr]=useState('');
  const [tickets,setTickets]=useState([]);
  const [storeField,setStoreField]=useState(null);
  const [stores,setStores]=useState([]);      // [{name,count}] 全部店铺
  const [activeStore,setActiveStore]=useState('all');
  const [page,setPage]=useState(1);

  const handleErr=(e)=>{ setConn('fail'); const m=e.message||String(e);
    if(/permission|RLS|policy|JWT|401|Bad cred/i.test(m)) setErr('读取订单被拒(RLS 权限)— 让 Martin 跑 cs-readonly-orders.sql 给客服 anon 开只读。原始:'+m);
    else setErr('加载失败:'+m); };

  // 扫描全部店铺(只拉店铺一列,轻量)
  const scanStores=async(field)=>{
    const c=getClient(); if(!c||!field) return;
    try{
      const {data,error}=await c.from('shopify_orders').select(field).limit(5000);
      if(error) throw error;
      const cnt={}; (data||[]).forEach(r=>{ const s=String(r[field]||'未知').replace(/\.myshopify\.com$/,''); cnt[s]=(cnt[s]||0)+1; });
      setStores(Object.entries(cnt).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count));
    }catch(e){ /* 扫描失败不阻塞,用已加载订单提取 */ }
  };

  // 初次:加载最近 + 探测字段 + 扫描店铺
  const loadRecent=async()=>{
    const c=getClient(); if(!c){setConn('fail');setErr('Supabase 初始化失败');return;}
    setLoading(true); setErr(''); setActiveStore('all'); setPage(1);
    try{
      const {data,error}=await c.from('shopify_orders').select('*').order('shopify_created_at',{ascending:false}).limit(120);
      if(error) throw error;
      setConn('ok');
      const field=detectStoreField((data||[])[0]); setStoreField(field);
      setOrders((data||[]).map(o=>parseOrder(o,field)));
      if(field) scanStores(field);
    }catch(e){ handleErr(e); }
    setLoading(false);
  };
  useEffect(()=>{ loadRecent(); },[]);

  // 点店铺 → 服务端按店铺查
  const loadByStore=async(store)=>{
    setActiveStore(store); setPage(1);
    if(store==='all'){ loadRecent(); return; }
    const c=getClient(); if(!c||!storeField) {
      // 没探测到字段 → 客户端过滤已加载
      return;
    }
    setLoading(true); setErr('');
    try{
      const {data,error}=await c.from('shopify_orders').select('*').eq(storeField,store).order('shopify_created_at',{ascending:false}).limit(300);
      if(error) throw error;
      setOrders((data||[]).map(o=>parseOrder(o,storeField)));
    }catch(e){ handleErr(e); }
    setLoading(false);
  };

  const doSearch=async()=>{
    const raw=search.trim(); const c=getClient(); if(!c){setConn('fail');return;}
    setLoading(true); setErr(''); setActiveStore('all'); setPage(1);
    try{
      let q=c.from('shopify_orders').select('*');
      if(raw){
        const nums=raw.split(/[\s,;，；\n\r]+/).map(s=>s.trim()).filter(Boolean);
        if(nums.length>1) q=q.or(nums.map(n=>`shopify_order_number.eq.${n},shopify_order_id.eq.${n}`).join(','));
        else { const k=nums[0]; q=q.or(`shopify_order_number.ilike.%${k}%,shopify_order_id.ilike.%${k}%,customer_name.ilike.%${k}%,customer_email.ilike.%${k}%`).limit(120); }
      } else q=q.order('shopify_created_at',{ascending:false}).limit(120);
      const {data,error}=await q; if(error) throw error;
      setConn('ok'); const field=storeField||detectStoreField((data||[])[0]);
      setOrders((data||[]).map(o=>parseOrder(o,field)));
      if(raw && (data||[]).length===0) setErr('未找到匹配订单(可搜订单号/客户名/邮箱)');
    }catch(e){ handleErr(e); }
    setLoading(false);
  };

  // 店铺列表:优先扫描结果,否则从已加载提取
  const storeList=useMemo(()=>{
    if(stores.length) return stores;
    const cnt={}; orders.forEach(o=>{cnt[o.store]=(cnt[o.store]||0)+1;});
    return Object.entries(cnt).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  },[stores,orders]);

  // 当前展示订单(若 activeStore 且服务端没按店铺查到,客户端兜底过滤)
  const filtered=useMemo(()=> activeStore==='all'?orders:orders.filter(o=>o.store===activeStore),[orders,activeStore]);
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  const pageOrders=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);

  const assignedLineIds=useMemo(()=>{const s=new Set();tickets.forEach(t=>t.items.forEach(it=>s.add(it.lineId)));return s;},[tickets]);
  const makeTicket=(order,items)=>({ id:'tk_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), sourceOrderId:order.orderId, orderNumber:order.orderNumber, platform:order.platform, store:order.store, customerName:order.customerName, customerEmail:order.customerEmail, customerPhone:order.customerPhone, address:order.address, items, channel:'', weight:'', packageCount:1, prepNote:'' });
  const addWhole=(o)=>setTickets(p=>[...p,makeTicket(o,o.items.map(it=>({...it})))]);
  const addPartial=(o,ids)=>{const items=o.items.filter(it=>ids.has(it.lineId)).map(it=>({...it}));if(items.length)setTickets(p=>[...p,makeTicket(o,items)]);};
  const upTicket=(id,patch)=>setTickets(p=>p.map(t=>t.id===id?{...t,...patch}:t));
  const upItem=(id,idx,patch)=>setTickets(p=>p.map(t=>t.id!==id?t:{...t,items:t.items.map((it,i)=>i===idx?{...it,...patch}:it)}));
  const rmTicket=(id)=>setTickets(p=>p.filter(t=>t.id!==id));

  const validate=(t)=>{const m=[];if(!t.channel)m.push('渠道');if(!t.weight)m.push('重量');if(!t.packageCount)m.push('件数');const a=t.address||{};if(!(a.name||t.customerName))m.push('收件人');if(!a.zip)m.push('邮编');if(!a.address1)m.push('地址');return m;};
  const allValid=tickets.length>0&&tickets.every(t=>validate(t).length===0);
  const exportExcel=()=>{const tpl=COURIERS[courier];const ws=XLSX.utils.aoa_to_sheet([tpl.headers,...tickets.map(tpl.build)]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Sheet1');XLSX.writeFile(wb,`${tpl.name}发票_${dateStr}_${tickets.length}票.xlsx`);};

  return (
    <>
      {/* 工具栏 */}
      <div className="card">
        <div style={{display:'flex',gap:14,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div><span className="lbl">快递公司</span>
            <select className="inp" style={{width:130}} value={courier} onChange={e=>setCourier(e.target.value)}>
              {Object.entries(COURIERS).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
            </select></div>
          <div><span className="lbl">日期</span><input type="date" className="inp" style={{width:150}} value={dateStr} onChange={e=>setDateStr(e.target.value)}/></div>
          <div style={{flex:1,minWidth:240}}><span className="lbl">搜索 · 订单号 / 客户名 / 邮箱(留空=最近订单)</span>
            <div style={{display:'flex',gap:8}}>
              <input className="inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="XM8T31234602 / Karen / xxx@gmail.com" onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
              <button className="btn-pri btn" onClick={doSearch} disabled={loading} style={{whiteSpace:'nowrap'}}>{loading?'⏳':'🔍 搜索'}</button>
            </div></div>
          <div>
            {conn==='ok'&&<span className="dot" style={{background:'#dcfce7',color:'#15803d'}}>● 订单库已连接</span>}
            {conn==='fail'&&<span className="dot" style={{background:'#fee2e2',color:'#b91c1c'}}>● 连接失败</span>}
            {conn==='loading'&&<span className="dot" style={{background:'#f0f0f2',color:'#86868b'}}>● 连接中…</span>}
          </div>
        </div>
        {err&&<div style={{marginTop:12,padding:'11px 14px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,fontSize:12,color:'#92400e',lineHeight:1.6}}>⚠ {err}</div>}
      </div>

      {/* 发票篮 */}
      {tickets.length>0&&(
        <div className="card" style={{border:'2px solid #34c759',background:'linear-gradient(180deg,#f0fdf4,#ffffff)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
            <strong style={{fontSize:16}}>🧾 待导出发票篮</strong>
            <span className="pill" style={{background:'#34c759',color:'white'}}>{tickets.length} 票</span>
            {allValid?<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ 必填齐全</span>:<span className="pill" style={{background:'#fee2e2',color:'#b91c1c'}}>⚠ 有必填未填</span>}
            <div style={{flex:1}}/>
            <button className="btn btn-sm" onClick={()=>setTickets([])}>清空</button>
            <button className="btn-good btn" onClick={exportExcel} disabled={!allValid}>📤 导出 {COURIERS[courier].name} Excel</button>
          </div>
          {tickets.map(t=>{const miss=validate(t);const a=t.address||{};const same=tickets.filter(x=>x.sourceOrderId===t.sourceOrderId);const idx=same.indexOf(t)+1;
            return(
              <div key={t.id} style={{border:'1px solid #e0e0e3',borderRadius:12,padding:12,marginBottom:10,background:miss.length?'#fffdf8':'white'}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:7}}>
                  <strong style={{fontSize:13}}>🧾 {t.orderNumber}</strong>
                  {same.length>1&&<span className="pill" style={{background:'#fef9c3',color:'#854d0e'}}>第 {idx}/{same.length} 票</span>}
                  <span className="pill" style={{background:'#e0f2fe',color:'#075985'}}>🏪 {t.store}</span>
                  <span className="muted">{a.name||t.customerName} · {a.city} {a.province} {a.zip}</span>
                  {miss.length>0&&<span className="pill" style={{background:'#fee2e2',color:'#b91c1c'}}>缺:{miss.join('/')}</span>}
                  <div style={{flex:1}}/><button className="btn btn-sm" onClick={()=>rmTicket(t.id)}>移除</button>
                </div>
                <div className="muted" style={{marginBottom:8,fontSize:11}}>📍 {[a.address1,a.address2].filter(Boolean).join(' ')} {a.zip} · 📞 {a.phone||t.customerPhone||'-'}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                  <div><span className="lbl">渠道 *</span><select className="inp" style={{width:160,borderColor:t.channel?'#d8d8dc':'#fca5a5'}} value={t.channel} onChange={e=>upTicket(t.id,{channel:e.target.value})}><option value="">— 选 —</option>{CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                  <div><span className="lbl">重量 kg *</span><input className="inp" style={{width:90,borderColor:t.weight?'#d8d8dc':'#fca5a5'}} type="number" step="0.001" value={t.weight} onChange={e=>upTicket(t.id,{weight:e.target.value})}/></div>
                  <div><span className="lbl">件数 *</span><input className="inp" style={{width:68}} type="number" value={t.packageCount} onChange={e=>upTicket(t.id,{packageCount:e.target.value})}/></div>
                  <div style={{flex:1,minWidth:150}}><span className="lbl">运单备注</span><input className="inp" value={t.prepNote} onChange={e=>upTicket(t.id,{prepNote:e.target.value})} placeholder="实重复测/改加班船…"/></div>
                </div>
                <div className="scroll-x">
                  <table><thead><tr><th>英文</th><th>中文</th><th>HS编码</th><th>数量</th><th>材质</th><th>SKU</th><th>规格</th></tr></thead>
                  <tbody>{t.items.map((it,ii)=>(<tr key={ii}>
                    <td><input value={it.lampEn} onChange={e=>upItem(t.id,ii,{lampEn:e.target.value})}/></td>
                    <td><input value={it.lampCn} onChange={e=>upItem(t.id,ii,{lampCn:e.target.value})} style={{minWidth:55}}/></td>
                    <td><input value={it.hs} onChange={e=>upItem(t.id,ii,{hs:e.target.value})} style={{minWidth:90}}/></td>
                    <td><input type="number" value={it.quantity} onChange={e=>upItem(t.id,ii,{quantity:e.target.value})} style={{minWidth:45}}/></td>
                    <td><input value={it.material} onChange={e=>upItem(t.id,ii,{material:e.target.value})} style={{minWidth:90}}/></td>
                    <td><input value={it.sku} onChange={e=>upItem(t.id,ii,{sku:e.target.value})}/></td>
                    <td><input value={it.spec} onChange={e=>upItem(t.id,ii,{spec:e.target.value})} style={{minWidth:100}}/></td>
                  </tr>))}</tbody></table>
                </div>
                <div className="muted" style={{fontSize:11,marginTop:5}}>💰 申报单价 = 500 × 数量(导出时算)· 用途 illuminating</div>
                {t.items.length>5&&<div style={{fontSize:11,color:'#b91c1c',marginTop:4}}>⚠ 超 5 个产品,昌晖每票最多 5 个,请拆票</div>}
              </div>
            );})}
        </div>
      )}

      {/* 订单列表 */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
          <strong style={{fontSize:16}}>📦 订单列表</strong>
          <span className="muted">{filtered.length} 单{activeStore!=='all'?` · ${activeStore}`:''}</span>
          <div style={{flex:1}}/>
          <button className="btn btn-sm" onClick={loadRecent}>🔄 刷新(取跟单最新)</button>
        </div>
        {/* 店铺筛选 */}
        {storeList.length>0&&(
          <div style={{display:'flex',gap:7,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
            <span className="muted" style={{whiteSpace:'nowrap'}}>🏪 店铺:</span>
            <button className={`chip ${activeStore==='all'?'on':''}`} onClick={()=>loadByStore('all')}>全部</button>
            {storeList.map(s=>(<button key={s.name} className={`chip ${activeStore===s.name?'on':''}`} onClick={()=>loadByStore(s.name)}>{s.name} <span style={{opacity:.7}}>{s.count}</span></button>))}
          </div>
        )}
        {loading&&<div style={{padding:36,textAlign:'center',color:'#86868b'}}>⏳ 加载中…</div>}
        {!loading&&filtered.length===0&&<div style={{padding:36,textAlign:'center',color:'#86868b'}}>{conn==='fail'?'连不上订单库,见上方提示':'暂无订单'}</div>}
        {!loading&&pageOrders.map(o=><OrderCard key={o.orderId} order={o} assignedLineIds={assignedLineIds} onWhole={()=>addWhole(o)} onPartial={ids=>addPartial(o,ids)}/>)}
        {totalPages>1&&(
          <div className="pager">
            <button className="btn btn-sm" disabled={page<=1} onClick={()=>setPage(1)}>« 首页</button>
            <button className="btn btn-sm" disabled={page<=1} onClick={()=>setPage(page-1)}>‹ 上页</button>
            <span className="muted" style={{padding:'0 8px'}}>第 {page} / {totalPages} 页</span>
            <button className="btn btn-sm" disabled={page>=totalPages} onClick={()=>setPage(page+1)}>下页 ›</button>
            <button className="btn btn-sm" disabled={page>=totalPages} onClick={()=>setPage(totalPages)}>末页 »</button>
          </div>
        )}
      </div>
    </>
  );
}

function OrderCard({order,assignedLineIds,onWhole,onPartial}){
  const [chosen,setChosen]=useState(new Set());
  const a=order.address||{}; const multi=order.items.length>1;
  const allAssigned=order.items.every(it=>assignedLineIds.has(it.lineId));
  const toggle=id=>setChosen(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});
  return (
    <div className="ocard" style={{opacity:allAssigned?.6:1}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:8}}>
        <strong style={{fontSize:14}}>#{order.orderNumber}</strong>
        <span className="pill" style={{background:'#e0f2fe',color:'#075985'}}>🏪 {order.store}</span>
        <span className="pill" style={{background:'#eef2ff',color:'#4338ca'}}>{order.platform||'?'}</span>
        {multi&&<span className="pill" style={{background:'#fef9c3',color:'#854d0e'}}>{order.items.length} 个产品</span>}
        {allAssigned&&<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ 已加入</span>}
        <div style={{flex:1}}/>
        <span className="muted">{order.createdAt?new Date(order.createdAt).toLocaleDateString('zh-CN'):''}</span>
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        {/* 地址 */}
        <div style={{flex:'1 1 240px',background:'#fafafa',borderRadius:10,padding:'9px 12px',fontSize:12,lineHeight:1.65}}>
          <div style={{fontWeight:600,marginBottom:2}}>📍 {a.name||order.customerName}</div>
          <div className="muted">{[a.address1,a.address2].filter(Boolean).join(' ')}</div>
          <div className="muted">{a.city} {a.province} {a.zip} · {a.country_code||a.country}</div>
          <div className="muted">📞 {a.phone||order.customerPhone||'-'}</div>
        </div>
        {/* 产品 */}
        <div style={{flex:'2 1 320px'}}>
          {order.items.map(it=>{const assigned=assignedLineIds.has(it.lineId);return(
            <div key={it.lineId} className="prow">
              {multi&&<input type="checkbox" checked={chosen.has(it.lineId)} disabled={assigned} onChange={()=>toggle(it.lineId)}/>}
              {it.image_url?<img className="thumb" src={it.image_url} alt=""/>:<div className="thumb" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>💡</div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><span className="pill" style={{background:'#f0f0f2',color:'#6e6e73',marginRight:5}}>{it.lampCn}</span>{it.title}</div>
                <div className="muted">{it.sku}{it.spec?' · '+it.spec:''} · ×{it.quantity}</div>
              </div>
              {assigned&&<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>已分票</span>}
            </div>
          );})}
        </div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:10}}>
        <button className="btn-pri btn btn-sm" onClick={()=>{onWhole();setChosen(new Set());}} disabled={allAssigned}>整单做 1 票</button>
        {multi&&<button className="btn btn-sm" onClick={()=>{onPartial(chosen);setChosen(new Set());}} disabled={chosen.size===0}>➕ 勾选 {chosen.size} 个做 1 票(拆票)</button>}
      </div>
    </div>
  );
}

function Reconcile(){
  const [rows,setRows]=useState([]); const [fileName,setFileName]=useState(''); const fileRef=useRef(null);
  const handleFile=(file)=>{const r=new FileReader();r.onload=(e)=>{const wb=XLSX.read(e.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];const aoa=XLSX.utils.sheet_to_json(ws,{header:1});const dr=aoa.slice(1).filter(rr=>rr&&rr[1]);setRows(dr.map(rr=>({date:rr[0],orderNumber:String(rr[1]||''),waybill:rr[2],channel:rr[4],totalPieces:rr[12],recvWeight:rr[13],settleWeight:rr[15],girth:rr[11],note:rr[16]||''})));setFileName(file.name);};r.readAsBinaryString(file);};
  const flag=r=>/超长|超围|超重|加纸箱/.test((r.note||'').toString());
  const abn=rows.filter(flag).length;
  return (
    <div className="card">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
        <strong style={{fontSize:16}}>📥 收货回传对账</strong>
        <span className="muted">导入快递回传表(北简 17 列)· 附加费标红</span>
        <div style={{flex:1}}/>
        <button className="btn-pri btn" onClick={()=>fileRef.current?.click()}>📂 导入回传表</button>
        <input ref={fileRef} type="file" accept=".xls,.xlsx" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
      </div>
      {fileName&&<div className="muted" style={{marginBottom:8}}>📄 {fileName} · {rows.length} 条 · {abn>0?<span style={{color:'#b91c1c',fontWeight:600}}>⚠ {abn} 条有附加费</span>:<span style={{color:'#15803d'}}>✓ 无异常</span>}</div>}
      {rows.length>0?(
        <div className="scroll-x"><table>
          <thead><tr><th>订单号</th><th>运单号</th><th>渠道</th><th>件数</th><th>收货实重</th><th>结算重</th><th>围长</th><th>备注</th></tr></thead>
          <tbody>{rows.map((r,i)=>{const f=flag(r);return(<tr key={i} style={{background:f?'#fef2f2':'white'}}>
            <td style={{fontWeight:600}}>{r.orderNumber}</td><td>{r.waybill}</td><td>{r.channel}</td><td>{r.totalPieces}</td><td>{r.recvWeight}</td><td>{r.settleWeight}</td><td>{r.girth}</td>
            <td style={{maxWidth:160,whiteSpace:'normal',color:f?'#b91c1c':'inherit',fontWeight:f?600:400}}>{r.note}</td></tr>);})}</tbody>
        </table></div>
      ):<div style={{padding:40,textAlign:'center',color:'#86868b'}}>导入快递回传的收货 Excel 开始对账</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
