<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快递发票制作</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fafafa; color: #1d1d1f;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; font-size: 13px; }
  .wrap { padding: 16px; max-width: 1500px; margin: 0 auto; }
  .card { background: white; border: 1px solid #e5e5e7; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  .btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; border: 1px solid #e5e5e7; background: white; color: #424245; font-weight: 500; }
  .btn:hover { background: #f5f5f7; }
  .btn-pri { background: #0071e3; color: white; border-color: #0071e3; }
  .btn-pri:hover { background: #0066cc; }
  .btn-pri:disabled { opacity: .4; cursor: not-allowed; }
  .btn-good { background: #34c759; color: white; border-color: #34c759; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 7px; }
  .inp { padding: 7px 10px; border: 1px solid #d2d2d7; border-radius: 8px; width: 100%; font-family: inherit; font-size: 13px; }
  .tab-btn { padding: 8px 16px; border-radius: 10px; border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; color: #86868b; }
  .tab-btn.active { background: #0071e3; color: white; }
  .pill { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; display: inline-block; }
  .muted { color: #86868b; font-size: 12px; }
  .status-dot { display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:3px 10px; border-radius:99px; font-weight:500; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  th, td { border: 1px solid #e5e5e7; padding: 5px 7px; text-align: left; white-space: nowrap; }
  th { background: #f5f5f7; font-weight: 600; }
  td input { border: 1px solid transparent; background: transparent; padding: 3px 5px; border-radius: 5px; width: 100%; min-width: 60px; font-family: inherit; }
  td input:focus { border-color: #0071e3; background: white; outline: none; }
  .scroll-x { overflow-x: auto; border: 1px solid #e5e5e7; border-radius: 10px; }
  .order-card { border: 1px solid #e5e5e7; border-radius: 12px; padding: 12px; margin-bottom: 10px; background: white; }
  .prod-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 7px; }
  .prod-row:hover { background: #f8fafc; }
  .thumb { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; border: 1px solid #e5e5e7; background: #f5f5f7; flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const ORDERS_URL = 'https://pyfmuknvjqfwcqvbrsvw.supabase.co';
const ORDERS_KEY = 'sb_publishable_dFjk1WN_Hc0Te6IhXZysZg_SXvKQU4C';
let _client = null;
const getClient = () => { if (_client) return _client; try { _client = window.supabase.createClient(ORDERS_URL, ORDERS_KEY); return _client; } catch { return null; } };

function getLampType(item) {
  const t = ((item.title || '') + ' ' + (item.variant_title || '')).toLowerCase();
  if (/wall\s*(lamp|light|sconce)|sconce/.test(t)) return { en: 'Wall Lamp', cn: '壁灯' };
  if (/pendant|chandelier|hanging|suspend/.test(t)) return { en: 'Pendant Lamp', cn: '吊灯' };
  if (/table\s*(lamp|light)|desk/.test(t)) return { en: 'Table Lamp', cn: '台灯' };
  if (/floor\s*(lamp|light)/.test(t)) return { en: 'Floor Lamp', cn: '落地灯' };
  if (/ceiling|flush/.test(t)) return { en: 'Ceiling Lamp', cn: '吸顶灯' };
  if (/bulb|accessor|part|cable|cord/.test(t)) return { en: 'Accessories', cn: '配件' };
  return { en: 'Wall Lamp', cn: '壁灯' };
}
const DECLARE = { unitPriceEach: 500, hsCode: '9405100000', material: 'Plastic + metal', usage: 'illuminating' };
const CHANNELS = ['美森加班海运小包', '美森普通海运小包'];

function parseOrder(o) {
  let addr = o.shipping_address;
  if (typeof addr === 'string') { try { addr = JSON.parse(addr); } catch { addr = {}; } }
  let items = o.line_items;
  if (typeof items === 'string') { try { items = JSON.parse(items); } catch { items = []; } }
  items = (items || []).map((it, i) => {
    const lt = getLampType(it);
    return { lineId: o.shopify_order_id + '_' + i, title: it.title || '', variant_title: it.variant_title || '',
      sku: it.sku || '', quantity: it.quantity || 1, image_url: it.image_url || '',
      lampEn: lt.en, lampCn: lt.cn, spec: it.variant_title || '' };
  });
  return { orderId: o.shopify_order_id, orderNumber: o.shopify_order_number || o.shopify_order_id, platform: o.platform,
    customerName: o.customer_name, customerEmail: o.customer_email, customerPhone: o.customer_phone,
    address: addr || {}, items, createdAt: o.shopify_created_at, total: o.total_price, currency: o.currency };
}

const CH_BASE = ['客户订单号（必填）','渠道必填）','目的国家（必填）','外包装件数（必填）','重量（必填）','收件人公司名','收件人姓名（必填）','收件人省州（必填）','收件人城市（必填）','收件人邮编（必填）','收件人地址（必填）','收件人门牌号','收件人电话（必填）','收件人传真','收件人邮箱','收件人证件类型'];
function chProdHeaders() {
  const arr = [];
  for (let i = 1; i <= 5; i++) {
    arr.push(`英文申报品名${i}${i===1?'（必填）':''}`, `中文申报品名${i}${i===1?'（必填）':''}`, `申报单价${i}${i===1?'（必填）':''}`, `申报数量${i}${i===1?'（必填）':''}`, `销售地址${i}`, `海关货物编号${i}${i===1?'（必填）':''}`, `配货备注${i}`, `SKU${i}`, `材质${i}${i===1?'（必填）':''}`);
    if (i === 1) arr.push('个数');
    arr.push(`规格型号${i}${i===1?'（必填）':''}`, `用途${i}${i===1?'（必填）':''}`);
  }
  return arr;
}
const CH_HEADERS = [...CH_BASE, ...chProdHeaders(), '运单备注'];
function buildChanghuiRow(t) {
  const a = t.address || {};
  const row = new Array(CH_HEADERS.length).fill('');
  row[0] = t.orderNumber; row[1] = t.channel || ''; row[2] = a.country_code || a.country || 'US';
  row[3] = t.packageCount || ''; row[4] = t.weight || '';
  row[6] = a.name || t.customerName || ''; row[7] = a.province || ''; row[8] = a.city || '';
  row[9] = { v: a.zip || '', t: 's' };
  row[10] = [a.address1, a.address2].filter(Boolean).join(' ');
  row[12] = a.phone || t.customerPhone || ''; row[14] = t.customerEmail || '';
  t.items.slice(0, 5).forEach((it, bi) => {
    const first = bi === 0;
    const start = 16 + (first ? 0 : 12 + (bi - 1) * 11);
    let c = start; const qty = parseInt(it.quantity) || 1;
    row[c++] = it.lampEn; row[c++] = it.lampCn; row[c++] = DECLARE.unitPriceEach * qty;
    row[c++] = qty; row[c++] = ''; row[c++] = DECLARE.hsCode; row[c++] = ''; row[c++] = it.sku || '';
    row[c++] = DECLARE.material; if (first) row[c++] = qty; row[c++] = it.spec || ''; row[c++] = DECLARE.usage;
  });
  row[row.length - 1] = t.prepNote || '';
  return row;
}
const COURIERS = { changhui: { name: '昌晖', headers: CH_HEADERS, build: buildChanghuiRow } };

function App() {
  const [tab, setTab] = useState('make');
  return (
    <div className="wrap">
      <div style={{display:'flex', gap:6, marginBottom:14}}>
        <button className={`tab-btn ${tab==='make'?'active':''}`} onClick={() => setTab('make')}>📋 制作发票</button>
        <button className={`tab-btn ${tab==='reconcile'?'active':''}`} onClick={() => setTab('reconcile')}>📥 收货对账</button>
      </div>
      {tab === 'make' ? <MakeInvoice /> : <Reconcile />}
    </div>
  );
}

function MakeInvoice() {
  const [courier, setCourier] = useState('changhui');
  const [dateStr, setDateStr] = useState(new Date().toISOString().slice(0, 10));
  const [search, setSearch] = useState('');
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(false);
  const [conn, setConn] = useState('loading');
  const [err, setErr] = useState('');
  const [tickets, setTickets] = useState([]);

  const handleErr = (e) => {
    setConn('fail');
    const m = e.message || String(e);
    if (/permission|RLS|policy|JWT|401|Bad cred/i.test(m))
      setErr('读取订单被拒(RLS 权限)— 请让 Martin 跑 cs-readonly-orders.sql 给客服 anon 开只读策略。原始:' + m);
    else setErr('加载失败:' + m);
  };

  const loadRecent = async () => {
    const c = getClient();
    if (!c) { setConn('fail'); setErr('Supabase 初始化失败'); return; }
    setLoading(true); setErr('');
    try {
      const { data, error } = await c.from('shopify_orders').select('*').order('shopify_created_at', { ascending: false }).limit(50);
      if (error) throw error;
      setConn('ok'); setOrders((data || []).map(parseOrder));
    } catch (e) { handleErr(e); }
    setLoading(false);
  };
  useEffect(() => { loadRecent(); }, []);

  const doSearch = async () => {
    const nums = search.split(/[\s,;，；\n\r]+/).map(s => s.trim()).filter(Boolean);
    const c = getClient();
    if (!c) { setConn('fail'); return; }
    setLoading(true); setErr('');
    try {
      let q = c.from('shopify_orders').select('*');
      if (nums.length > 0) {
        q = q.or(nums.map(n => `shopify_order_number.eq.${n},shopify_order_id.eq.${n}`).join(','));
      } else {
        q = q.order('shopify_created_at', { ascending: false }).limit(50);
      }
      const { data, error } = await q;
      if (error) throw error;
      setConn('ok');
      const parsed = (data || []).map(parseOrder);
      setOrders(parsed);
      if (nums.length > 0 && parsed.length === 0) setErr('未找到这些订单号');
    } catch (e) { handleErr(e); }
    setLoading(false);
  };

  const assignedLineIds = useMemo(() => {
    const s = new Set(); tickets.forEach(t => t.items.forEach(it => s.add(it.lineId))); return s;
  }, [tickets]);

  const makeTicket = (order, items) => ({
    id: 'tk_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    sourceOrderId: order.orderId, orderNumber: order.orderNumber, platform: order.platform,
    customerName: order.customerName, customerEmail: order.customerEmail, customerPhone: order.customerPhone,
    address: order.address, items, channel: '', weight: '', packageCount: 1, prepNote: '',
  });
  const addWholeOrder = (order) => setTickets(prev => [...prev, makeTicket(order, order.items.map(it => ({ ...it })))]);
  const addPartialTicket = (order, ids) => {
    const items = order.items.filter(it => ids.has(it.lineId)).map(it => ({ ...it }));
    if (items.length) setTickets(prev => [...prev, makeTicket(order, items)]);
  };
  const updateTicket = (id, patch) => setTickets(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
  const updateTicketItem = (id, idx, patch) => setTickets(prev => prev.map(t => t.id !== id ? t : { ...t, items: t.items.map((it, i) => i === idx ? { ...it, ...patch } : it) }));
  const removeTicket = (id) => setTickets(prev => prev.filter(t => t.id !== id));

  const validate = (t) => {
    const m = [];
    if (!t.channel) m.push('渠道'); if (!t.weight) m.push('重量'); if (!t.packageCount) m.push('件数');
    const a = t.address || {};
    if (!(a.name || t.customerName)) m.push('收件人'); if (!a.zip) m.push('邮编'); if (!a.address1) m.push('地址');
    return m;
  };
  const allValid = tickets.length > 0 && tickets.every(t => validate(t).length === 0);

  const exportExcel = () => {
    const tpl = COURIERS[courier];
    const ws = XLSX.utils.aoa_to_sheet([tpl.headers, ...tickets.map(tpl.build)]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    XLSX.writeFile(wb, `${tpl.name}发票_${dateStr}_${tickets.length}票.xlsx`);
  };

  return (
    <>
      <div className="card">
        <div style={{display:'flex', gap:12, alignItems:'center', flexWrap:'wrap', marginBottom:12}}>
          <div><label className="muted" style={{display:'block', marginBottom:4}}>快递公司</label>
            <select className="inp" style={{width:130}} value={courier} onChange={e => setCourier(e.target.value)}>
              {Object.entries(COURIERS).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
            </select></div>
          <div><label className="muted" style={{display:'block', marginBottom:4}}>日期</label>
            <input type="date" className="inp" style={{width:150}} value={dateStr} onChange={e => setDateStr(e.target.value)} /></div>
          <div style={{flex:1, minWidth:220}}><label className="muted" style={{display:'block', marginBottom:4}}>搜订单号(留空 = 显示最近订单)</label>
            <div style={{display:'flex', gap:6}}>
              <input className="inp" value={search} onChange={e => setSearch(e.target.value)} placeholder="XM8T31234602 / VK116373 ..." onKeyDown={e => e.key === 'Enter' && doSearch()} />
              <button className="btn-pri btn" onClick={doSearch} disabled={loading} style={{whiteSpace:'nowrap'}}>{loading ? '⏳' : '🔍 搜索'}</button>
            </div></div>
          <div style={{alignSelf:'flex-end'}}>
            {conn === 'ok' && <span className="status-dot" style={{background:'#dcfce7', color:'#15803d'}}>● 订单库已连接</span>}
            {conn === 'fail' && <span className="status-dot" style={{background:'#fee2e2', color:'#b91c1c'}}>● 连接失败</span>}
            {conn === 'loading' && <span className="status-dot" style={{background:'#f5f5f7', color:'#86868b'}}>● 连接中…</span>}
          </div>
        </div>
        {err && <div style={{padding:'10px 12px', background:'#fef3c7', border:'1px solid #f59e0b', borderRadius:8, fontSize:12, color:'#92400e', lineHeight:1.6}}>⚠ {err}</div>}
      </div>

      <div style={{display:'grid', gridTemplateColumns: tickets.length > 0 ? '1fr 1fr' : '1fr', gap:14}}>
        <div className="card">
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10, flexWrap:'wrap'}}>
            <strong style={{fontSize:15}}>📦 订单列表</strong>
            <span className="muted">{orders.length} 单 · 同一订单可拆多票</span>
            <div style={{flex:1}}/>
            <button className="btn btn-sm" onClick={loadRecent}>🔄 刷新最近</button>
          </div>
          {loading && <div style={{padding:30, textAlign:'center', color:'#86868b'}}>⏳ 加载中…</div>}
          {!loading && orders.length === 0 && <div style={{padding:30, textAlign:'center', color:'#86868b'}}>{conn === 'fail' ? '连不上订单库,见上方提示' : '暂无订单'}</div>}
          {orders.map(o => <OrderCard key={o.orderId} order={o} assignedLineIds={assignedLineIds}
            onWhole={() => addWholeOrder(o)} onPartial={(ids) => addPartialTicket(o, ids)} />)}
        </div>

        {tickets.length > 0 && (
          <div className="card">
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10, flexWrap:'wrap'}}>
              <strong style={{fontSize:15}}>🧾 待导出发票</strong>
              <span className="muted">{tickets.length} 票</span>
              <div style={{flex:1}}/>
              {allValid ? <span className="pill" style={{background:'#dcfce7', color:'#15803d'}}>✓ 必填齐全</span> : <span className="pill" style={{background:'#fee2e2', color:'#b91c1c'}}>⚠ 有必填未填</span>}
              <button className="btn-good btn" onClick={exportExcel} disabled={!allValid}>📤 导出 {COURIERS[courier].name} Excel</button>
            </div>
            {tickets.map((t) => {
              const miss = validate(t); const a = t.address || {};
              const same = tickets.filter(x => x.sourceOrderId === t.sourceOrderId);
              const idxInOrder = same.indexOf(t) + 1;
              return (
                <div key={t.id} style={{border:'1px solid #e5e5e7', borderRadius:10, padding:11, marginBottom:9, background: miss.length ? '#fffdf8' : '#fafffe'}}>
                  <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap', marginBottom:7}}>
                    <strong style={{fontSize:13}}>🧾 {t.orderNumber}</strong>
                    {same.length > 1 && <span className="pill" style={{background:'#fef9c3', color:'#854d0e'}}>第 {idxInOrder}/{same.length} 票</span>}
                    <span className="muted">{a.name || t.customerName} · {a.city} {a.province} {a.zip}</span>
                    {miss.length > 0 && <span className="pill" style={{background:'#fee2e2', color:'#b91c1c'}}>缺:{miss.join('/')}</span>}
                    <div style={{flex:1}}/>
                    <button className="btn btn-sm" onClick={() => removeTicket(t.id)}>移除</button>
                  </div>
                  <div className="muted" style={{marginBottom:7, fontSize:11}}>📍 {[a.address1, a.address2].filter(Boolean).join(' ')} {a.zip} · 📞 {a.phone || t.customerPhone || '-'}</div>
                  <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:7}}>
                    <div><label className="muted" style={{display:'block', fontSize:11}}>渠道 *</label>
                      <select className="inp" style={{width:160, borderColor: t.channel ? '#d2d2d7' : '#fca5a5'}} value={t.channel} onChange={e => updateTicket(t.id, { channel: e.target.value })}>
                        <option value="">— 选 —</option>{CHANNELS.map(c => <option key={c} value={c}>{c}</option>)}
                      </select></div>
                    <div><label className="muted" style={{display:'block', fontSize:11}}>重量 kg *</label>
                      <input className="inp" style={{width:85, borderColor: t.weight ? '#d2d2d7' : '#fca5a5'}} type="number" step="0.001" value={t.weight} onChange={e => updateTicket(t.id, { weight: e.target.value })} /></div>
                    <div><label className="muted" style={{display:'block', fontSize:11}}>件数 *</label>
                      <input className="inp" style={{width:65}} type="number" value={t.packageCount} onChange={e => updateTicket(t.id, { packageCount: e.target.value })} /></div>
                    <div style={{flex:1, minWidth:140}}><label className="muted" style={{display:'block', fontSize:11}}>运单备注</label>
                      <input className="inp" value={t.prepNote} onChange={e => updateTicket(t.id, { prepNote: e.target.value })} placeholder="实重复测/改加班船…" /></div>
                  </div>
                  <div className="scroll-x">
                    <table><thead><tr><th>英文</th><th>中文</th><th>数量</th><th>SKU</th><th>规格</th></tr></thead>
                      <tbody>{t.items.map((it, ii) => (
                        <tr key={ii}>
                          <td><input value={it.lampEn} onChange={e => updateTicketItem(t.id, ii, { lampEn: e.target.value })} /></td>
                          <td><input value={it.lampCn} onChange={e => updateTicketItem(t.id, ii, { lampCn: e.target.value })} style={{minWidth:45}} /></td>
                          <td><input type="number" value={it.quantity} onChange={e => updateTicketItem(t.id, ii, { quantity: e.target.value })} style={{minWidth:45}} /></td>
                          <td><input value={it.sku} onChange={e => updateTicketItem(t.id, ii, { sku: e.target.value })} /></td>
                          <td><input value={it.spec} onChange={e => updateTicketItem(t.id, ii, { spec: e.target.value })} style={{minWidth:110}} /></td>
                        </tr>))}</tbody></table>
                  </div>
                  {t.items.length > 5 && <div style={{fontSize:11, color:'#b91c1c', marginTop:4}}>⚠ 超 5 个产品,昌晖只支持 5 个/票,请拆票</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}

function OrderCard({ order, assignedLineIds, onWhole, onPartial }) {
  const [chosen, setChosen] = useState(new Set());
  const a = order.address || {};
  const multi = order.items.length > 1;
  const allAssigned = order.items.every(it => assignedLineIds.has(it.lineId));
  const toggle = (id) => setChosen(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });
  return (
    <div className="order-card" style={{opacity: allAssigned ? 0.6 : 1}}>
      <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:6}}>
        <strong style={{fontSize:14}}>🧾 {order.orderNumber}</strong>
        <span className="pill" style={{background:'#eef2ff', color:'#4338ca'}}>{order.platform || '?'}</span>
        {multi && <span className="pill" style={{background:'#fef9c3', color:'#854d0e'}}>{order.items.length} 个产品</span>}
        {allAssigned && <span className="pill" style={{background:'#dcfce7', color:'#15803d'}}>✓ 已加入</span>}
        <div style={{flex:1}}/>
        <span className="muted">{order.createdAt ? new Date(order.createdAt).toLocaleDateString('zh-CN') : ''}</span>
      </div>
      <div style={{background:'#f8fafc', borderRadius:8, padding:'7px 10px', marginBottom:8, fontSize:12, lineHeight:1.6}}>
        <div><strong>📍 {a.name || order.customerName}</strong></div>
        <div className="muted">{[a.address1, a.address2].filter(Boolean).join(' ')}</div>
        <div className="muted">{a.city} {a.province} {a.zip} · {a.country_code || a.country} · 📞 {a.phone || order.customerPhone || '-'}</div>
      </div>
      <div style={{marginBottom:8}}>
        {order.items.map(it => {
          const assigned = assignedLineIds.has(it.lineId);
          return (
            <div key={it.lineId} className="prod-row">
              {multi && <input type="checkbox" checked={chosen.has(it.lineId)} disabled={assigned} onChange={() => toggle(it.lineId)} />}
              {it.image_url ? <img className="thumb" src={it.image_url} alt="" /> : <div className="thumb" style={{display:'flex', alignItems:'center', justifyContent:'center', fontSize:16}}>💡</div>}
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{it.lampCn} · {it.title}</div>
                <div className="muted">{it.sku} {it.spec ? '· ' + it.spec : ''} · ×{it.quantity}</div>
              </div>
              {assigned && <span className="pill" style={{background:'#dcfce7', color:'#15803d'}}>已分票</span>}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
        <button className="btn-pri btn btn-sm" onClick={() => { onWhole(); setChosen(new Set()); }} disabled={allAssigned}>整单做 1 票</button>
        {multi && <button className="btn btn-sm" onClick={() => { onPartial(chosen); setChosen(new Set()); }} disabled={chosen.size === 0}>➕ 勾选 {chosen.size} 个做 1 票(拆票)</button>}
      </div>
    </div>
  );
}

function Reconcile() {
  const [rows, setRows] = useState([]); const [fileName, setFileName] = useState('');
  const fileRef = useRef(null);
  const handleFile = (file) => {
    const r = new FileReader();
    r.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const aoa = XLSX.utils.sheet_to_json(ws, { header: 1 });
      const dataRows = aoa.slice(1).filter(rr => rr && rr[1]);
      setRows(dataRows.map(rr => ({ date:rr[0], orderNumber:String(rr[1]||''), waybill:rr[2], channel:rr[4], totalPieces:rr[12], recvWeight:rr[13], settleWeight:rr[15], girth:rr[11], note:rr[16]||'' })));
      setFileName(file.name);
    };
    r.readAsBinaryString(file);
  };
  const flag = (r) => /超长|超围|超重|加纸箱/.test((r.note||'').toString());
  const abn = rows.filter(flag).length;
  return (
    <div className="card">
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12, flexWrap:'wrap'}}>
        <strong style={{fontSize:15}}>📥 收货回传对账</strong>
        <span className="muted">导入快递回传表(北简 17 列)· 附加费标红</span>
        <div style={{flex:1}}/>
        <button className="btn-pri btn" onClick={() => fileRef.current?.click()}>📂 导入回传表</button>
        <input ref={fileRef} type="file" accept=".xls,.xlsx" style={{display:'none'}} onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); e.target.value=''; }} />
      </div>
      {fileName && <div className="muted" style={{marginBottom:8}}>📄 {fileName} · {rows.length} 条 · {abn > 0 ? <span style={{color:'#b91c1c', fontWeight:600}}>⚠ {abn} 条有附加费</span> : <span style={{color:'#15803d'}}>✓ 无异常</span>}</div>}
      {rows.length > 0 ? (
        <div className="scroll-x"><table>
          <thead><tr><th>订单号</th><th>运单号</th><th>渠道</th><th>件数</th><th>收货实重</th><th>结算重</th><th>围长</th><th>备注</th></tr></thead>
          <tbody>{rows.map((r, i) => { const f = flag(r); return (
            <tr key={i} style={{background: f ? '#fef2f2' : 'white'}}>
              <td style={{fontWeight:600}}>{r.orderNumber}</td><td>{r.waybill}</td><td>{r.channel}</td><td>{r.totalPieces}</td>
              <td>{r.recvWeight}</td><td>{r.settleWeight}</td><td>{r.girth}</td>
              <td style={{maxWidth:160, whiteSpace:'normal', color: f ? '#b91c1c' : 'inherit', fontWeight: f ? 600 : 400}}>{r.note}</td>
            </tr>); })}</tbody>
        </table></div>
      ) : <div style={{padding:40, textAlign:'center', color:'#86868b'}}>导入快递回传的收货 Excel 开始对账</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
