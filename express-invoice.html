function detectMaterial(t) {
  const brass = /brass|黄铜|纯铜|红铜|red copper|bronze/i.test(t);
  return brass ? 'Brass' : 'Plastic + metal';
}

function getItemHs(item) {
  for (const k of ['hs_code', 'hs', 'hsCode', 'harmonized_code', 'harmonized_system_code', 'customs_hs', 'tariff_code', 'hts_code']) {
    const v = item && item[k];

      if (d.length >= 6) return d;
    }
  }
  return null;
}
function getLampInfo(item) {
  const t = ((item.title || '') + ' ' + (item.variant_title || '') + ' ' + (item.sku || '')).toLowerCase();

function normOrderKey(k) {
  let s = String(k || '').trim().replace(/\s+/g, '');
  s = s.replace(/^#+/, ''); // 🆕 昌晖现在订单号带 #(#RD19905)→ 去掉,加不加 # 都能匹配
  const m = s.match(/BU-([A-Za-z0-9]+)$/i); // XBU-Y(补发并换新单号)→ 用新单号 Y(如 V95907BU-K113962 → K113962)
  if (m) return m[1];
  s = s.replace(/BU$/i, ''); // XBU(补发,无新号)→ 基础单号 X(如 V105631BU → V105631)
  s = s.replace(/-\d+$/, ''); // X-N(子单)→ X(如 K112846-1 → K112846)
  return s;
}
function isReshipKey(k) {

function pickItemImage(li) {
  if (!li) return '';
  const cands = [li.image_url, li.imageUrl, li.img, li.img_url, li.thumbnail, li.thumb, li.product_image, li.featured_image, li.image];

      const s = c.src || c.url || c.image_url;
      if (s) return s;

function normalizeOrderShape(raw, shopDomain) {
  if (!raw) return null;

  if (raw.shopify_order_number !== undefined && raw.shop_domain !== undefined) return raw;

  if (raw.number !== undefined && (raw.billing || raw.shipping)) {

      shipping = raw.shipping || {};

        quantity: li.quantity || 1,

        image_url: pickItemImage(li)
      })),
      shopify_created_at: raw.date_created_gmt ? raw.date_created_gmt + 'Z' : raw.date_created,
      note: raw.customer_note || raw.note || null,
      raw_payload: raw
    };
  }
  // Shopify REST 原始
  if (raw.name !== undefined || raw.order_number !== undefined) {
    const sa = raw.shipping_address || raw.billing_address || {},
      customer = raw.customer || {};
    return {
      shopify_order_number: (raw.name || '').replace(/^#/, '') || String(raw.order_number || raw.id),
      shopify_order_id: raw.id,

      customer_phone: sa.phone || raw.phone || customer.phone || '',
      total_price: raw.total_price,

      shipping_address: {
        name: sa.name || '',

        address1: sa.address1 || '',
        address2: sa.address2 || '',
        city: sa.city || '',
        province: sa.province || '',
        province_code: sa.province_code || '',
        country: sa.country || '',
        country_code: sa.country_code || '',
        zip: sa.zip || '',
        phone: sa.phone || ''
      },
      line_items: (raw.line_items || []).map(li => ({
        sku: li.sku || '',
        title: li.title || li.name || '',
        variant_title: li.variant_title || '',
        quantity: li.quantity || 1,

  if (!url) { _imgDiag.noUrl++; return null; }
  const _fail = () => { _imgDiag.fail++; if (_imgDiag.failUrls.length < 5) _imgDiag.failUrls.push(String(url).slice(0, 90)); return null; };
  try {
    let blob;
    if (/^data:/i.test(url)) {
      blob = await (await fetch(url)).blob();
    } else {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) return _fail();
      blob = await res.blob();
    }
    // 🆕 统一转 PNG:Shopify 现多发 webp,直接嵌会裂图/无图;转 PNG 后所有渠道都能正常嵌
    const png = await _imgBlobToPng(blob);
    if (png && png.byteLength) { _imgDiag.ok++; return { buf: png, ext: 'png' }; }
    // 兜底:本就是 png/jpeg/gif 的原样嵌
    const tp = (blob.type || '').toLowerCase();
    if (tp.includes('png')) { _imgDiag.ok++; return { buf: await blob.arrayBuffer(), ext: 'png' }; }
    if (tp.includes('jpeg') || tp.includes('jpg')) { _imgDiag.ok++; return { buf: await blob.arrayBuffer(), ext: 'jpeg' }; }
    if (tp.includes('gif')) { _imgDiag.ok++; return { buf: await blob.arrayBuffer(), ext: 'gif' }; }
    return _fail();
  } catch (e) {
    return _fail();
  }
}
