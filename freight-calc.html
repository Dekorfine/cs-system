  const computeBoxingPlan = (raw, ordQty, isCrate, chReg) => {
    if (!raw || !raw.l || !raw.w || !raw.h) return null;
    const sortedU = [raw.l + BASE_BUFFER, raw.w + BASE_BUFFER, raw.h + BASE_BUFFER].sort((a, b) => a - b);

      const girth = finalDims[0] + 2 * (finalDims[1] + finalDims[2]);

        secondSide: finalDims[1] >= 75,
        largeGirth: girth > 265,
        overWeight: totalA > 22.5
      };

      const crateCost = calculateCrateCost(finalDims[0], finalDims[1], finalDims[2]);
