<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统一工作台 · 客服 / 财务 / 报价</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#fafaf7;
  --paper:#ffffff;
  --ink:#1a1a17;
  --ink-2:#3a3a35;
  --ink-3:#7a7a72;
  --ink-4:#a8a8a0;
  --line:#e8e6e0;
  --line-soft:#f0eee8;
  --accent:#7c2d12;
  --accent-soft:rgba(124,45,18,.08);
  --accent-mid:rgba(124,45,18,.16);
  --good:#15803d;
  --good-soft:#dcfce7;
  --warn:#b45309;
  --warn-soft:#fef3c7;
  --bad:#b91c1c;
  --bad-soft:#fee2e2;
  --info:#1d4ed8;
  --info-soft:#dbeafe;
  --gold:#a16207;
  --gold-soft:#fef9c3;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  font-weight:500;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 18% 8%,rgba(124,45,18,.025) 0%,transparent 42%),
    radial-gradient(circle at 82% 92%,rgba(180,83,9,.025) 0%,transparent 42%);
  min-height:100vh;
}
.font-display{font-family:'Georgia','PingFang SC',serif;letter-spacing:.02em}
.font-mono{font-family:'JetBrains Mono','SF Mono',Consolas,'Courier New',monospace;font-feature-settings:'tnum' on}
.tabular-nums{font-variant-numeric:tabular-nums}

.paper{
  background:var(--paper);
  border:1px solid var(--line);
  box-shadow:0 1px 0 rgba(0,0,0,.02),0 1px 2px rgba(0,0,0,.02);
}

/* === Inputs === */
input,select,textarea{
  font-family:inherit;
  color:var(--ink);
  background:var(--paper);
  border:1.5px solid var(--line);
  border-radius:8px;
  padding:8px 12px;
  font-weight:600;
  outline:none;
  transition:all .15s;
  width:100%;
  font-size:13px;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
input::placeholder,textarea::placeholder{color:var(--ink-4);font-weight:400}
.input-mono{font-family:'JetBrains Mono',monospace;font-feature-settings:'tnum' on}
input[type=checkbox]{width:auto;cursor:pointer}

/* === Buttons === */
.btn-pri{
  background:var(--accent);color:white;font-weight:700;padding:8px 18px;
  border-radius:8px;border:none;cursor:pointer;transition:all .15s;
  font-family:inherit;font-size:13px;
}
.btn-pri:hover{background:#5c1f0d;transform:translateY(-1px);box-shadow:0 2px 8px rgba(124,45,18,.25)}
.btn-pri:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sec{
  background:white;color:var(--ink);font-weight:600;padding:6px 14px;
  border-radius:6px;border:1.5px solid var(--line);cursor:pointer;transition:all .15s;
  font-size:12px;font-family:inherit;
}
.btn-sec:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.btn-danger{background:var(--bad);color:white;font-weight:600;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit}
.btn-danger:hover{background:#7f1212}
.btn-ghost{background:transparent;color:var(--ink-3);font-weight:600;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.btn-ghost:hover{background:var(--line-soft);color:var(--ink)}

/* === Misc === */
.divider-h{height:1px;background:linear-gradient(to right,transparent,var(--line) 30%,var(--line) 70%,transparent)}
.label-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:white;font-weight:800;font-size:11px;
  font-family:'JetBrains Mono',monospace;
}
.code-block{
  background:var(--bg);border:1px dashed var(--line);
  padding:10px 14px;border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--ink-2);line-height:1.6;
  white-space:pre-wrap;word-break:break-all;
}

/* === Tags === */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tag-good{background:var(--good-soft);color:var(--good)}
.tag-warn{background:var(--warn-soft);color:var(--warn)}
.tag-bad{background:var(--bad-soft);color:var(--bad)}
.tag-info{background:var(--info-soft);color:var(--info)}
.tag-gold{background:var(--gold-soft);color:var(--gold)}
.tag-neutral{background:var(--line-soft);color:var(--ink-3)}

/* === Status colors for CS rows === */
.status-bar{width:4px;border-radius:2px;align-self:stretch}
.status-pending{background:#a8a8a0}
.status-following{background:#eab308}
.status-waiting{background:#3b82f6}
.status-resolved{background:#22c55e}
.status-overdue{background:#ef4444}

/* === Scrollbar === */
.scrollbar-thin::-webkit-scrollbar{height:8px;width:8px}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.scrollbar-thin::-webkit-scrollbar-thumb:hover{background:var(--ink-4)}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent}

/* === Tabs === */
.tab-btn{
  padding:10px 18px;border:none;background:transparent;
  font-family:'Georgia','PingFang SC',serif;font-size:14px;font-weight:700;
  color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;letter-spacing:.02em;
  display:inline-flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;
  background:var(--bad);color:white;border-radius:9px;
  font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;
}

/* === Login screen === */
.login-bg{
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 30% 20%,rgba(124,45,18,.08) 0%,transparent 50%),
    radial-gradient(circle at 70% 80%,rgba(180,83,9,.06) 0%,transparent 50%),
    var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
}

/* === Animations === */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.6}}
.pulse-soft{animation:pulse-soft 2s ease-in-out infinite}

/* === Modal === */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(26,26,23,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:50;padding:20px;backdrop-filter:blur(2px);
}
.modal-card{
  background:white;border-radius:16px;max-width:90vw;max-height:90vh;
  overflow-y:auto;animation:fadeIn .2s ease;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

/* === Row hover === */
.row-hover{transition:background .12s}
.row-hover:hover{background:var(--accent-soft)}

/* === Toast === */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:white;padding:10px 20px;
  border-radius:8px;font-size:13px;font-weight:600;
  z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.2);
  animation:fadeIn .25s ease;
}

/* === Mini chart bars === */
.bar-track{
  height:8px;background:var(--line-soft);border-radius:4px;overflow:hidden;
}
.bar-fill{height:100%;background:var(--accent);transition:width .3s ease}

/* === Drop zone === */
.dropzone{
  border:2px dashed var(--line);border-radius:10px;
  padding:18px;text-align:center;
  background:var(--bg);transition:all .15s;cursor:pointer;
}
.dropzone:hover,.dropzone.dragover{
  border-color:var(--accent);background:var(--accent-soft);
}
.thumb{
  width:64px;height:64px;border-radius:6px;object-fit:cover;
  border:1.5px solid var(--line);cursor:pointer;
  transition:transform .15s;
}
.thumb:hover{transform:scale(1.05);border-color:var(--accent)}

/* === Difficulty buttons === */
.diff-btn{
  padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;
  border:1.5px solid var(--line);background:white;cursor:pointer;
  font-family:inherit;transition:all .1s;
}
.diff-btn.active-easy{background:var(--good);color:white;border-color:var(--good)}
.diff-btn.active-mid{background:var(--gold);color:white;border-color:var(--gold)}
.diff-btn.active-hard{background:var(--bad);color:white;border-color:var(--bad)}
.diff-btn.suggested{border-style:dashed;border-color:var(--accent);color:var(--accent)}

/* === Tabular === */
table{width:100%;border-collapse:collapse}
th,td{padding:10px 8px;text-align:left;font-size:12px}
th{background:var(--bg);color:var(--ink-3);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.06em;border-bottom:1.5px solid var(--line)}
td{border-bottom:1px solid var(--line-soft)}
tr:hover td{background:var(--accent-soft)}

/* === 报价单 / PI / 发票样式 === */
.invoice-doc{background:white;color:#1a1a17;font-family:'Inter','Noto Sans SC',-apple-system,sans-serif;padding:48px;max-width:880px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.invoice-doc h1{font-family:Georgia,serif;font-size:32px;font-weight:700;letter-spacing:.02em;margin:0 0 4px 0}
.invoice-doc h2{font-family:Georgia,serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7c2d12;margin:24px 0 8px 0;padding-bottom:4px;border-bottom:1px solid #e8e6e0}
.invoice-doc table{font-family:'Inter',sans-serif;font-size:12px}
.invoice-doc th{background:#f5f3ee;color:#3a3a35;font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.05em;border-bottom:2px solid #7c2d12;padding:10px 8px}
.invoice-doc td{border-bottom:1px solid #e8e6e0;padding:10px 8px;vertical-align:top}
.invoice-doc .seller-block{padding:16px;background:#fafaf7;border-left:3px solid #7c2d12;border-radius:4px}
.invoice-doc .field-label{font-size:10px;text-transform:uppercase;color:#7a7a72;letter-spacing:.06em;font-weight:600;margin-bottom:3px}
.invoice-doc .field-value{font-size:13px;color:#1a1a17;font-weight:500}
.invoice-doc .product-img{width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid #e8e6e0}
.invoice-doc .totals-row td{padding:6px 8px;font-size:13px}
.invoice-doc .totals-row.subtotal td{border-top:1.5px solid #1a1a17}
.invoice-doc .totals-row.grand td{font-weight:700;font-size:16px;border-top:2px solid #1a1a17;border-bottom:3px double #1a1a17;background:#fafaf7}

/* === 工单状态 === */
.ticket-status-pending{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.ticket-status-accepted{background:#dbeafe;color:#1e40af;border:1px solid #60a5fa}
.ticket-status-processing{background:#e0e7ff;color:#3730a3;border:1px solid #818cf8}
.ticket-status-resolved{background:#dcfce7;color:#166534;border:1px solid #4ade80}
.ticket-status-rejected{background:#fee2e2;color:#991b1b;border:1px solid #f87171}
.ticket-pri-low{background:#f1f5f9;color:#475569}
.ticket-pri-mid{background:#fef3c7;color:#92400e}
.ticket-pri-high{background:#fee2e2;color:#991b1b;font-weight:700}

/* === 知识库样式 === */
.kb-card{background:white;border:1px solid var(--line);border-radius:10px;padding:14px;transition:all .15s}
.kb-card:hover{border-color:var(--accent-mid);box-shadow:0 2px 8px rgba(124,45,18,.06)}
.kb-answer{background:var(--bg);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.65;white-space:pre-wrap;font-family:inherit;color:var(--ink-2)}
.kb-placeholder{background:rgba(180,83,9,.12);color:#b45309;padding:1px 4px;border-radius:2px;font-weight:600}
.kb-cat-tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

/* === 云同步状态条 === */
.cloud-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'JetBrains Mono',monospace}
.cloud-status.ok{background:#dcfce7;color:#166534}
.cloud-status.local{background:#f1f5f9;color:#475569}
.cloud-status.err{background:#fee2e2;color:#991b1b}
.cloud-status .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cloud-status.ok .dot{background:#22c55e;animation:pulse 2s infinite}
.cloud-status.local .dot{background:#94a3b8}
.cloud-status.err .dot{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* === Print-friendly quote === */
@media print{
  .no-print{display:none !important}
  body{background:white}
  .paper{box-shadow:none;border:none}
  .invoice-doc{padding:24px;box-shadow:none;max-width:none}
  @page{size:A4;margin:12mm}
}

/* === Sticky table === */
.sticky-th{position:sticky;top:0;z-index:5;background:var(--bg)}
</style>

<div id="root"></div>
<script type="text/babel" data-presets="react,env">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ============================================================
// 工具
// ============================================================
const todayISO = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
const fmt = n => isFinite(n) ? Math.round(n).toLocaleString() : '-';
const fmt2 = n => isFinite(n) ? n.toFixed(2) : '-';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const daysBetween = (a, b) => {
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 86400000);
};
const addDays = (iso, days) => {
  const d = new Date(iso);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
};
const minutesBetween = (start, end) => {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let diff = (eh*60+em) - (sh*60+sm);
  if (diff < 0) diff += 24*60;
  return diff;
};
const fmtDuration = mins => {
  if (!mins) return '0min';
  if (mins < 60) return mins + 'min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h${m}m` : `${h}h`;
};

// 是否为过去日期（早于今天）
const isPastDate = (iso) => iso && iso < new Date().toISOString().slice(0,10);

// 综合判定记录是否可编辑：当天 = 可编辑；过去 = 仅主管解锁后可编辑
const canEditRecord = (record, user, adminUnlock) => {
  if (!record) return false;
  if (!isPastDate(record.date)) return true;       // 当天/未来日期始终可编辑
  if (user.role === 'admin' && adminUnlock) return true;  // 主管解锁
  return false;
};

// CSV 导出工具
const csvEscape = (val) => {
  if (val === null || val === undefined) return '';
  const s = String(val);
  if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
};
const downloadCSV = (rows, filename) => {
  // 加 BOM 确保 Excel 中文不乱码
  const csv = '\uFEFF' + rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
};

// 桌面通知封装（安全调用，浏览器不支持时静默失败）
const sendDesktopNotification = (title, body, tag) => {
  try {
    if (typeof Notification === 'undefined') return false;
    if (Notification.permission !== 'granted') return false;
    new Notification(title, { body, tag, icon: undefined });
    return true;
  } catch (e) { return false; }
};

// ============================================================
// 存储层 (localStorage 命名空间)
// ============================================================
const STORE = {
  k: (s) => 'workspace_v1_' + s,
  get(key, def) {
    try { const v = localStorage.getItem(this.k(key)); return v ? JSON.parse(v) : def; }
    catch(e) { return def; }
  },
  set(key, val) {
    try { localStorage.setItem(this.k(key), JSON.stringify(val)); }
    catch(e) { console.error(e); }
  },
  del(key) { try { localStorage.removeItem(this.k(key)); } catch(e) {} }
};

// ============================================================
// 云同步层 (Supabase)
// ============================================================
// 默认配置（用户可在"设置"页修改后保存到 localStorage）
const DEFAULT_SB_URL = 'https://kwrajryhwyytkjkkidor.supabase.co';
const DEFAULT_SB_KEY = '';  // 由用户在设置页填入

const CLOUD = {
  client: null,
  enabled: false,
  status: 'local',  // 'local' | 'ok' | 'err'
  lastError: '',

  init(url, key) {
    if (!url || !key) { this.enabled = false; this.status = 'local'; return false; }
    try {
      if (!window.supabase || !window.supabase.createClient) {
        this.status = 'err'; this.lastError = 'Supabase SDK 未加载'; return false;
      }
      this.client = window.supabase.createClient(url, key);
      this.enabled = true;
      this.status = 'ok';
      return true;
    } catch(e) {
      this.enabled = false; this.status = 'err'; this.lastError = e.message;
      return false;
    }
  },

  async ping() {
    if (!this.client) return { ok:false, msg:'未配置' };
    try {
      const { error } = await this.client.from('workspace_records').select('id', { count:'exact', head:true }).limit(1);
      if (error && error.code !== 'PGRST116') {  // table not found is also an error
        this.status = 'err'; this.lastError = error.message;
        return { ok:false, msg: error.message };
      }
      this.status = 'ok';
      return { ok:true, msg:'连接正常' };
    } catch(e) {
      this.status = 'err'; this.lastError = e.message;
      return { ok:false, msg: e.message };
    }
  },

  // 通用 CRUD
  async list(table, opts = {}) {
    if (!this.client) return null;
    try {
      let q = this.client.from(table).select('*');
      if (opts.order) q = q.order(opts.order.col, { ascending: opts.order.asc !== false });
      if (opts.eq) Object.entries(opts.eq).forEach(([k,v]) => q = q.eq(k, v));
      if (opts.limit) q = q.limit(opts.limit);
      const { data, error } = await q;
      if (error) throw error;
      return data || [];
    } catch(e) { console.error('CLOUD.list', table, e); return null; }
  },
  async upsert(table, row) {
    if (!this.client) return null;
    try {
      const { data, error } = await this.client.from(table).upsert(row).select();
      if (error) throw error;
      return data;
    } catch(e) { console.error('CLOUD.upsert', table, e); return null; }
  },
  async del(table, id) {
    if (!this.client) return false;
    try {
      const { error } = await this.client.from(table).delete().eq('id', id);
      if (error) throw error;
      return true;
    } catch(e) { console.error('CLOUD.del', table, e); return false; }
  },
};

// ============================================================
// 初始员工数据

const INITIAL_EMPLOYEES = [

  { id:'u_tammy', name:'伍家家', alias:'Tammy', sites:'处理拒付+VK', role:'staff', password:'123456' },
  { id:'u_yulia', name:'陶艳巧', alias:'Yulia', sites:'RD, PL, MO', role:'staff', password:'123456' },
  { id:'u_ashley', name:'侯泳珊', alias:'Ashley', sites:'', role:'staff', password:'123456' },

  { id:'u_luna', name:'杨甜', alias:'Luna', sites:'', role:'staff', password:'123456' },

const useToast = () => {
  const [msg, setMsg] = useState(null);
  const show = useCallback((m) => {
    setMsg(m);
    setTimeout(() => setMsg(null), 2200);
  }, []);
  const node = msg ? <div className="toast">{msg}</div> : null;
  return [show, node];
};

const CSModule = ({ user, employees, records, setRecords, onTrash, toast }) => {
  const [viewDate, setViewDate] = useState(todayISO());
  const [filterStatus, setFilterStatus] = useState('all');
  const [showAll, setShowAll] = useState(false); // 主管查看所有人

  // 搜索 + 筛选
  const [search, setSearch] = useState('');
  const [filterSite, setFilterSite] = useState('all');
  const [filterCategory, setFilterCategory] = useState('all');
  const [filterDifficulty, setFilterDifficulty] = useState('all');
  const [filterOwner, setFilterOwner] = useState('all'); // 仅 admin 用
  const [showFilters, setShowFilters] = useState(false);
  const [dateRange, setDateRange] = useState('day'); // day | 7d | 30d | range | all
  const [rangeStart, setRangeStart] = useState(todayISO());
  const [rangeEnd, setRangeEnd] = useState(todayISO());

  // 主管解锁历史日期编辑（仅当前会话有效，刷新或切日重置）
  const [adminUnlock, setAdminUnlock] = useState(false);

  const isAdmin = user.role === 'admin';

  // 个人 vs 团队视图
  const visibleRecords = useMemo(() => {
    let list = records.filter(r => !r.deleted);
    if (!isAdmin || !showAll) {
      list = list.filter(r => r.ownerId === user.id);
    }
    return list;
  }, [records, isAdmin, showAll, user.id]);

  // 切日时自动重置主管解锁
  useEffect(() => {
    if (!isPastDate(viewDate)) setAdminUnlock(false);
  }, [viewDate]);

  // 当日记录
  const dayRecords = useMemo(() => {
    return visibleRecords.filter(r => r.date === viewDate);
  }, [visibleRecords, viewDate]);

  // 表格显示用：当日 + 搜索/筛选
  const tableRecords = useMemo(() => {
    let list = dayRecords;
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(r =>
        (r.customer||'').toLowerCase().includes(q) ||
        (r.orderRef||'').toLowerCase().includes(q) ||
        (r.note||'').toLowerCase().includes(q)
      );
    }
    if (filterStatus !== 'all') list = list.filter(r => r.status === filterStatus);
    if (filterSite !== 'all') list = list.filter(r => r.site === filterSite);
    if (filterCategory !== 'all') list = list.filter(r => r.category === filterCategory);
    if (filterDifficulty !== 'all') list = list.filter(r => r.difficulty === filterDifficulty);
    if (isAdmin && showAll && filterOwner !== 'all') list = list.filter(r => r.ownerId === filterOwner);
    return list;
  }, [dayRecords, search, filterStatus, filterSite, filterCategory, filterDifficulty, filterOwner, isAdmin, showAll]);

  // 导出范围：根据 dateRange 决定，跨日期
  const exportRecords = useMemo(() => {
    const today = todayISO();
    let list = visibleRecords;
    if (dateRange === 'day') {
      list = list.filter(r => r.date === viewDate);
    } else if (dateRange === '7d') {
      const start = addDays(today, -6);
      list = list.filter(r => r.date >= start && r.date <= today);
    } else if (dateRange === '30d') {
      const start = addDays(today, -29);
      list = list.filter(r => r.date >= start && r.date <= today);
    } else if (dateRange === 'range') {
      list = list.filter(r => r.date >= rangeStart && r.date <= rangeEnd);
    }
    // 同样应用搜索 + 筛选
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(r =>
        (r.customer||'').toLowerCase().includes(q) ||
        (r.orderRef||'').toLowerCase().includes(q) ||
        (r.note||'').toLowerCase().includes(q)
      );
    }
    if (filterStatus !== 'all') list = list.filter(r => r.status === filterStatus);
    if (filterSite !== 'all') list = list.filter(r => r.site === filterSite);
    if (filterCategory !== 'all') list = list.filter(r => r.category === filterCategory);
    if (filterDifficulty !== 'all') list = list.filter(r => r.difficulty === filterDifficulty);
    if (isAdmin && showAll && filterOwner !== 'all') list = list.filter(r => r.ownerId === filterOwner);
    return list;
  }, [visibleRecords, dateRange, viewDate, rangeStart, rangeEnd, search, filterStatus, filterSite, filterCategory, filterDifficulty, filterOwner, isAdmin, showAll]);

  // 导出 CSV
  const handleExport = () => {
    if (exportRecords.length === 0) { toast('⚠️ 当前筛选无记录'); return; }
    const header = ['日期','员工','状态','客户','网站','开始时间','结束时间','时长(分钟)','难度','咨询事项','订单号','备注','下次跟进','截图数','跟进次数','创建时间','更新时间'];
    const rows = [header];
    const diffMap = { easy:'简单', mid:'中等', hard:'复杂' };
    const statusMap = Object.fromEntries(STATUSES.map(s => [s.key, s.label]));
    exportRecords.forEach(r => {
      const emp = employees.find(e => e.id === r.ownerId);
      rows.push([
        r.date,
        emp ? (emp.name + (emp.alias ? ' ' + emp.alias : '')) : '—',
        statusMap[r.status] || r.status,
        r.customer || '',
        r.site || '',
        r.startTime || '',
        r.endTime || '',
        r.durationMin || 0,
        diffMap[r.difficulty] || '',
        r.category || '',
        r.orderRef || '',
        r.note || '',
        r.nextFollowUp || '',
        (r.screenshots || []).length,
        (r.followUps || []).length,
        r.createdAt || '',
        r.updatedAt || '',
      ]);
    });
    const tag = dateRange === 'day' ? viewDate : dateRange === '7d' ? '近7天' : dateRange === '30d' ? '近30天' : dateRange === 'range' ? `${rangeStart}_${rangeEnd}` : '全部';
    const filename = `客服跟进_${tag}_${todayISO()}.csv`;
    downloadCSV(rows, filename);
    toast(`✓ 已导出 ${exportRecords.length} 条记录`);
  };

  // 跟进提醒 (跨日期: 所有未解决 且 nextFollowUp <= today 的记录)
  const today = todayISO();
  const reminders = useMemo(() => {
    return visibleRecords.filter(r => r.status !== 'resolved' && r.nextFollowUp);
  }, [visibleRecords]);

  const overdueCount = reminders.filter(r => r.nextFollowUp < today).length;
  const todayCount = reminders.filter(r => r.nextFollowUp === today).length;
  const futureCount = reminders.filter(r => r.nextFollowUp > today).length;
  const waitingCount = reminders.filter(r => r.status === 'waiting').length;

  // 统计卡片数据
  const stats = useMemo(() => {
    const totalEmails = dayRecords.length;
    const totalMins = dayRecords.reduce((s, r) => s + (r.durationMin || 0), 0);
    const easyN = dayRecords.filter(r => r.difficulty === 'easy').length;
    const midN = dayRecords.filter(r => r.difficulty === 'mid').length;
    const hardN = dayRecords.filter(r => r.difficulty === 'hard').length;
    const followingN = dayRecords.filter(r => r.status !== 'resolved').length;
    return { totalEmails, totalMins, easyN, midN, hardN, followingN };
  }, [dayRecords]);

  // 添加新行
  const addRow = () => {
    const newRec = {
      id: uid(),
      ownerId: user.id,
      date: viewDate,
      createdAt: nowISO(),
      updatedAt: nowISO(),
      status: 'pending',
      customer: '',
      site: '',
      startTime: '',
      endTime: '',
      durationMin: 0,
      difficulty: '',
      diffSuggested: false,
      category: '',
      orderRef: '',
      note: '',
      nextFollowUp: '',
      screenshots: [], // [{id, data, name}]
      followUps: [],   // [{id, time, text, status, screenshots}]
      deleted: false,
    };
    setRecords(prev => [...prev, newRec]);
  };

  // 更新字段
  const updateRow = (id, patch) => {
    setRecords(prev => prev.map(r => {
      if (r.id !== id) return r;
      const updated = { ...r, ...patch, updatedAt: nowISO() };
      // 自动计算时长
      if (patch.startTime !== undefined || patch.endTime !== undefined) {
        updated.durationMin = minutesBetween(updated.startTime, updated.endTime);
        // 时长变动 -> 重新建议难度 (如果还是建议态)
        if (updated.diffSuggested || !updated.difficulty) {
          const sug = suggestDifficulty(updated.category, updated.durationMin);
          updated.difficulty = sug;
          updated.diffSuggested = true;
        }
      }
      // 类别变动 -> 重新建议难度 (如果还是建议态)
      if (patch.category !== undefined && (updated.diffSuggested || !updated.difficulty)) {
        const sug = suggestDifficulty(patch.category, updated.durationMin);
        updated.difficulty = sug;
        updated.diffSuggested = true;
      }
      // 设置了 nextFollowUp 自动切换到 following
      if (patch.nextFollowUp && updated.status === 'pending') {
        updated.status = 'following';
      }
      return updated;
    }));
  };

  // 删除 (软删除到回收站)
  const deleteRow = (id) => {
    if (!confirm('确认放入回收站？主管可恢复。')) return;
    setRecords(prev => prev.map(r => r.id === id ? {
      ...r,
      deleted: true,
      deletedAt: nowISO(),
      deletedBy: user.id,
    } : r));
    toast('✓ 已放入回收站');
  };

  // 计算状态 (含逾期判定)
  const getDisplayStatus = (r) => {
    if (r.status === 'resolved') return 'resolved';
    if (r.nextFollowUp && r.nextFollowUp < today) return 'overdue';
    return r.status;
  };

  // 跟进窗口 modal state
  const [followUpModal, setFollowUpModal] = useState(null); // record id or null

  return (
    <div className="space-y-5">
      {/* 跟进提醒卡 */}
      <div className="paper rounded-2xl p-4 fade-in">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <Icon name="pin" className="w-5 h-5" style={{color:'var(--accent)'}} />
            <span className="font-display text-base font-bold">跟进提醒</span>
            <span className="tag tag-neutral">共 {reminders.length}</span>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <span className="text-xs flex items-center gap-1.5" style={{color:'var(--ink-2)'}}>
              <span className="inline-block w-2.5 h-2.5 rounded-full" style={{background:'var(--bad)'}}></span>
              逾期 <span className="font-mono font-bold">{overdueCount}</span>
            </span>
            <span className="text-xs flex items-center gap-1.5" style={{color:'var(--ink-2)'}}>
              <span className="inline-block w-2.5 h-2.5 rounded-full" style={{background:'var(--gold)'}}></span>
              今日 <span className="font-mono font-bold">{todayCount}</span>
            </span>
            <span className="text-xs flex items-center gap-1.5" style={{color:'var(--ink-2)'}}>
              <span className="inline-block w-2.5 h-2.5 rounded-full" style={{background:'var(--info)'}}></span>
              未来 <span className="font-mono font-bold">{futureCount}</span>
            </span>
            <span className="text-xs flex items-center gap-1.5" style={{color:'var(--ink-2)'}}>
              ⌛ 等客户 <span className="font-mono font-bold">{waitingCount}</span>
            </span>
          </div>
        </div>
      </div>

      {/* 日期 / 视图切换 */}
      <div className="paper rounded-2xl p-4 fade-in">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-wrap">
            <button className="btn-sec" onClick={() => setViewDate(addDays(viewDate, -1))}>←</button>
            <input type="date" value={viewDate} onChange={e => setViewDate(e.target.value)} style={{width:'160px'}} />
            <button className="btn-sec" onClick={() => setViewDate(addDays(viewDate, 1))}>→</button>
            <span className="font-display text-lg font-bold ml-2">
              {viewDate.slice(5,7)}月{viewDate.slice(8,10)}日
            </span>
            <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
              {['周日','周一','周二','周三','周四','周五','周六'][new Date(viewDate).getDay()]}
            </span>
            {viewDate !== today && (
              <button className="btn-ghost text-[11px]" onClick={() => setViewDate(today)}>→ 今天</button>
            )}
            {isPastDate(viewDate) && (
              <span className="tag" style={{background:adminUnlock?'rgba(202,138,4,0.12)':'rgba(168,168,160,0.18)', color:adminUnlock?'var(--gold)':'var(--ink-3)', borderColor:adminUnlock?'var(--gold)':'var(--line)', borderWidth:'1px', borderStyle:'solid'}}>
                {adminUnlock ? '🔓 已解锁' : '🔒 历史只读'}
              </span>
            )}
            {isAdmin && isPastDate(viewDate) && (
              <button className="btn-ghost text-[11px]" onClick={() => {
                if (!adminUnlock) {
                  if (confirm('解锁历史日期编辑？\n\n注意：仅主管可执行此操作。修改历史记录将影响绩效统计与审计追溯，请谨慎操作。')) {
                    setAdminUnlock(true);
                    toast('🔓 已临时解锁历史日期，切换日期或刷新后自动恢复锁定');
                  }
                } else {
                  setAdminUnlock(false);
                  toast('🔒 已重新锁定');
                }
              }}>
                {adminUnlock ? '重新锁定' : '主管解锁'}
              </button>
            )}
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {isAdmin && (
              <label className="text-xs flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" checked={showAll} onChange={e => setShowAll(e.target.checked)} />
                查看所有员工
              </label>
            )}
          </div>
        </div>
      </div>

      {/* 搜索 + 筛选 + 导出 工具条 */}
      <div className="paper rounded-2xl p-3 fade-in">
        <div className="flex items-center gap-2 flex-wrap">
          <div className="relative flex-1" style={{minWidth:'200px', maxWidth:'320px'}}>
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="🔍 搜索客户 / 订单号 / 备注..."
              style={{padding:'7px 30px 7px 12px', fontSize:'13px', width:'100%'}}
            />
            {search && (
              <button onClick={() => setSearch('')}
                style={{position:'absolute', right:'6px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--ink-3)', fontSize:'16px', padding:'4px 6px'}}
                title="清空">×</button>
            )}
          </div>
          <button className={`btn-sec text-xs`} onClick={() => setShowFilters(!showFilters)}>
            {showFilters ? '收起筛选' : '展开筛选'}
            {(filterStatus!=='all' || filterSite!=='all' || filterCategory!=='all' || filterDifficulty!=='all' || (filterOwner!=='all' && isAdmin && showAll)) && (
              <span className="ml-1" style={{color:'var(--accent)', fontWeight:'bold'}}>●</span>
            )}
          </button>
          {(search || filterStatus!=='all' || filterSite!=='all' || filterCategory!=='all' || filterDifficulty!=='all' || filterOwner!=='all') && (
            <button className="btn-ghost text-xs" onClick={() => {
              setSearch(''); setFilterStatus('all'); setFilterSite('all');
              setFilterCategory('all'); setFilterDifficulty('all'); setFilterOwner('all');
            }}>清除全部</button>
          )}
          <div className="flex-1"></div>
          <div className="flex items-center gap-1.5 flex-wrap">
            <span className="text-[11px] font-mono" style={{color:'var(--ink-3)'}}>导出范围：</span>
            <select value={dateRange} onChange={e => setDateRange(e.target.value)} style={{padding:'5px 8px', fontSize:'11px'}}>
              <option value="day">当日 ({viewDate.slice(5)})</option>
              <option value="7d">近 7 天</option>
              <option value="30d">近 30 天</option>
              <option value="range">自定义范围</option>
              <option value="all">全部</option>
            </select>
            {dateRange === 'range' && (
              <>
                <input type="date" value={rangeStart} onChange={e => setRangeStart(e.target.value)} style={{padding:'4px 6px', fontSize:'11px', width:'130px'}} />
                <span style={{color:'var(--ink-4)'}}>~</span>
                <input type="date" value={rangeEnd} onChange={e => setRangeEnd(e.target.value)} style={{padding:'4px 6px', fontSize:'11px', width:'130px'}} />
              </>
            )}
            <button className="btn-pri text-xs" onClick={handleExport} title={`导出 ${exportRecords.length} 条到 Excel/CSV`}>
              📥 导出 CSV ({exportRecords.length})
            </button>
          </div>
        </div>
        {showFilters && (
          <div className="mt-3 pt-3 border-t flex items-center gap-2 flex-wrap" style={{borderColor:'var(--line)'}}>
            <div className="flex items-center gap-1.5">
              <span className="text-[11px]" style={{color:'var(--ink-3)'}}>状态</span>
              <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{padding:'4px 8px', fontSize:'11px'}}>
                <option value="all">全部</option>
                {STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-[11px]" style={{color:'var(--ink-3)'}}>网站</span>
              <select value={filterSite} onChange={e => setFilterSite(e.target.value)} style={{padding:'4px 8px', fontSize:'11px'}}>
                <option value="all">全部</option>
                {SITES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-[11px]" style={{color:'var(--ink-3)'}}>类别</span>
              <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} style={{padding:'4px 8px', fontSize:'11px'}}>
                <option value="all">全部</option>
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-[11px]" style={{color:'var(--ink-3)'}}>难度</span>
              <select value={filterDifficulty} onChange={e => setFilterDifficulty(e.target.value)} style={{padding:'4px 8px', fontSize:'11px'}}>
                <option value="all">全部</option>
                <option value="easy">简单</option>
                <option value="mid">中等</option>
                <option value="hard">复杂</option>
              </select>
            </div>
            {isAdmin && showAll && (
              <div className="flex items-center gap-1.5">
                <span className="text-[11px]" style={{color:'var(--ink-3)'}}>员工</span>
                <select value={filterOwner} onChange={e => setFilterOwner(e.target.value)} style={{padding:'4px 8px', fontSize:'11px'}}>
                  <option value="all">全部</option>
                  {employees.map(e => <option key={e.id} value={e.id}>{e.name}{e.alias?` (${e.alias})`:''}</option>)}
                </select>
              </div>
            )}
          </div>
        )}
      </div>

      {/* 统计卡片 - 可点击快捷筛选 */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3 fade-in">
        <StatCard label="今日邮件数" value={stats.totalEmails} unit="封" color="var(--info)" hint={stats.totalEmails === 0 ? '尚未填写' : '点击清除筛选'}
          onClick={() => { setFilterStatus('all'); setFilterDifficulty('all'); setFilterSite('all'); setFilterCategory('all'); setSearch(''); }}
          active={false} />
        <StatCard label="总时长" value={fmtDuration(stats.totalMins)} unit="" color="var(--good)" />
        <StatCard label="难度分布" value={`${stats.easyN} / ${stats.midN} / ${stats.hardN}`} unit="" hint={filterDifficulty !== 'all' ? `仅看${filterDifficulty==='easy'?'简单':filterDifficulty==='mid'?'中等':'复杂'}` : '简/中/复 · 点击循环筛选'} color="var(--gold)"
          onClick={() => {
            const order = ['all','easy','mid','hard'];
            const next = order[(order.indexOf(filterDifficulty)+1) % 4];
            setFilterDifficulty(next);
          }}
          active={filterDifficulty !== 'all'} />
        <StatCard label="跟进中" value={stats.followingN} unit="单" color="var(--accent)" hint={filterStatus !== 'all' ? `仅看${STATUSES.find(s=>s.key===filterStatus)?.label||filterStatus}` : '未关闭工单 · 点击筛选'}
          onClick={() => setFilterStatus(filterStatus === 'all' ? 'following' : filterStatus === 'following' ? 'waiting' : filterStatus === 'waiting' ? 'pending' : 'all')}
          active={filterStatus !== 'all'} />
        <StatCard label="逾期 / 今日" value={`${overdueCount} / ${todayCount}`} unit="" color={overdueCount > 0 ? 'var(--bad)' : 'var(--good)'} hint={overdueCount > 0 ? '点击只看逾期 / 今日' : '正常'}
          onClick={overdueCount + todayCount > 0 ? () => {
            // 临时显示提醒列表（设跨日期视图）
            toast(`📋 提醒：逾期 ${overdueCount} 单，今日到期 ${todayCount} 单`);
          } : null} />
      </div>

      {/* 主表格 */}
      <div className="paper rounded-2xl overflow-hidden fade-in">
        <div className="overflow-x-auto scrollbar-thin">
          <table style={{minWidth:'1100px'}}>
            <thead>
              <tr>
                <th style={{width:'36px'}}>#</th>
                <th style={{width:'90px'}}>状态</th>
                <th style={{minWidth:'220px'}}>客户邮箱/联系方式</th>
                {isAdmin && showAll && <th style={{width:'90px'}}>员工</th>}
                <th style={{width:'80px'}}>网站</th>
                <th style={{width:'90px'}}>开始</th>
                <th style={{width:'90px'}}>结束</th>
                <th style={{width:'70px'}}>时长</th>
                <th style={{width:'140px'}}>难度</th>
                <th style={{width:'120px'}}>咨询事项</th>
                <th style={{minWidth:'160px'}}>订单号/备注</th>
                <th style={{width:'140px'}}>下次跟进</th>
                <th style={{width:'80px'}}>截图/跟进</th>
                <th style={{width:'50px'}}></th>
              </tr>
            </thead>
            <tbody>
              {tableRecords.length === 0 ? (
                <tr>
                  <td colSpan={isAdmin && showAll ? 14 : 13} style={{textAlign:'center', padding:'30px 12px', color:'var(--ink-3)', fontSize:'13px'}}>
                    {dayRecords.length === 0
                      ? '暂无记录 · 点击下方"+ 添加一行"开始'
                      : `无匹配记录（当日共 ${dayRecords.length} 条，被筛选条件过滤）`}
                  </td>
                </tr>
              ) : tableRecords.map((r, idx) => {
                const dispStatus = getDisplayStatus(r);
                const statusCls = `status-${dispStatus}`;
                const ownerName = employees.find(e => e.id === r.ownerId)?.name || '—';
                const editable = canEditRecord(r, user, adminUnlock);
                return (
                  <tr key={r.id}>
                    <td>
                      <div className="flex items-center gap-1.5">
                        <div className={`status-bar ${statusCls}`} style={{minHeight:'24px'}}></div>
                        <span className="font-mono text-[11px]" style={{color:'var(--ink-4)'}}>{idx+1}</span>
                      </div>
                    </td>
                    <td>
                      <select disabled={!editable} value={r.status} onChange={e => updateRow(r.id, {status:e.target.value})} style={{padding:'4px 8px', fontSize:'11px'}}>
                        {STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                      </select>
                    </td>
                    <td>
                      <input disabled={!editable} value={r.customer} onChange={e => updateRow(r.id, {customer:e.target.value})} placeholder="客户邮箱（点这里输入）" style={{padding:'5px 8px', fontSize:'12px'}} />
                    </td>
                    {isAdmin && showAll && <td><span className="text-[11px]" style={{color:'var(--ink-3)'}}>{ownerName}</span></td>}
                    <td>
                      <select disabled={!editable} value={r.site} onChange={e => updateRow(r.id, {site:e.target.value})} style={{padding:'4px 8px', fontSize:'11px'}}>
                        <option value="">选...</option>
                        {SITES.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </td>
                    <td>
                      <input disabled={!editable} type="time" value={r.startTime} onChange={e => updateRow(r.id, {startTime:e.target.value})} style={{padding:'4px 6px', fontSize:'11px'}} />
                    </td>
                    <td>
                      <input disabled={!editable} type="time" value={r.endTime} onChange={e => updateRow(r.id, {endTime:e.target.value})} style={{padding:'4px 6px', fontSize:'11px'}} />
                    </td>
                    <td>
                      <span className="font-mono text-[11px] font-bold" style={{color: r.durationMin > 10 ? 'var(--bad)' : r.durationMin >= 5 ? 'var(--gold)' : 'var(--ink-3)'}}>
                        {r.durationMin > 0 ? fmtDuration(r.durationMin) : '—'}
                      </span>
                    </td>
                    <td>
                      <div className="flex gap-1">
                        {['easy','mid','hard'].map(d => {
                          const isActive = r.difficulty === d;
                          const isSuggested = isActive && r.diffSuggested;
                          const cls = isActive ? (d==='easy'?'active-easy':d==='mid'?'active-mid':'active-hard') : '';
                          return (
                            <button key={d} disabled={!editable} className={`diff-btn ${cls} ${isSuggested?'suggested':''}`}
                              onClick={() => updateRow(r.id, {difficulty:d, diffSuggested:false})}
                              title={isSuggested ? '系统建议 · 点击确认或更改' : ''}>
                              {d==='easy'?'易':d==='mid'?'中':'复'}
                              {isSuggested && ' 🤖'}
                            </button>
                          );
                        })}
                      </div>
                    </td>
                    <td>
                      <select disabled={!editable} value={r.category} onChange={e => updateRow(r.id, {category:e.target.value})} style={{padding:'4px 8px', fontSize:'11px'}}>
                        <option value="">选...</option>
                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </td>
                    <td>
                      <input disabled={!editable} value={r.orderRef + (r.note ? '|' + r.note : '')}
                        onChange={e => {
                          const v = e.target.value;
                          const parts = v.split('|');
                          updateRow(r.id, {orderRef:parts[0]||'', note:parts.slice(1).join('|')});
                        }}
                        placeholder="订单号|备注" style={{padding:'5px 8px', fontSize:'12px'}} />
                    </td>
                    <td>
                      <input disabled={!editable} type="date" value={r.nextFollowUp} onChange={e => updateRow(r.id, {nextFollowUp:e.target.value})} style={{padding:'4px 6px', fontSize:'11px'}} />
                    </td>
                    <td>
                      <button className="btn-sec" onClick={() => setFollowUpModal(r.id)} title={editable ? '打开跟进/截图窗口' : '只读查看（历史日期）'} style={{padding:'4px 10px', display:'inline-flex', alignItems:'center', gap:'4px'}}>
                        {r.screenshots?.length > 0 && <><Icon name="image" className="w-3 h-3" />{r.screenshots.length}</>}
                        {r.followUps?.length > 0 && <>· {r.followUps.length}</>}
                        {!r.screenshots?.length && !r.followUps?.length && <Icon name={editable ? 'edit' : 'image'} className="w-3 h-3" />}
                      </button>
                    </td>
                    <td>
                      {editable ? (
                        <button className="btn-ghost" onClick={() => deleteRow(r.id)} title="放入回收站">
                          <Icon name="trash" className="w-4 h-4" style={{color:'var(--bad)'}} />
                        </button>
                      ) : (
                        <span title="历史记录已锁定" style={{fontSize:'14px', opacity:0.4}}>🔒</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="p-3 border-t" style={{borderColor:'var(--line)', background:'var(--bg)'}}>
          {canEditRecord({date:viewDate}, user, adminUnlock) ? (
            <button onClick={addRow} className="w-full py-2 rounded-lg border-2 border-dashed text-sm font-bold flex items-center justify-center gap-2 transition-colors" style={{borderColor:'var(--line)', color:'var(--accent)', background:'white'}}>
              <Icon name="plus" className="w-4 h-4" />
              添加一行
            </button>
          ) : (
            <div className="w-full py-2 rounded-lg border-2 border-dashed text-sm flex items-center justify-center gap-2" style={{borderColor:'var(--line)', color:'var(--ink-4)', background:'var(--bg)'}}>
              🔒 历史日期不可新增{isAdmin ? '（如需更正，请点击上方"主管解锁"）' : '（如有遗漏，请联系主管处理）'}
            </div>
          )}
        </div>
      </div>

      {/* 操作提示 */}
      <div className="text-[10px] font-mono flex flex-wrap gap-4" style={{color:'var(--ink-4)'}}>
        <span>Tab 切换字段</span>
        <span>🤖 难度自动建议：≤5分简单 · 5-10分中等 · &gt;10分复杂</span>
        <span>📷 点击"截图/跟进"按钮可上传客户截图</span>
        <span>🎨 行左侧色条 = 跟进状态</span>
      </div>

      {/* 跟进/截图 modal */}
      {followUpModal && (() => {
        const r = records.find(rec => rec.id === followUpModal);
        if (!r) return null;
        const modalEditable = canEditRecord(r, user, adminUnlock);
        return (
          <FollowUpModal
            record={r}
            readonly={!modalEditable}
            onClose={() => setFollowUpModal(null)}
            onUpdate={(patch) => updateRow(followUpModal, patch)}
            toast={toast}
          />
        );
      })()}
    </div>
  );
};

const StatCard = ({ label, value, unit, color, hint, onClick, active }) => (
  <div
    className="paper rounded-2xl p-4"
    onClick={onClick}
    style={{
      borderTop:`3px solid ${color || 'var(--accent)'}`,
      cursor: onClick ? 'pointer' : 'default',
      outline: active ? `2px solid ${color || 'var(--accent)'}` : 'none',
      outlineOffset: '-2px',
      transition: 'transform 0.15s, box-shadow 0.15s',
    }}
    onMouseEnter={onClick ? e => { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 4px 12px rgba(124,45,18,0.08)'; } : null}
    onMouseLeave={onClick ? e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; } : null}
  >
    <div className="text-[10px] font-bold uppercase tracking-wider flex items-center justify-between" style={{color:'var(--ink-3)'}}>
      <span>{label}</span>
      {onClick && <span style={{fontSize:'9px', color:'var(--ink-4)'}}>{active ? '✓ 筛选中' : '点击筛选'}</span>}
    </div>
    <div className="mt-1 flex items-baseline gap-1">
      <span className="font-display text-2xl font-bold tabular-nums" style={{color}}>{value}</span>
      {unit && <span className="text-xs font-mono" style={{color:'var(--ink-3)'}}>{unit}</span>}
    </div>
    {hint && <div className="text-[10px] mt-1" style={{color:'var(--ink-4)'}}>{hint}</div>}
  </div>
);

// ============================================================
// 跟进 / 截图 Modal
// ============================================================
const FollowUpModal = ({ record, onClose, onUpdate, toast, readonly = false }) => {
  const [newFollowText, setNewFollowText] = useState('');
  const [newFollowStatus, setNewFollowStatus] = useState(record.status);
  const fileInputRef = useRef(null);
  const dropZoneRef = useRef(null);

  // 粘贴图片（只读模式下禁用）
  useEffect(() => {
    if (readonly) return;
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) {
        if (it.type.indexOf('image') === 0) {
          const file = it.getAsFile();
          handleFile(file);
          e.preventDefault();
        }
      }
    };
    window.addEventListener('paste', handlePaste);
    return () => window.removeEventListener('paste', handlePaste);
  }, [record, readonly]);

  const handleFile = (file) => {
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) {
      toast('⚠ 图片过大 (>3MB)，请压缩后再上传');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const screenshots = [...(record.screenshots || []), {
        id: uid(),
        data: e.target.result,
        name: file.name || 'screenshot.png',
        time: nowISO(),
      }];
      onUpdate({ screenshots });
      toast('✓ 截图已添加');
    };
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    dropZoneRef.current?.classList.remove('dragover');
    const file = e.dataTransfer.files?.[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  };

  const removeScreenshot = (sid) => {
    const screenshots = (record.screenshots || []).filter(s => s.id !== sid);
    onUpdate({ screenshots });
  };

  const addFollowUp = () => {
    if (!newFollowText.trim()) return;
    const followUps = [...(record.followUps || []), {
      id: uid(),
      time: nowISO(),
      text: newFollowText.trim(),
      status: newFollowStatus,
    }];
    onUpdate({ followUps, status: newFollowStatus });
    setNewFollowText('');
    toast('✓ 跟进记录已保存');
  };

  const [viewingImg, setViewingImg] = useState(null);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card paper p-6 w-full" style={{maxWidth:'780px'}} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="flex items-center gap-2">
              <span className="font-display text-lg font-bold">跟进 & 截图</span>
              {readonly && <span className="tag" style={{background:'rgba(168,168,160,0.18)', color:'var(--ink-3)', fontSize:'10px'}}>🔒 历史只读</span>}
            </div>
            <div className="text-xs font-mono mt-0.5" style={{color:'var(--ink-3)'}}>
              {record.customer || '未填客户'} · {record.category || '未选事项'} · {record.date}
            </div>
          </div>
          <button className="btn-ghost" onClick={onClose}>
            <Icon name="x" className="w-5 h-5" />
          </button>
        </div>

        {/* 截图区 */}
        <div className="mb-5">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <Icon name="image" className="w-4 h-4" style={{color:'var(--accent)'}} />
              <span className="font-display text-sm font-bold">客户反馈截图 ({record.screenshots?.length || 0})</span>
            </div>
            {!readonly && (
              <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
                支持: 粘贴 / 拖拽 / 点击上传
              </span>
            )}
          </div>
          {!readonly && (
            <div
              ref={dropZoneRef}
              className="dropzone"
              onClick={() => fileInputRef.current?.click()}
              onDragOver={e => { e.preventDefault(); dropZoneRef.current?.classList.add('dragover'); }}
              onDragLeave={() => dropZoneRef.current?.classList.remove('dragover')}
              onDrop={handleDrop}
            >
              <Icon name="upload" className="w-6 h-6 mx-auto mb-1" style={{color:'var(--ink-4)'}} />
              <div className="text-xs font-bold" style={{color:'var(--ink-2)'}}>点击上传 · 拖拽至此 · Ctrl+V 粘贴</div>
              <div className="text-[10px] mt-1" style={{color:'var(--ink-4)'}}>支持 PNG/JPG，单张 ≤3MB</div>
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFile(e.target.files?.[0])} />
            </div>
          )}
          {readonly && (!record.screenshots || record.screenshots.length === 0) && (
            <div className="text-xs text-center py-4" style={{color:'var(--ink-4)'}}>无截图</div>
          )}
          {record.screenshots?.length > 0 && (
            <div className="mt-3 flex gap-2 flex-wrap">
              {record.screenshots.map(s => (
                <div key={s.id} className="relative group">
                  <img src={s.data} alt={s.name} className="thumb" onClick={() => setViewingImg(s.data)} />
                  {!readonly && (
                    <button onClick={() => removeScreenshot(s.id)}
                      className="absolute -top-1 -right-1 w-5 h-5 rounded-full text-white text-xs font-bold flex items-center justify-center opacity-0 group-hover:opacity-100"
                      style={{background:'var(--bad)', border:'1.5px solid white'}}>
                      ×
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* 跟进时间线 */}
        <div className="mb-5">
          <div className="flex items-center gap-2 mb-2">
            <Icon name="calendar" className="w-4 h-4" style={{color:'var(--accent)'}} />
            <span className="font-display text-sm font-bold">跟进时间线 ({record.followUps?.length || 0})</span>
          </div>
          {record.followUps?.length > 0 && (
            <div className="space-y-2 mb-3 max-h-60 overflow-y-auto scrollbar-thin">
              {record.followUps.map(f => (
                <div key={f.id} className="rounded-lg p-3 border" style={{borderColor:'var(--line)', background:'var(--bg)'}}>
                  <div className="flex items-center justify-between mb-1">
                    <span className={`tag tag-${f.status === 'resolved' ? 'good' : f.status === 'waiting' ? 'info' : 'warn'}`}>
                      {STATUSES.find(s => s.key === f.status)?.label || f.status}
                    </span>
                    <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
                      {new Date(f.time).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}
                    </span>
                  </div>
                  <div className="text-xs leading-relaxed">{f.text}</div>
                </div>
              ))}
            </div>
          )}
          {!readonly && (
            <div className="rounded-lg p-3 border-2" style={{borderColor:'var(--accent-mid)', background:'var(--accent-soft)'}}>
              <div className="text-[10px] font-bold uppercase tracking-wider mb-1.5" style={{color:'var(--accent)'}}>+ 添加新跟进</div>
              <textarea
                value={newFollowText}
                onChange={e => setNewFollowText(e.target.value)}
                placeholder="今天联系客户的进展，例: 已联系供应商等回复 / 客户提供了照片..."
                rows="2"
                style={{background:'white'}}
              />
              <div className="mt-2 flex items-center gap-2 flex-wrap">
                <select value={newFollowStatus} onChange={e => setNewFollowStatus(e.target.value)} style={{width:'auto', padding:'4px 8px', fontSize:'11px'}}>
                  {STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
                <button className="btn-pri" onClick={addFollowUp} disabled={!newFollowText.trim()}>保存跟进</button>
              </div>
            </div>
          )}
        </div>

        {/* 下次跟进设置 */}
        <div className="pt-4 border-t flex items-center gap-3" style={{borderColor:'var(--line)'}}>
          <span className="text-xs font-bold" style={{color:'var(--ink-2)'}}>下次跟进日期:</span>
          <input disabled={readonly} type="date" value={record.nextFollowUp} onChange={e => onUpdate({nextFollowUp:e.target.value})} style={{width:'160px'}} />
          {record.nextFollowUp && !readonly && (
            <button className="btn-ghost text-[11px]" onClick={() => onUpdate({nextFollowUp:''})}>清除</button>
          )}
          {readonly && <span className="text-[11px]" style={{color:'var(--ink-4)'}}>(只读)</span>}
        </div>

        {/* 大图预览 */}
        {viewingImg && (
          <div className="modal-backdrop" style={{zIndex:60}} onClick={() => setViewingImg(null)}>
            <img src={viewingImg} alt="" style={{maxWidth:'90vw', maxHeight:'90vh', borderRadius:'8px'}} />
          </div>
        )}
      </div>
    </div>
  );
};


// ============================================================
// 数据看板 - 当天/7天/本月
// ============================================================
const DashboardModule = ({ user, employees, records }) => {
  const isAdmin = user.role === 'admin';
  const [scope, setScope] = useState(isAdmin ? 'team' : 'me'); // me | team
  const [selectedEmpId, setSelectedEmpId] = useState(user.id);

  const live = records.filter(r => !r.deleted);

  // 过滤范围
  const scopedRecords = useMemo(() => {
    if (scope === 'me') return live.filter(r => r.ownerId === user.id);
    if (scope === 'one' && selectedEmpId) return live.filter(r => r.ownerId === selectedEmpId);
    return live; // team
  }, [scope, selectedEmpId, live, user.id]);

  const today = todayISO();
  const last7Start = addDays(today, -6);
  const monthStart = today.slice(0, 8) + '01';

  // 时段统计
  const calcRange = (startDate, endDate) => {
    const filtered = scopedRecords.filter(r => r.date >= startDate && r.date <= endDate);
    const totalEmails = filtered.length;
    const totalMins = filtered.reduce((s, r) => s + (r.durationMin || 0), 0);
    const easy = filtered.filter(r => r.difficulty === 'easy').length;
    const mid = filtered.filter(r => r.difficulty === 'mid').length;
    const hard = filtered.filter(r => r.difficulty === 'hard').length;
    const resolved = filtered.filter(r => r.status === 'resolved').length;
    const overdue = filtered.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today).length;
    return { totalEmails, totalMins, easy, mid, hard, resolved, overdue };
  };

  const todayStats = calcRange(today, today);
  const week7Stats = calcRange(last7Start, today);
  const monthStats = calcRange(monthStart, today);

  // 7天每天柱状图数据
  const daily7 = useMemo(() => {
    const arr = [];
    for (let i = 6; i >= 0; i--) {
      const d = addDays(today, -i);
      const recs = scopedRecords.filter(r => r.date === d);
      arr.push({
        date: d,
        label: d.slice(5).replace('-','/'),
        weekday: ['日','一','二','三','四','五','六'][new Date(d).getDay()],
        count: recs.length,
        mins: recs.reduce((s, r) => s + (r.durationMin || 0), 0),
      });
    }
    return arr;
  }, [scopedRecords]);

  const maxCount = Math.max(...daily7.map(d => d.count), 1);

  // 每员工本月排行 (主管视角)
  const empRanking = useMemo(() => {
    if (scope !== 'team') return null;
    return employees.map(e => {
      const recs = live.filter(r => r.ownerId === e.id && r.date >= monthStart);
      const mins = recs.reduce((s, r) => s + (r.durationMin || 0), 0);
      const easy = recs.filter(r => r.difficulty === 'easy').length;
      const mid = recs.filter(r => r.difficulty === 'mid').length;
      const hard = recs.filter(r => r.difficulty === 'hard').length;
      const resolved = recs.filter(r => r.status === 'resolved').length;
      const score = easy + mid * 2 + hard * 3;
      return { ...e, count: recs.length, mins, easy, mid, hard, resolved, score };
    }).sort((a, b) => b.score - a.score);
  }, [scope, employees, live, monthStart]);

  return (
    <div className="space-y-5 fade-in">
      {/* 范围切换 */}
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <Icon name="chart" className="w-5 h-5" style={{color:'var(--accent)'}} />
            <span className="font-display text-base font-bold">数据看板</span>
            <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
              当天 · 近 7 天 · 本月
            </span>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {isAdmin && (
              <>
                <button className={`btn-sec ${scope==='team'?'!bg-[var(--accent)] !text-white !border-[var(--accent)]':''}`} onClick={() => setScope('team')}>全团队</button>
                <button className={`btn-sec ${scope==='one'?'!bg-[var(--accent)] !text-white !border-[var(--accent)]':''}`} onClick={() => setScope('one')}>指定员工</button>
                {scope === 'one' && (
                  <select value={selectedEmpId} onChange={e => setSelectedEmpId(e.target.value)} style={{width:'auto', padding:'5px 10px', fontSize:'12px'}}>
                    {employees.map(e => <option key={e.id} value={e.id}>{e.name}{e.alias && ` (${e.alias})`}</option>)}
                  </select>
                )}
              </>
            )}
            <button className={`btn-sec ${scope==='me'?'!bg-[var(--accent)] !text-white !border-[var(--accent)]':''}`} onClick={() => setScope('me')}>我的</button>
          </div>
        </div>
      </div>

      {/* 三段统计 */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <RangeCard title="今日" range={today} stats={todayStats} accent="var(--good)" />
        <RangeCard title="近 7 天" range={`${last7Start.slice(5)} → ${today.slice(5)}`} stats={week7Stats} accent="var(--info)" />
        <RangeCard title="本月" range={`${monthStart.slice(5,7)}月`} stats={monthStats} accent="var(--accent)" />
      </div>

      {/* 7天每天柱状图 */}
      <div className="paper rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="font-display text-sm font-bold">近 7 天工作量趋势</div>
            <div className="text-[10px] font-mono" style={{color:'var(--ink-3)'}}>邮件数 / 工作时长</div>
          </div>
        </div>
        <div className="flex items-end gap-2 h-44">
          {daily7.map(d => {
            const heightPct = (d.count / maxCount) * 100;
            const isToday = d.date === today;
            return (
              <div key={d.date} className="flex-1 flex flex-col items-center gap-1" style={{minWidth:'40px'}}>
                <div className="text-[10px] font-mono font-bold" style={{color: d.count > 0 ? 'var(--ink)' : 'var(--ink-4)'}}>{d.count || ''}</div>
                <div style={{
                  width:'100%',
                  height: Math.max(heightPct, 2) + '%',
                  background: isToday ? 'var(--accent)' : (d.count > 0 ? 'var(--accent-mid)' : 'var(--line-soft)'),
                  borderRadius:'4px 4px 0 0',
                  transition:'all .3s',
                  position:'relative',
                  display:'flex',
                  alignItems:'flex-end',
                  justifyContent:'center',
                }} title={`${d.count} 封 · ${fmtDuration(d.mins)}`}>
                </div>
                <div className="text-center">
                  <div className="text-[10px] font-mono font-bold" style={{color: isToday ? 'var(--accent)' : 'var(--ink-2)'}}>{d.label}</div>
                  <div className="text-[9px]" style={{color:'var(--ink-4)'}}>周{d.weekday}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 员工排行 (仅主管/全团队) */}
      {empRanking && (
        <div className="paper rounded-2xl overflow-hidden">
          <div className="p-4 border-b" style={{borderColor:'var(--line)'}}>
            <div className="flex items-center gap-2">
              <Icon name="star" className="w-4 h-4" style={{color:'var(--gold)'}} />
              <span className="font-display text-sm font-bold">本月工作量排行</span>
              <span className="text-[10px] font-mono" style={{color:'var(--ink-3)'}}>简 ×1 + 中 ×2 + 复 ×3 = 加权分</span>
            </div>
          </div>
          <div className="overflow-x-auto scrollbar-thin">
            <table>
              <thead>
                <tr>
                  <th style={{width:'40px'}}>#</th>
                  <th>员工</th>
                  <th>负责网站</th>
                  <th style={{textAlign:'right'}}>邮件数</th>
                  <th style={{textAlign:'right'}}>总时长</th>
                  <th style={{textAlign:'right'}}>简/中/复</th>
                  <th style={{textAlign:'right'}}>已解决</th>
                  <th style={{textAlign:'right'}}>加权分</th>
                </tr>
              </thead>
              <tbody>
                {empRanking.map((e, idx) => (
                  <tr key={e.id}>
                    <td>
                      <span className={`tag ${idx<3?'tag-gold':'tag-neutral'}`}>{idx+1}</span>
                    </td>
                    <td>
                      <div className="font-bold text-xs">{e.name}{e.alias && ` · ${e.alias}`}</div>
                      {e.role === 'admin' && <div className="text-[10px]" style={{color:'var(--accent)'}}>{e.title || '主管'}</div>}
                    </td>
                    <td><span className="text-[11px]" style={{color:'var(--ink-3)'}}>{e.sites || '—'}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono font-bold">{e.count}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono">{fmtDuration(e.mins)}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono text-[11px]" style={{color:'var(--ink-3)'}}>{e.easy}/{e.mid}/{e.hard}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono font-bold" style={{color:'var(--good)'}}>{e.resolved}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono font-bold text-base" style={{color:'var(--accent)'}}>{e.score}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

const TrashModule = ({ user, employees, records, setRecords, toast }) => {
  const isAdmin = user.role === 'admin';
  const deleted = records.filter(r => r.deleted);

  // 员工只能看自己删除的
  const visible = isAdmin ? deleted : deleted.filter(r => r.deletedBy === user.id || r.ownerId === user.id);

  const restore = (id) => {
    setRecords(prev => prev.map(r => r.id === id ? { ...r, deleted: false, deletedAt: null, deletedBy: null } : r));
    toast('✓ 已恢复');
  };

  const permaDelete = (id) => {
    if (!isAdmin) { toast('⚠ 仅主管可永久删除'); return; }
    if (!confirm('确认永久删除？此操作不可撤销！')) return;
    setRecords(prev => prev.filter(r => r.id !== id));
    toast('✗ 已永久删除');
  };

  const clearAll = () => {
    if (!isAdmin) return;
    if (!confirm(`确认永久删除全部 ${deleted.length} 条记录？此操作不可撤销！`)) return;
    setRecords(prev => prev.filter(r => !r.deleted));
    toast('✗ 已清空回收站');
  };

  return (
    <div className="space-y-5 fade-in">
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <Icon name="trash" className="w-5 h-5" style={{color:'var(--ink-3)'}} />
            <span className="font-display text-base font-bold">回收站</span>
            <span className="tag tag-neutral">{visible.length} 条</span>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-[11px]" style={{color:'var(--ink-3)'}}>
              {isAdmin ? '主管视角 · 可恢复或永久删除全部记录' : '仅显示你删除的记录 · 永久删除需主管操作'}
            </span>
            {isAdmin && visible.length > 0 && (
              <button className="btn-danger" onClick={clearAll}>清空回收站</button>
            )}
          </div>
        </div>
      </div>

      <div className="paper rounded-2xl overflow-hidden">
        <div className="overflow-x-auto scrollbar-thin">
          <table>
            <thead>
              <tr>
                <th>原日期</th>
                <th>员工</th>
                <th>客户</th>
                <th>事项</th>
                <th>备注</th>
                <th>删除时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              {visible.length === 0 ? (
                <tr><td colSpan="7" style={{textAlign:'center', padding:'30px', color:'var(--ink-3)'}}>回收站为空</td></tr>
              ) : visible.map(r => {
                const owner = employees.find(e => e.id === r.ownerId);
                return (
                  <tr key={r.id}>
                    <td><span className="font-mono text-xs">{r.date}</span></td>
                    <td>{owner?.name || '—'}</td>
                    <td><span className="text-xs">{r.customer || '—'}</span></td>
                    <td><span className="tag tag-neutral">{r.category || '—'}</span></td>
                    <td><span className="text-xs" style={{color:'var(--ink-3)'}}>{r.orderRef || r.note || '—'}</span></td>
                    <td><span className="font-mono text-[10px]" style={{color:'var(--ink-4)'}}>
                      {r.deletedAt ? new Date(r.deletedAt).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}) : '—'}
                    </span></td>
                    <td>
                      <div className="flex gap-1">
                        <button className="btn-sec" onClick={() => restore(r.id)} title="恢复">
                          <Icon name="restore" className="w-3 h-3 inline mr-1" />恢复
                        </button>
                        {isAdmin && (
                          <button className="btn-danger" onClick={() => permaDelete(r.id)} title="永久删除">永久删除</button>
                        )}

                    </td>

              })}
            </tbody>
          </table>
        </div>
      </div>

// ============================================================
const FinanceModule = ({ toast }) => {
  // 持久化的参数 (跨会话)
  const [config, setConfig] = useState(() => STORE.get('finance_config', {
    damageMult: 2.0,
    discountMult: 1.2,
    exchangeRate: 6.2,
  }));

  useEffect(() => { STORE.set('finance_config', config); }, [config]);

  // 当前订单参数
  const [items, setItems] = useState([
    { id: uid(), sku:'', cost:'', qty:1, shipping:'', crate:'' }
  ]);
  const [currentPriceUSD, setCurrentPriceUSD] = useState('');

  const addItem = () => setItems(prev => [...prev, { id:uid(), sku:'', cost:'', qty:1, shipping:'', crate:'' }]);
  const updateItem = (id, patch) => setItems(prev => prev.map(i => i.id === id ? {...i, ...patch} : i));
  const delItem = (id) => setItems(prev => prev.length > 1 ? prev.filter(i => i.id !== id) : prev);

  // 计算
  const dam = parseFloat(config.damageMult) || 2.0;
  const disc = parseFloat(config.discountMult) || 1.2;
  const rate = parseFloat(config.exchangeRate) || 6.2;
  const totalMult = dam * disc;

  const calculated = useMemo(() => {
    return items.map(it => {
      const cost = parseFloat(it.cost) || 0;
      const qty = parseInt(it.qty) || 1;
      const shipping = parseFloat(it.shipping) || 0;
      const crate = parseFloat(it.crate) || 0;
      const productTotal = cost * qty;
      const baseCost = productTotal + shipping + crate;
      const suggestedTotalUSD = (baseCost * totalMult) / rate;
      const suggestedUnitUSD = qty > 0 ? suggestedTotalUSD / qty : 0;
      const currentTotal = (parseFloat(currentPriceUSD) || 0) * qty;
      const profit = currentTotal > 0 ? (currentTotal * rate) - baseCost : null;
      const marginPct = currentTotal > 0 && currentTotal * rate > 0 ? (profit / (currentTotal * rate)) * 100 : null;
      return { ...it, productTotal, baseCost, suggestedTotalUSD, suggestedUnitUSD, profit, marginPct };
    });
  }, [items, totalMult, rate, currentPriceUSD]);

  const grandTotal = calculated.reduce((s, c) => s + c.baseCost, 0);
  const grandSuggested = calculated.reduce((s, c) => s + c.suggestedTotalUSD, 0);

  const copyFormula = (item) => {

单件成本 ¥${item.cost}
数量 ${item.qty}
推演运费 ¥${item.shipping || 0}
木箱费 ¥${item.crate || 0}
━━━━━━━━━━━━━━━━━
综合成本 ¥${fmt(item.baseCost)}
× ${dam.toFixed(1)} (防损)
× ${disc.toFixed(1)} (折扣)
÷ ${rate} (推演汇率)
━━━━━━━━━━━━━━━━━
✓ 建议单件售价 $${item.suggestedUnitUSD.toFixed(2)}
✓ 总价 $${item.suggestedTotalUSD.toFixed(2)}`;
    navigator.clipboard.writeText(text).then(() => toast('✓ 已复制到剪贴板'));
  };

  return (
    <div className="space-y-5 fade-in">
      {/* 公式说明 */}
      <div className="paper rounded-2xl p-4" style={{background:'var(--accent-soft)'}}>
        <div className="flex items-center gap-2 mb-2">
          <Icon name="cash" className="w-5 h-5" style={{color:'var(--accent)'}} />
          <span className="font-display text-base font-bold">财务卖价计算器</span>
        </div>
        <div className="text-xs leading-relaxed" style={{color:'var(--ink-2)'}}>
          <b>核心公式:</b> 单件售价 USD = (产品成本 + 推演运费 + 木箱费) ×{' '}
          <b style={{color:'var(--accent)'}}>{dam.toFixed(1)}</b>{' '}
          (防损补发) ×{' '}
          <b style={{color:'var(--accent)'}}>{disc.toFixed(1)}</b>{' '}
          (折扣预留) ÷{' '}
          <b style={{color:'var(--accent)'}}>{rate}</b>{' '}
          (推演汇率) · 综合系数 <b style={{color:'var(--accent)'}}>{totalMult.toFixed(2)}×</b>

// 报价单模块 v2 - 多公司预设 + 多语言 + 云存储
