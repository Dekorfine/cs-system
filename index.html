const QuoteModule = ({ user, employees, toast, cloudOn }) => {
  const [tab, setTab] = useState('edit'); // edit | list | preview
  const [quote, setQuote] = useState(() => STORE.get('quote_current', defaultQuote()));
  const [quotes, setQuotes] = useState([]);  // 历史，从云端拉

  useEffect(() => { STORE.set('quote_current', quote); }, [quote]);

  // 加载历史报价单（云端优先）
  useEffect(() => {
    (async () => {
      if (cloudOn && CLOUD.client) {
        const cloud = await CLOUD.list('workspace_quotes', { order:{col:'updated_at', asc:false}, limit:200 });
        if (cloud !== null) { setQuotes(cloud); return; }
      }
      setQuotes(STORE.get('quotes_local', []));
    })();
  }, [cloudOn, tab]);

  // 公司预设变更 → 自动填充
  const applyPreset = (key) => {
    const p = SELLER_PRESETS[key];
    if (!p) return;
    const next = { ...quote, sellerKey:key, seller:{ name:p.name, address:p.address, phone:p.phone, email:p.email, website:p.website } };
    // 仅 Radilum 系列自动填充买家+银行
    if (key === 'radilum' || key === 'jiangmen_radilum') {
      next.bank = { ...RADILUM_BANK };
      if (key === 'jiangmen_radilum' && !quote.buyer?.address?.trim()) {
        next.buyer = { ...next.buyer, name_address: RADILUM_DEFAULT_BUYER };
      }
    } else {
      next.bank = { bank_name:'', bank_address:'', account_name:'', account_number:'', swift_code:'' };
    }
    setQuote(next);
    toast(`✓ 已切换至 ${p.name}`);
  };

  // 新建空白报价
  const newQuote = () => {
    if (!confirm('清空当前编辑，新建空白报价单？')) return;
    setQuote(defaultQuote());
    setTab('edit');
  };

  // 保存到云端 / 本地
  const saveQuote = async () => {
    if (!quote.quote_no?.trim()) { toast('⚠ 请先填写报价单号'); return; }
    const now = nowISO();
    const total = computeTotal(quote);
    const record = {
      ...quote,
      id: quote.id || uid(),
      owner_id: user.id,
      owner_name: user.name + (user.alias ? ' ' + user.alias : ''),
      total_usd: total.total,
      updated_at: now,
      created_at: quote.created_at || now,
    };
    if (cloudOn && CLOUD.client) {
      const saved = await CLOUD.upsert('workspace_quotes', record);
      if (saved) {
        toast('☁ 已保存到云端，团队可见');
        setQuote(record);
        // 刷新列表
        const cloud = await CLOUD.list('workspace_quotes', { order:{col:'updated_at', asc:false}, limit:200 });
        if (cloud) setQuotes(cloud);
        return;
      }
      toast('⚠ 云端保存失败，已存至本地');
    }
    const local = STORE.get('quotes_local', []);
    const idx = local.findIndex(q => q.id === record.id);
    if (idx >= 0) local[idx] = record; else local.unshift(record);
    STORE.set('quotes_local', local);
    setQuotes(local);
    setQuote(record);
    toast('✓ 已保存至本地');
  };

  // 删除报价
  const deleteQuote = async (id) => {
    if (!confirm('永久删除此报价单？')) return;
    if (cloudOn && CLOUD.client) {
      const ok = await CLOUD.del('workspace_quotes', id);
      if (ok) {
        setQuotes(quotes.filter(q => q.id !== id));
        toast('已删除');
        return;
      }
    }
    const local = STORE.get('quotes_local', []).filter(q => q.id !== id);
    STORE.set('quotes_local', local);
    setQuotes(local);
    toast('已删除');
  };

  // 加载历史
  const loadQuote = (q) => { setQuote(q); setTab('edit'); toast('已载入报价单'); };

  // 商品行操作
  const addItem = () => setQuote({ ...quote, items: [...(quote.items||[]), { id:uid(), sku:'', desc:'', image:'', qty:1, unit_price:0, carton:'', nw:0, gw:0, cbm:0 }] });
  const updateItem = (id, patch) => setQuote({ ...quote, items: quote.items.map(it => it.id === id ? { ...it, ...patch } : it) });
  const delItem = (id) => setQuote({ ...quote, items: quote.items.filter(it => it.id !== id) });

  return (
    <div className="space-y-5">
      {/* 顶部操作栏 */}
      <div className="paper rounded-2xl p-4 fade-in">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <button className={`tab-btn ${tab==='edit'?'active':''}`} onClick={() => setTab('edit')}>📝 编辑</button>
            <button className={`tab-btn ${tab==='preview'?'active':''}`} onClick={() => setTab('preview')}>👁 预览</button>
            <button className={`tab-btn ${tab==='list'?'active':''}`} onClick={() => setTab('list')}>📚 历史 ({quotes.length})</button>
          </div>
          <div className="flex items-center gap-2">
            <span className={`cloud-status ${cloudOn?'ok':'local'}`}>
              <span className="dot"></span>
              {cloudOn ? '云端同步' : '本地'}
            </span>
            <button className="btn-ghost text-xs" onClick={newQuote}>+ 新建</button>
            <button className="btn-pri text-xs" onClick={saveQuote}>💾 保存</button>
            {tab === 'preview' && <button className="btn-sec text-xs" onClick={() => window.print()}>🖨 打印 / PDF</button>}
          </div>
        </div>
      </div>

      {tab === 'edit' && <QuoteEditor quote={quote} setQuote={setQuote} applyPreset={applyPreset} addItem={addItem} updateItem={updateItem} delItem={delItem} />}
      {tab === 'preview' && <QuotePreview quote={quote} />}
      {tab === 'list' && <QuoteList quotes={quotes} user={user} onLoad={loadQuote} onDelete={deleteQuote} cloudOn={cloudOn} />}
    </div>
  );
};

const computeTotal = (q) => {
  const subtotal = (q.items || []).reduce((s, it) => s + (Number(it.qty)||0) * (Number(it.unit_price)||0), 0);
  const discountAmt = subtotal * (Number(q.discount_pct)||0) / 100;
  const freight = Number(q.freight) || 0;
  const total = subtotal - discountAmt + freight;
  return { subtotal, discountAmt, freight, total };
};

const ReportModule = ({ user, employees, toast, cloudOn }) => {
  const [tab, setTab] = useState('inbox');  // inbox | mine | new | all (admin)
  const [tickets, setTickets] = useState([]);
  const [openTicket, setOpenTicket] = useState(null);
  const [draft, setDraft] = useState(null);

  const isAdmin = user.role === 'admin';

  // 加载工单（云端优先）
  const loadTickets = async () => {
    if (cloudOn && CLOUD.client) {
      const cloud = await CLOUD.list('workspace_tickets', { order:{col:'updated_at', asc:false}, limit:500 });
      if (cloud !== null) { setTickets(cloud); return; }
    }
    setTickets(STORE.get('tickets_local', []));
  };

  useEffect(() => { loadTickets(); }, [cloudOn]);

  // 保存工单
  const saveTicket = async (ticket) => {
    const now = nowISO();
    const record = { ...ticket, id: ticket.id || uid(), updated_at: now, created_at: ticket.created_at || now };
    if (cloudOn && CLOUD.client) {
      const saved = await CLOUD.upsert('workspace_tickets', record);
      if (saved) { await loadTickets(); return record; }
      toast('⚠ 云端保存失败，已存至本地');
    }
    const local = STORE.get('tickets_local', []);
    const idx = local.findIndex(t => t.id === record.id);
    if (idx >= 0) local[idx] = record; else local.unshift(record);
    STORE.set('tickets_local', local);
    setTickets(local);
    return record;
  };

  // 新建工单
  const createTicket = async (t) => {
    const record = {
      ...t,
      created_by_id: user.id,
      created_by_name: user.name + (user.alias ? ' ' + user.alias : ''),
      status: 'pending',
      comments: [],
      attachments: t.attachments || [],
    };
    await saveTicket(record);
    setDraft(null);
    toast('✓ 工单已提交');
    setTab('mine');
  };

  // 状态变更
  const updateStatus = async (ticket, newStatus) => {
    const comment = {
      id: uid(),
      by_id: user.id,
      by_name: user.name + (user.alias ? ' ' + user.alias : ''),
      time: nowISO(),
      type: 'status',
      content: `状态变更为「${TICKET_STATUS.find(s=>s.key===newStatus)?.label}」`,
      from: ticket.status,
      to: newStatus,
    };
    const updated = { ...ticket, status: newStatus, comments: [...(ticket.comments||[]), comment] };
    if (newStatus === 'resolved' || newStatus === 'rejected') updated.resolved_at = nowISO();
    const saved = await saveTicket(updated);
    setOpenTicket(saved);
    toast(`✓ ${comment.content}`);
  };

  // 添加评论
  const addComment = async (ticket, text) => {
    if (!text.trim()) return;
    const comment = { id: uid(), by_id: user.id, by_name: user.name + (user.alias ? ' ' + user.alias : ''), time: nowISO(), type: 'comment', content: text.trim() };
    const updated = { ...ticket, comments: [...(ticket.comments||[]), comment] };
    const saved = await saveTicket(updated);
    setOpenTicket(saved);
  };

  // 删除（仅创建人或主管）
  const deleteTicket = async (id) => {
    if (!confirm('永久删除此工单？')) return;
    if (cloudOn && CLOUD.client) {
      const ok = await CLOUD.del('workspace_tickets', id);
      if (ok) await loadTickets();
    } else {
      const local = STORE.get('tickets_local', []).filter(t => t.id !== id);
      STORE.set('tickets_local', local);
      setTickets(local);
    }
    setOpenTicket(null);
    toast('已删除');
  };

  // 筛选
  const inbox = tickets.filter(t =>
    (isAdmin && t.target_id === user.id) || (isAdmin && !t.target_id && t.assignee === 'admin') ||
    (t.target_id === user.id)
  );
  const mine = tickets.filter(t => t.created_by_id === user.id);
  const all = tickets;

  const list = tab === 'inbox' ? inbox : tab === 'mine' ? mine : tab === 'all' ? all : [];
  const pendingCount = inbox.filter(t => t.status === 'pending' || t.status === 'accepted').length;
  const myPendingCount = mine.filter(t => t.status === 'pending' || t.status === 'accepted' || t.status === 'processing').length;

  return (
    <div className="space-y-5 fade-in">
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-wrap">
            <button className={`tab-btn ${tab==='inbox'?'active':''}`} onClick={() => setTab('inbox')}>
              📥 我的收件箱 {pendingCount > 0 && <span className="badge">{pendingCount}</span>}
            </button>
            <button className={`tab-btn ${tab==='mine'?'active':''}`} onClick={() => setTab('mine')}>
              📤 我发起的 {myPendingCount > 0 && <span className="badge" style={{background:'var(--gold)'}}>{myPendingCount}</span>}
            </button>
            {isAdmin && (
              <button className={`tab-btn ${tab==='all'?'active':''}`} onClick={() => setTab('all')}>
                🗂 全部工单 ({tickets.length})
              </button>
            )}
          </div>
          <div className="flex items-center gap-2">
            <span className={`cloud-status ${cloudOn?'ok':'local'}`}>
              <span className="dot"></span>
              {cloudOn ? '云端协同' : '本地'}
            </span>
            <button className="btn-pri" onClick={() => setDraft({
              title:'', department:'merchandiser', priority:'mid', related_order:'',
              target_id: isAdmin ? '' : (employees.find(e => e.role === 'admin')?.id || ''),
              target_name:'', description:'', attachments:[]
            })}>+ 新建工单</button>
          </div>
        </div>
      </div>

      {/* 工单列表 */}
      <div className="paper rounded-2xl overflow-hidden">
        <div className="overflow-x-auto scrollbar-thin">
          <table style={{minWidth:'900px'}}>
            <thead>
              <tr>
                <th style={{width:50}}>优先级</th>
                <th style={{width:80}}>状态</th>
                <th style={{minWidth:240}}>标题</th>
                <th style={{width:90}}>对接部门</th>
                <th style={{width:100}}>发起人</th>
                <th style={{width:100}}>接收人</th>
                <th style={{width:120}}>更新时间</th>
                <th style={{width:50}}></th>
              </tr>
            </thead>
            <tbody>
              {list.length === 0 ? (
                <tr><td colSpan={8} style={{textAlign:'center', padding:'40px', color:'var(--ink-3)'}}>
                  {tab === 'inbox' ? '收件箱为空 ✨' : tab === 'mine' ? '你还没发起过工单 · 点击右上"+ 新建工单"' : '暂无工单'}
                </td></tr>
              ) : list.map(t => {
                const dept = DEPARTMENTS.find(d => d.key === t.department);
                const st = TICKET_STATUS.find(s => s.key === t.status);
                const pri = TICKET_PRIORITY.find(p => p.key === t.priority);
                return (
                  <tr key={t.id} style={{cursor:'pointer'}} onClick={() => setOpenTicket(t)}>
                    <td><span className={`tag ${pri?.cls}`} style={{fontSize:10}}>{pri?.label}</span></td>
                    <td><span className={`tag ${st?.cls}`} style={{fontSize:10}}>{st?.label}</span></td>
                    <td className="font-bold text-xs">{t.title}{t.related_order && <span className="font-mono ml-2 text-[10px]" style={{color:'var(--ink-4)'}}>· {t.related_order}</span>}</td>
                    <td className="text-xs">{dept?.icon} {dept?.label}</td>
                    <td className="text-xs" style={{color:'var(--ink-3)'}}>{t.created_by_name}</td>
                    <td className="text-xs" style={{color:'var(--ink-3)'}}>{t.target_name || '主管'}</td>
                    <td className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>{new Date(t.updated_at).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</td>
                    <td>{(t.comments?.length||0) > 0 && <span className="text-[10px]" style={{color:'var(--ink-3)'}}>💬{t.comments.length}</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* 新建 modal */}
      {draft && (
        <TicketDraftModal
          draft={draft}
          setDraft={setDraft}
          employees={employees}
          user={user}
          onCancel={() => setDraft(null)}
          onSubmit={createTicket}
        />
      )}

      {/* 查看 modal */}
      {openTicket && (
        <TicketDetailModal
          ticket={openTicket}
          user={user}
          employees={employees}
          onClose={() => setOpenTicket(null)}
          onUpdateStatus={(s) => updateStatus(openTicket, s)}
          onAddComment={(t) => addComment(openTicket, t)}
          onDelete={() => deleteTicket(openTicket.id)}
        />
      )}
    </div>
  );
};

const TicketDraftModal = ({ draft, setDraft, employees, user, onCancel, onSubmit }) => {
  const fileInputRef = useRef(null);
  const handleFile = (file) => {
    if (!file) return;
    if (file.size > 2*1024*1024) { alert('图片需小于 2MB'); return; }
    const r = new FileReader();
    r.onload = e => setDraft({ ...draft, attachments:[...(draft.attachments||[]), { id:uid(), data:e.target.result, name:file.name, time:nowISO() }] });
    r.readAsDataURL(file);
  };
  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) if (it.type.startsWith('image')) handleFile(it.getAsFile());
    };
    window.addEventListener('paste', onPaste);
    return () => window.removeEventListener('paste', onPaste);
  }, [draft]);

  const canSubmit = draft.title.trim() && draft.description.trim() && draft.target_id;

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal-card paper p-6 w-full" style={{maxWidth:680}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="font-display text-lg font-bold">📝 新建跨部门工单</div>
          <button className="btn-ghost" onClick={onCancel}><Icon name="x" className="w-5 h-5" /></button>
        </div>
        <div className="space-y-3">
          <div>
            <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>标题 *</label>
            <input value={draft.title} onChange={e => setDraft({...draft, title:e.target.value})} placeholder="例：VK6080 工厂未按时出货，客户在线追问" />
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div>
              <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>对接部门 *</label>
              <select value={draft.department} onChange={e => setDraft({...draft, department:e.target.value})}>
                {DEPARTMENTS.map(d => <option key={d.key} value={d.key}>{d.icon} {d.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>优先级</label>
              <select value={draft.priority} onChange={e => setDraft({...draft, priority:e.target.value})}>
                {TICKET_PRIORITY.map(p => <option key={p.key} value={p.key}>{p.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>关联订单号</label>
              <input value={draft.related_order} onChange={e => setDraft({...draft, related_order:e.target.value})} placeholder="可选" />
            </div>
          </div>
          <div>
            <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>接收人 * (默认发给主管)</label>
            <select value={draft.target_id} onChange={e => {
              const emp = employees.find(em => em.id === e.target.value);
              setDraft({...draft, target_id:e.target.value, target_name: emp ? emp.name + (emp.alias?' '+emp.alias:'') : ''});
            }}>
              <option value="">— 请选择 —</option>
              {employees.filter(e => e.role === 'admin').map(e => <option key={e.id} value={e.id}>👑 {e.name}{e.alias?` ${e.alias}`:''} (主管)</option>)}
              <optgroup label="员工">
                {employees.filter(e => e.role !== 'admin' && e.id !== user.id).map(e => <option key={e.id} value={e.id}>{e.name}{e.alias?` ${e.alias}`:''}</option>)}
              </optgroup>
            </select>
          </div>
          <div>
            <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>详细描述 * (问题是什么，需要哪个部门怎么配合)</label>
            <textarea rows="5" value={draft.description} onChange={e => setDraft({...draft, description:e.target.value})} placeholder="例：&#10;1. VK6080 这单订单已经下单 20 天，工厂一直没出货&#10;2. 客户已发邮件三次催问，态度越来越急&#10;3. 需要跟单部门帮忙催工厂，最迟本周五出货&#10;4. 如有问题，请回复给我转告客户" />
          </div>
          <div>
            <label className="text-[10px] font-bold uppercase mb-1 block" style={{color:'var(--ink-3)'}}>截图附件（粘贴 / 拖拽 / 点击）</label>
            <div className="dropzone" onClick={() => fileInputRef.current?.click()} onDragOver={e => {e.preventDefault();}} onDrop={e => {e.preventDefault(); const f=e.dataTransfer.files?.[0]; if(f) handleFile(f);}}>
              <Icon name="upload" className="w-5 h-5 mx-auto mb-1" style={{color:'var(--ink-4)'}} />
              <div className="text-xs font-bold" style={{color:'var(--ink-2)'}}>添加截图（Ctrl+V 粘贴最快）</div>
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFile(e.target.files?.[0])} />
            </div>
            {draft.attachments?.length > 0 && (
              <div className="mt-2 flex gap-2 flex-wrap">
                {draft.attachments.map(a => (
                  <div key={a.id} className="relative group">
                    <img src={a.data} className="thumb" />
                    <button onClick={() => setDraft({...draft, attachments: draft.attachments.filter(x => x.id !== a.id)})}
                      className="absolute -top-1 -right-1 w-5 h-5 rounded-full text-white text-xs font-bold flex items-center justify-center opacity-0 group-hover:opacity-100"
                      style={{background:'var(--bad)', border:'1.5px solid white'}}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="mt-4 pt-3 border-t flex justify-end gap-2" style={{borderColor:'var(--line)'}}>
          <button className="btn-ghost" onClick={onCancel}>取消</button>
          <button className="btn-pri" disabled={!canSubmit} onClick={() => onSubmit(draft)}>📨 提交工单</button>
        </div>
      </div>
    </div>
  );
};

const TicketDetailModal = ({ ticket, user, employees, onClose, onUpdateStatus, onAddComment, onDelete }) => {
  const [newComment, setNewComment] = useState('');
  const [viewImg, setViewImg] = useState(null);
  const dept = DEPARTMENTS.find(d => d.key === ticket.department);
  const st = TICKET_STATUS.find(s => s.key === ticket.status);
  const pri = TICKET_PRIORITY.find(p => p.key === ticket.priority);
  const isCreator = ticket.created_by_id === user.id;
  const isTarget = ticket.target_id === user.id;
  const isAdmin = user.role === 'admin';
  const canChangeStatus = isTarget || isAdmin;
  const canDelete = isCreator || isAdmin;

  const allowedTransitions = ticket.status === 'pending' ? ['accepted', 'rejected']
    : ticket.status === 'accepted' ? ['processing', 'rejected']
    : ticket.status === 'processing' ? ['resolved', 'rejected']
    : [];

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card paper p-6 w-full" style={{maxWidth:760}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between mb-4 gap-3">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              <span className={`tag ${pri?.cls}`}>{pri?.label}</span>
              <span className={`tag ${st?.cls}`}>{st?.label}</span>
              <span className="text-xs" style={{color:'var(--ink-3)'}}>{dept?.icon} {dept?.label}</span>
              {ticket.related_order && <span className="font-mono text-[11px]" style={{color:'var(--accent)'}}>📦 {ticket.related_order}</span>}
            </div>
            <div className="font-display text-lg font-bold">{ticket.title}</div>
            <div className="text-[11px] font-mono mt-1" style={{color:'var(--ink-4)'}}>
              发起人 {ticket.created_by_name} → 接收人 {ticket.target_name || '主管'} · {new Date(ticket.created_at).toLocaleString('zh-CN')}
            </div>
          </div>
          <button className="btn-ghost" onClick={onClose}><Icon name="x" className="w-5 h-5" /></button>
        </div>

        <div className="rounded-lg p-3 mb-3" style={{background:'var(--bg)', whiteSpace:'pre-line', fontSize:13, lineHeight:1.65}}>
          {ticket.description}
        </div>

        {ticket.attachments?.length > 0 && (
          <div className="mb-3 flex gap-2 flex-wrap">
            {ticket.attachments.map(a => (
              <img key={a.id} src={a.data} className="thumb" onClick={() => setViewImg(a.data)} />
            ))}
          </div>
        )}

        {/* 状态变更按钮 */}
        {canChangeStatus && allowedTransitions.length > 0 && (
          <div className="rounded-lg p-3 mb-3 border-2" style={{borderColor:'var(--accent-mid)', background:'var(--accent-soft)'}}>
            <div className="text-[10px] font-bold uppercase mb-2" style={{color:'var(--accent)'}}>变更状态 (作为接收人)</div>
            <div className="flex flex-wrap gap-2">
              {allowedTransitions.map(s => {
                const trans = TICKET_STATUS.find(x => x.key === s);
                return <button key={s} className={`tab-btn`} onClick={() => onUpdateStatus(s)}>→ {trans.label}</button>;
              })}
            </div>
          </div>
        )}

        {/* 评论时间线 */}
        <div className="mb-3">
          <div className="text-[10px] font-bold uppercase mb-2" style={{color:'var(--ink-3)'}}>💬 沟通记录 ({ticket.comments?.length || 0})</div>
          {ticket.comments?.length > 0 ? (
            <div className="space-y-2 max-h-60 overflow-y-auto scrollbar-thin">
              {ticket.comments.map(c => (
                <div key={c.id} className="rounded-lg p-2 border" style={{borderColor:'var(--line)', background: c.type==='status' ? 'var(--bg)' : 'white'}}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-[11px] font-bold" style={{color: c.type==='status' ? 'var(--accent)' : 'var(--ink-2)'}}>
                      {c.type==='status' && '🔄 '}{c.by_name}
                    </span>
                    <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>{new Date(c.time).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>
                  </div>
                  <div className="text-xs" style={{color:c.type==='status' ? 'var(--ink-3)' : 'var(--ink)'}}>{c.content}</div>
                </div>
              ))}
            </div>
          ) : <div className="text-xs text-center py-3" style={{color:'var(--ink-4)'}}>暂无沟通</div>}
        </div>

        <div className="rounded-lg p-3 border-2" style={{borderColor:'var(--line)', background:'var(--bg)'}}>
          <textarea rows="2" value={newComment} onChange={e => setNewComment(e.target.value)} placeholder="补充进展、提供信息、追问..." />
          <div className="mt-2 flex justify-between items-center">
            {canDelete && <button className="btn-ghost text-[11px]" onClick={onDelete} style={{color:'var(--bad)'}}>🗑 删除工单</button>}
            <button className="btn-pri text-xs" disabled={!newComment.trim()} onClick={() => { onAddComment(newComment); setNewComment(''); }}>💬 发送</button>
          </div>
        </div>

        {viewImg && (
          <div className="modal-backdrop" style={{zIndex:60}} onClick={() => setViewImg(null)}>
            <img src={viewImg} style={{maxWidth:'90vw', maxHeight:'90vh', borderRadius:8}} />
          </div>
        )}
      </div>
    </div>
  );
};


// ============================================================
// 知识库模块 - 从 Supabase 拉取双语 Q&A
// ============================================================
const KbModule = ({ user, toast, cloudOn }) => {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [activeCat, setActiveCat] = useState('all');
  const [lang, setLang] = useState('cn');  // cn | en | both
  const [openId, setOpenId] = useState(null);
  const [customerName, setCustomerName] = useState('');  // 用于占位符替换

  const loadKb = async () => {
    setLoading(true);
    if (cloudOn && CLOUD.client) {
      const cloud = await CLOUD.list('workspace_kb', { order:{col:'id', asc:true}, limit:500 });
      if (cloud !== null && cloud.length > 0) {
        setEntries(cloud);
        setLoading(false);
        return;
      }
    }
    // 本地兜底（空）
    setEntries(STORE.get('kb_local', []));
    setLoading(false);
  };

  useEffect(() => { loadKb(); }, [cloudOn]);

  // 筛选
  const filtered = useMemo(() => {
    let list = entries;
    if (activeCat !== 'all') list = list.filter(e => (e.category||e.cat_cn) === activeCat || e.cat_key === activeCat);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(e =>
        (e.q_cn||'').toLowerCase().includes(q) ||
        (e.q_en||'').toLowerCase().includes(q) ||
        (e.a_cn||'').toLowerCase().includes(q) ||
        (e.a_en||'').toLowerCase().includes(q)
      );
    }
    return list;
  }, [entries, activeCat, search]);

  // 占位符替换 + 复制
  const interpolate = (text) => {
    if (!text) return '';
    let t = text;
    if (customerName.trim()) t = t.replace(/\[客户姓名\]/g, customerName.trim()).replace(/\[Customer Name\]/g, customerName.trim());
    return t;
  };

  const copyAnswer = async (entry, useLang) => {
    const text = interpolate(useLang === 'en' ? entry.a_en : useLang === 'both' ? `${entry.a_cn}\n\n----\n\n${entry.a_en}` : entry.a_cn);
    try {
      await navigator.clipboard.writeText(text);
      toast(`✓ 已复制${useLang==='en'?'英文':useLang==='both'?'中英双语':'中文'}回复`);
    } catch(e) { toast('⚠ 复制失败，请手动复制'); }
  };

  // 渲染含占位符的文本
  const renderHighlighted = (text) => {
    if (!text) return null;
    const t = interpolate(text);
    const parts = t.split(/(\[[^\]]+\])/g);
    return parts.map((p, i) => p.match(/^\[.+\]$/) ? <span key={i} className="kb-placeholder">{p}</span> : <React.Fragment key={i}>{p}</React.Fragment>);
  };

  return (
    <div className="space-y-4 fade-in">
      {/* 顶部工具栏 */}
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap mb-3">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-display text-base font-bold" style={{color:'var(--accent)'}}>📚 客服知识库</span>
            <span className="tag tag-neutral">{entries.length} 条 Q&A</span>
            <span className={`cloud-status ${cloudOn?'ok':'local'}`}>
              <span className="dot"></span>
              {cloudOn ? '云端' : '本地'}
            </span>
            <button className="btn-ghost text-[11px]" onClick={loadKb} title="刷新">🔄 刷新</button>
          </div>
          <div className="flex items-center gap-2">
            <input value={customerName} onChange={e => setCustomerName(e.target.value)} placeholder="客户姓名（自动替换 [客户姓名]）" style={{width:240, fontSize:12, padding:'5px 10px'}} />
            <select value={lang} onChange={e => setLang(e.target.value)} style={{padding:'5px 8px', fontSize:11}}>
              <option value="cn">中文</option>
              <option value="en">English</option>
              <option value="both">中英对照</option>
            </select>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 搜索问题或答案..." style={{flex:1, minWidth:200, maxWidth:400, fontSize:13}} />
          <div className="flex gap-1 flex-wrap">
            <button className={`tab-btn ${activeCat==='all'?'active':''}`} onClick={() => setActiveCat('all')}>全部</button>
            {KB_CATEGORIES.map(c => {
              const n = entries.filter(e => (e.category||e.cat_cn) === c.label_cn).length;
              return <button key={c.key} className={`tab-btn ${activeCat===c.label_cn?'active':''}`} onClick={() => setActiveCat(c.label_cn)} style={{borderColor: activeCat===c.label_cn ? c.color : null}}>
                {c.label_cn} ({n})
              </button>;
            })}
          </div>
        </div>
      </div>

      {!cloudOn && (
        <div className="paper rounded-2xl p-4 fade-in" style={{background:'#fef3c7', borderColor:'#fbbf24'}}>
          <div className="font-bold text-sm mb-1" style={{color:'#92400e'}}>⚠️ 知识库需要从 Supabase 加载</div>
          <div className="text-xs" style={{color:'#92400e', lineHeight:1.6}}>
            知识库存储在 Supabase 云端，团队共享。请前往「员工管理 → 云同步设置」配置 Supabase URL + Key 后，即可加载 280 条客服双语 Q&A 模板。
          </div>
        </div>
      )}

      {cloudOn && entries.length === 0 && !loading && (
        <div className="paper rounded-2xl p-6 fade-in text-center">
          <div className="text-4xl mb-3">📭</div>
          <div className="font-bold text-sm mb-2">知识库还是空的</div>
          <div className="text-xs leading-relaxed" style={{color:'var(--ink-3)'}}>
            云端 `workspace_kb` 表存在但没有数据。<br/>
            <strong>请把 knowledge_base.json 导入 Supabase</strong>（具体方法见 SQL 部署说明）。
          </div>
        </div>
      )}

      {loading && <div className="paper rounded-2xl p-6 text-center text-sm" style={{color:'var(--ink-3)'}}>正在从云端加载知识库...</div>}

      {/* 列表 */}
      <div className="space-y-2">
        {filtered.map(e => {
          const cat = KB_CATEGORIES.find(c => c.label_cn === (e.category||e.cat_cn));
          const isOpen = openId === e.id;
          return (
            <div key={e.id} className="kb-card">
              <div className="flex items-start gap-3 cursor-pointer" onClick={() => setOpenId(isOpen ? null : e.id)}>
                <span className="kb-cat-tag" style={{background: cat ? `${cat.color}15` : 'var(--bg)', color: cat?.color || 'var(--ink-3)', border:`1px solid ${cat?.color || 'var(--line)'}40`}}>
                  {(e.category||e.cat_cn)}
                </span>
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-sm" style={{color:'var(--ink)'}}>
                    {lang === 'en' ? e.q_en : e.q_cn}
                  </div>
                  {lang === 'both' && e.q_en && (
                    <div className="text-xs mt-0.5" style={{color:'var(--ink-3)'}}>{e.q_en}</div>
                  )}
                </div>
                <span className="text-xs" style={{color:'var(--ink-4)'}}>{isOpen ? '▾' : '▸'}</span>
              </div>
              {isOpen && (
                <div className="mt-3 pt-3 border-t" style={{borderColor:'var(--line-soft)'}}>
                  {(lang === 'cn' || lang === 'both') && e.a_cn && (
                    <div className="kb-answer mb-2">
                      <div className="text-[10px] font-bold uppercase mb-1.5" style={{color:'var(--ink-3)'}}>🇨🇳 中文回复</div>
                      {renderHighlighted(e.a_cn)}
                    </div>
                  )}
                  {(lang === 'en' || lang === 'both') && e.a_en && (
                    <div className="kb-answer mb-2">
                      <div className="text-[10px] font-bold uppercase mb-1.5" style={{color:'var(--ink-3)'}}>🇺🇸 English Reply</div>
                      {renderHighlighted(e.a_en)}
                    </div>
                  )}
                  <div className="flex justify-end gap-2 mt-2">
                    {e.a_cn && <button className="btn-sec text-xs" onClick={() => copyAnswer(e, 'cn')}>📋 复制中文</button>}
                    {e.a_en && <button className="btn-sec text-xs" onClick={() => copyAnswer(e, 'en')}>📋 复制英文</button>}
                    {e.a_cn && e.a_en && <button className="btn-pri text-xs" onClick={() => copyAnswer(e, 'both')}>📋 中英对照</button>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {entries.length > 0 && filtered.length === 0 && (
        <div className="text-center text-sm py-4" style={{color:'var(--ink-3)'}}>
          无匹配 Q&A · 试试别的关键词或换个分类
        </div>
      )}
    </div>
  );
};


// ============================================================
// 云同步设置模块（嵌入员工管理顶部）
// ============================================================
const CloudSettingsCard = ({ cfg, setCfg, toast, onApply }) => {
  const [url, setUrl] = useState(cfg.url || DEFAULT_SB_URL);
  const [key, setKey] = useState(cfg.key || '');
  const [enabled, setEnabled] = useState(cfg.enabled || false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleTest = async () => {
    setTesting(true);
    setTestResult(null);
    const ok = CLOUD.init(url.trim(), key.trim());
    if (!ok) { setTestResult({ok:false, msg:CLOUD.lastError || '初始化失败'}); setTesting(false); return; }
    const res = await CLOUD.ping();
    setTestResult(res);
    setTesting(false);
  };

  const handleSave = () => {
    const nextCfg = { url: url.trim(), key: key.trim(), enabled };
    STORE.set('cloud_config', nextCfg);
    setCfg(nextCfg);
    if (enabled && url && key) {
      const ok = CLOUD.init(url.trim(), key.trim());
      if (ok) toast('☁ 云同步已启用'); else toast('⚠ 云同步配置错误');
    } else {
      CLOUD.client = null; CLOUD.enabled = false; CLOUD.status = 'local';
      toast('已切换为本地模式');
    }
    onApply();
  };

  return (
    <div className="paper rounded-2xl p-5 mb-5">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="font-display text-base font-bold" style={{color:'var(--accent)'}}>☁ 云同步设置</div>
          <div className="text-[11px] mt-1" style={{color:'var(--ink-3)'}}>启用后客服记录、报价单、汇报工单、知识库均在 Supabase 云端协同</div>
        </div>
        <span className={`cloud-status ${CLOUD.status}`}><span className="dot"></span>{CLOUD.status === 'ok' ? '已连接' : CLOUD.status === 'err' ? '错误' : '本地模式'}</span>
      </div>
      <div className="space-y-3">
        <div>
          <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>Supabase URL</label>
          <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxx.supabase.co" style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}} />
        </div>
        <div>
          <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>Anon / Publishable Key</label>
          <input value={key} onChange={e => setKey(e.target.value)} placeholder="sb_publishable_xxx 或 eyJ..." style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}} type="password" />
        </div>
        <div className="flex items-center justify-between">
          <label className="flex items-center gap-2 cursor-pointer text-sm">
            <input type="checkbox" checked={enabled} onChange={e => setEnabled(e.target.checked)} />
            启用云同步（关闭后所有操作仅本地）
          </label>
          <div className="flex gap-2">
            <button className="btn-sec text-xs" onClick={handleTest} disabled={testing || !url || !key}>{testing ? '测试中...' : '🔌 测试连接'}</button>
            <button className="btn-pri text-xs" onClick={handleSave}>💾 保存并应用</button>
          </div>
        </div>
        {testResult && (
          <div className={`p-2 rounded text-xs ${testResult.ok ? 'tag-good' : 'tag-warn'}`} style={{background: testResult.ok ? '#dcfce7' : '#fee2e2', color: testResult.ok ? '#166534' : '#991b1b'}}>
            {testResult.ok ? '✓ ' : '✗ '}{testResult.msg}
          </div>
        )}
        <div className="text-[10px] rounded p-2" style={{background:'var(--bg)', color:'var(--ink-3)', lineHeight:1.65}}>
          <strong>📋 首次使用步骤：</strong>
          <ol style={{listStyle:'decimal', paddingLeft:18, marginTop:4}}>
            <li>在 Supabase 仪表板 → SQL Editor 运行附带的 <code>supabase_init.sql</code></li>
            <li>把 <code>knowledge_base.json</code> 导入 <code>workspace_kb</code> 表（详见 SQL 末尾说明）</li>
            <li>在此填入 URL + Publishable Key → 测试连接 → 保存</li>
            <li>团队成员只需复制本 HTML + 在此填同样配置即可共享数据</li>
          </ol>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// 主 App (Shell + 路由)
// ============================================================
const App = () => {
  // 员工 (localStorage + 云同步备份)
  const [employees, setEmployees] = useState(() => STORE.get('employees', INITIAL_EMPLOYEES));
  useEffect(() => { STORE.set('employees', employees); }, [employees]);

  // 云同步配置
  const [cloudCfg, setCloudCfg] = useState(() => STORE.get('cloud_config', { url:DEFAULT_SB_URL, key:'', enabled:false }));
  const [cloudOn, setCloudOn] = useState(false);
  const [cloudVersion, setCloudVersion] = useState(0); // 用于强制重新加载

  // 初始化云连接
  useEffect(() => {
    if (cloudCfg.enabled && cloudCfg.url && cloudCfg.key) {
      const ok = CLOUD.init(cloudCfg.url, cloudCfg.key);
      setCloudOn(ok);
      if (ok) {
        // 后台 ping
        CLOUD.ping().then(r => { if (!r.ok) setCloudOn(false); });
      }
    } else {
      setCloudOn(false);
    }
  }, [cloudCfg]);

  // 当前登录用户
  const [user, setUser] = useState(() => {
    const stored = STORE.get('current_user', null);
    if (!stored) return null;
    const emp = STORE.get('employees', INITIAL_EMPLOYEES).find(e => e.id === stored.id);
    return emp || null;
  });

  // 所有客服记录 (localStorage + 云同步)
  const [records, setRecords] = useState(() => STORE.get('cs_records', []));
  // 写入 localStorage（永久兜底）
  useEffect(() => { STORE.set('cs_records', records); }, [records]);

  // 云同步：启用时把云端记录拉下来覆盖本地视图（首次加载）
  useEffect(() => {
    if (!cloudOn || !user) return;
    (async () => {
      const cloud = await CLOUD.list('workspace_records', { order:{col:'updated_at', asc:false}, limit:1000 });
      if (cloud !== null) {
        // 合并策略：云端为准
        setRecords(cloud);
      }
    })();
  }, [cloudOn, user, cloudVersion]);

  // 写入云端（每次 records 变化，debounced）
  const recordsRef = useRef(records);
  recordsRef.current = records;
  useEffect(() => {
    if (!cloudOn || !user) return;
    const t = setTimeout(async () => {
      // 找出与上次不同的记录上传（简化：全量）
      // 性能优化点：后续可以做 diff
      const current = recordsRef.current;
      if (current.length === 0) return;
      // 批量 upsert
      try {
        await CLOUD.client.from('workspace_records').upsert(current);
      } catch(e) { console.error('云端写入失败', e); }
    }, 1500);
    return () => clearTimeout(t);
  }, [records, cloudOn, user]);

  // tab
  const [activeTab, setActiveTab] = useState('cs');

  // Toast
  const [toast, toastNode] = useToast();

  // 通知权限
  const [notifPerm, setNotifPerm] = useState(() => {
    if (typeof Notification === 'undefined') return 'unsupported';
    return Notification.permission;
  });
  const requestNotifPerm = () => {
    if (typeof Notification === 'undefined') { toast('⚠️ 当前浏览器不支持桌面通知'); return; }
    if (Notification.permission === 'denied') { toast('⚠️ 通知已被浏览器禁用，请在浏览器设置中开启'); return; }
    Notification.requestPermission().then(p => {
      setNotifPerm(p);
      if (p === 'granted') { sendDesktopNotification('统一工作台', '✅ 桌面通知已开启', 'workspace-test'); toast('✓ 桌面通知已开启'); }
      else toast('已取消授权');
    });
  };

  // 登录
  const onLogin = (emp) => {
    setUser(emp);
    STORE.set('current_user', { id: emp.id });
    toast(`✓ 欢迎回来, ${emp.name}`);
    // 登录后若用户尚未做选择，温和地引导一次（不强弹，由用户主动点）
  };

  const onLogout = () => {
    if (!confirm('确认退出登录？')) return;
    setUser(null);
    STORE.del('current_user');
  };

  // 统计 badge
  const today = todayISO();
  const stats = useMemo(() => {
    if (!user) return { overdue:0, dueToday:0, trashCount:0, ticketInbox:0 };
    const live = records.filter(r => !r.deleted);
    const mine = user.role === 'admin' ? live : live.filter(r => r.ownerId === user.id);
    const overdue = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today).length;
    const dueToday = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp === today).length;
    const trash = user.role === 'admin'
      ? records.filter(r => r.deleted).length
      : records.filter(r => r.deleted && (r.deletedBy === user.id || r.ownerId === user.id)).length;
    // 工单收件箱（本地缓存计数，准确数字在 ReportModule 内）
    const tickets = STORE.get('tickets_local', []);
    const ticketInbox = tickets.filter(t => (t.target_id === user.id) && (t.status === 'pending' || t.status === 'accepted')).length;
    return { overdue, dueToday, trashCount: trash, ticketInbox };
  }, [records, user, today]);

  // 标题栏徽章: (N) 统一工作台
  useEffect(() => {
    const n = stats.overdue + stats.dueToday;
    document.title = (n > 0 ? `(${n}) ` : '') + '统一工作台';
  }, [stats.overdue, stats.dueToday]);

  // 桌面通知 - 定时检查
  useEffect(() => {
    if (!user) return;
    if (notifPerm !== 'granted') return;

    // 会话内已通知 ID（sessionStorage 保证刷新后重发）
    const notifiedKey = 'workspace_notified_ids';
    const getNotified = () => {
      try { return new Set(JSON.parse(sessionStorage.getItem(notifiedKey) || '[]')); }
      catch(e) { return new Set(); }
    };
    const saveNotified = (set) => {
      try { sessionStorage.setItem(notifiedKey, JSON.stringify([...set])); } catch(e) {}
    };

    const check = () => {
      const today = todayISO();
      const notified = getNotified();
      const live = records.filter(r => !r.deleted);
      const mine = user.role === 'admin' ? live : live.filter(r => r.ownerId === user.id);

      // 逾期
      const overdue = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today && !notified.has('over_' + r.id));
      // 今日到期
      const dueToday = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp === today && !notified.has('today_' + r.id));

      if (overdue.length > 0) {
        const r = overdue[0];
        const more = overdue.length > 1 ? `（另有 ${overdue.length - 1} 单未跟进）` : '';
        sendDesktopNotification(
          `⏰ 跟进已逾期：${r.customer || '未填客户'}`,
          `事项：${r.category || '—'}｜原定 ${r.nextFollowUp} 跟进${more}`,
          'overdue_' + r.id
        );
        overdue.forEach(o => notified.add('over_' + o.id));
      } else if (dueToday.length > 0) {
        const r = dueToday[0];
        const more = dueToday.length > 1 ? `（今日另有 ${dueToday.length - 1} 单）` : '';
        sendDesktopNotification(
          `📌 今日跟进提醒：${r.customer || '未填客户'}`,
          `事项：${r.category || '—'}｜请尽早跟进${more}`,
          'today_' + r.id
        );
        dueToday.forEach(o => notified.add('today_' + o.id));
      }
      saveNotified(notified);
    };

    // 启动后 3 秒检查一次（避免登录瞬间打扰），之后每 5 分钟检查
    const t1 = setTimeout(check, 3000);
    const t2 = setInterval(check, 5 * 60 * 1000);
    return () => { clearTimeout(t1); clearInterval(t2); };
  }, [user, records, notifPerm]);

  if (!user) {
    return <LoginScreen employees={employees} onLogin={onLogin} />;
  }

  return (
    <div className="min-h-screen">
      <TopNav user={user} activeTab={activeTab} setActiveTab={setActiveTab} onLogout={onLogout} stats={stats} notifPerm={notifPerm} requestNotifPerm={requestNotifPerm} cloudOn={cloudOn} />
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {activeTab === 'cs' && (
          <CSModule user={user} employees={employees} records={records} setRecords={setRecords} toast={toast} />
        )}
        {activeTab === 'finance' && (
          <FinanceModule toast={toast} />
        )}
        {activeTab === 'quote' && (
          <QuoteModule user={user} employees={employees} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'kb' && (
          <KbModule user={user} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'report' && (
          <ReportModule user={user} employees={employees} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'dashboard' && (
          <DashboardModule user={user} employees={employees} records={records} />
        )}
        {activeTab === 'trash' && (
          <TrashModule user={user} employees={employees} records={records} setRecords={setRecords} toast={toast} />
        )}
        {activeTab === 'admin' && user.role === 'admin' && (
          <AdminModule user={user} employees={employees} setEmployees={setEmployees} toast={toast} cloudCfg={cloudCfg} setCloudCfg={setCloudCfg} onCloudApply={() => setCloudVersion(v=>v+1)} />
        )}
      </div>
      <footer className="text-center text-[10px] font-mono py-6 no-print" style={{color:'var(--ink-4)'}}>
        统一工作台 · v2.0 · {cloudOn ? '☁ 云端协同 · Supabase' : '💾 数据本地存储'}
      </footer>
      {toastNode}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
