const ReportModule = ({ user, employees, toast, cloudOn }) => {
  const [tab, setTab] = useState('inbox');  // inbox | mine | new | all (admin)
  const [tickets, setTickets] = useState([]);
  const [openTicket, setOpenTicket] = useState(null);
  const [draft, setDraft] = useState(null);

  const isAdmin = user.role === 'admin';

  // 加载工单（云端优先）
  const loadTickets = async () => {
    if (cloudOn && CLOUD.client) {
      const cloud = await CLOUD.list('workspace_tickets', { order:{col:'updated_at', asc:false}, limit:500 });
      if (cloud !== null) { setTickets(cloud); return; }
    }
    setTickets(STORE.get('tickets_local', []));
  };

  useEffect(() => { loadTickets(); }, [cloudOn]);

  // 保存工单
  const saveTicket = async (ticket) => {
    const now = nowISO();
    const record = { ...ticket, id: ticket.id || uid(), updated_at: now, created_at: ticket.created_at || now };
    if (cloudOn && CLOUD.client) {
      const saved = await CLOUD.upsert('workspace_tickets', record);
      if (saved) { await loadTickets(); return record; }
      toast('⚠ 云端保存失败，已存至本地');
    }
    const local = STORE.get('tickets_local', []);
    const idx = local.findIndex(t => t.id === record.id);
    if (idx >= 0) local[idx] = record; else local.unshift(record);
    STORE.set('tickets_local', local);
    setTickets(local);
    return record;
  };

  // 新建工单
  const createTicket = async (t) => {
    const record = {
      ...t,
      created_by_id: user.id,
      created_by_name: user.name + (user.alias ? ' ' + user.alias : ''),
      status: 'pending',
      comments: [],
      attachments: t.attachments || [],
    };
    await saveTicket(record);
    setDraft(null);
    toast('✓ 工单已提交');
    setTab('mine');
  };

  // 状态变更
  const updateStatus = async (ticket, newStatus) => {
    const comment = {
      id: uid(),
      by_id: user.id,
      by_name: user.name + (user.alias ? ' ' + user.alias : ''),
      time: nowISO(),
      type: 'status',
      content: `状态变更为「${TICKET_STATUS.find(s=>s.key===newStatus)?.label}」`,
      from: ticket.status,
      to: newStatus,
    };
    const updated = { ...ticket, status: newStatus, comments: [...(ticket.comments||[]), comment] };
    if (newStatus === 'resolved' || newStatus === 'rejected') updated.resolved_at = nowISO();
    const saved = await saveTicket(updated);
    setOpenTicket(saved);
    toast(`✓ ${comment.content}`);
  };

  // 添加评论
  const addComment = async (ticket, text) => {
    if (!text.trim()) return;
    const comment = { id: uid(), by_id: user.id, by_name: user.name + (user.alias ? ' ' + user.alias : ''), time: nowISO(), type: 'comment', content: text.trim() };
    const updated = { ...ticket, comments: [...(ticket.comments||[]), comment] };
    const saved = await saveTicket(updated);
    setOpenTicket(saved);
  };

  // 删除（仅创建人或主管）
  const deleteTicket = async (id) => {
    if (!confirm('永久删除此工单？')) return;
    if (cloudOn && CLOUD.client) {
      const ok = await CLOUD.del('workspace_tickets', id);
      if (ok) await loadTickets();
    } else {
      const local = STORE.get('tickets_local', []).filter(t => t.id !== id);
      STORE.set('tickets_local', local);
      setTickets(local);
    }
    setOpenTicket(null);
    toast('已删除');
  };

  // 筛选
  const inbox = tickets.filter(t =>
    (isAdmin && t.target_id === user.id) || (isAdmin && !t.target_id && t.assignee === 'admin') ||
    (t.target_id === user.id)
  );
  const mine = tickets.filter(t => t.created_by_id === user.id);
  const all = tickets;

  const list = tab === 'inbox' ? inbox : tab === 'mine' ? mine : tab === 'all' ? all : [];
  const pendingCount = inbox.filter(t => t.status === 'pending' || t.status === 'accepted').length;
  const myPendingCount = mine.filter(t => t.status === 'pending' || t.status === 'accepted' || t.status === 'processing').length;

  return (
    <div className="space-y-5 fade-in">
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-wrap">
            <button className={`tab-btn ${tab==='inbox'?'active':''}`} onClick={() => setTab('inbox')}>
              📥 我的收件箱 {pendingCount > 0 && <span className="badge">{pendingCount}</span>}
            </button>
            <button className={`tab-btn ${tab==='mine'?'active':''}`} onClick={() => setTab('mine')}>
              📤 我发起的 {myPendingCount > 0 && <span className="badge" style={{background:'var(--gold)'}}>{myPendingCount}</span>}
            </button>
            {isAdmin && (
              <button className={`tab-btn ${tab==='all'?'active':''}`} onClick={() => setTab('all')}>
                🗂 全部工单 ({tickets.length})
              </button>
            )}
          </div>
          <div className="flex items-center gap-2">
            <span className={`cloud-status ${cloudOn?'ok':'local'}`}>
              <span className="dot"></span>
              {cloudOn ? '云端协同' : '本地'}
            </span>
            <button className="btn-pri" onClick={() => setDraft({
              title:'', department:'merchandiser', priority:'mid', related_order:'',
              target_id: isAdmin ? '' : (employees.find(e => e.role === 'admin')?.id || ''),
              target_name:'', description:'', attachments:[]
            })}>+ 新建工单</button>
          </div>
        </div>
      </div>

      {/* 工单列表 */}
      <div className="paper rounded-2xl overflow-hidden">
        <div className="overflow-x-auto scrollbar-thin">
          <table style={{minWidth:'900px'}}>
            <thead>
              <tr>
                <th style={{width:50}}>优先级</th>
                <th style={{width:80}}>状态</th>
                <th style={{minWidth:240}}>标题</th>
                <th style={{width:90}}>对接部门</th>
                <th style={{width:100}}>发起人</th>
                <th style={{width:100}}>接收人</th>
                <th style={{width:120}}>更新时间</th>
                <th style={{width:50}}></th>
              </tr>
            </thead>
            <tbody>
              {list.length === 0 ? (
                <tr><td colSpan={8} style={{textAlign:'center', padding:'40px', color:'var(--ink-3)'}}>
                  {tab === 'inbox' ? '收件箱为空 ✨' : tab === 'mine' ? '你还没发起过工单 · 点击右上"+ 新建工单"' : '暂无工单'}
                </td></tr>
              ) : list.map(t => {
                const dept = DEPARTMENTS.find(d => d.key === t.department);
                const st = TICKET_STATUS.find(s => s.key === t.status);
                const pri = TICKET_PRIORITY.find(p => p.key === t.priority);
                return (
                  <tr key={t.id} style={{cursor:'pointer'}} onClick={() => setOpenTicket(t)}>
                    <td><span className={`tag ${pri?.cls}`} style={{fontSize:10}}>{pri?.label}</span></td>
                    <td><span className={`tag ${st?.cls}`} style={{fontSize:10}}>{st?.label}</span></td>
                    <td className="font-bold text-xs">{t.title}{t.related_order && <span className="font-mono ml-2 text-[10px]" style={{color:'var(--ink-4)'}}>· {t.related_order}</span>}</td>
                    <td className="text-xs">{dept?.icon} {dept?.label}</td>
                    <td className="text-xs" style={{color:'var(--ink-3)'}}>{t.created_by_name}</td>
                    <td className="text-xs" style={{color:'var(--ink-3)'}}>{t.target_name || '主管'}</td>
                    <td className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>{new Date(t.updated_at).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</td>
                    <td>{(t.comments?.length||0) > 0 && <span className="text-[10px]" style={{color:'var(--ink-3)'}}>💬{t.comments.length}</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* 新建 modal */}
      {draft && (
        <TicketDraftModal
          draft={draft}
          setDraft={setDraft}
          employees={employees}
          user={user}
          onCancel={() => setDraft(null)}
          onSubmit={createTicket}
        />
      )}

      {/* 查看 modal */}
      {openTicket && (
        <TicketDetailModal
          ticket={openTicket}
          user={user}
          employees={employees}
          onClose={() => setOpenTicket(null)}
          onUpdateStatus={(s) => updateStatus(openTicket, s)}
          onAddComment={(t) => addComment(openTicket, t)}
          onDelete={() => deleteTicket(openTicket.id)}
        />
      )}
    </div>
  );
};

const TicketDraftModal = ({ draft, setDraft, employees, user, onCancel, onSubmit }) => {
  const fileInputRef = useRef(null);
  const handleFile = (file) => {
    if (!file) return;
    if (file.size > 2*1024*1024) { alert('图片需小于 2MB'); return; }
    const r = new FileReader();
    r.onload = e => setDraft({ ...draft, attachments:[...(draft.attachments||[]), { id:uid(), data:e.target.result, name:file.name, time:nowISO() }] });
    r.readAsDataURL(file);
  };
  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) if (it.type.startsWith('image')) handleFile(it.getAsFile());
    };
    window.addEventListener('paste', onPaste);
    return () => window.removeEventListener('paste', onPaste);
  }, [draft]);

  return (

              <select value={draft.department} onChange={e => setDraft({...draft, department:e.target.value})}>
                {DEPARTMENTS.map(d => <option key={d.key} value={d.key}>{d.icon} {d.label}</option>)}

            <div>

            </div>
          </div>
          <div>
            <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>接收人 * (默认发给主管)</label>
            <select value={draft.target_id} onChange={e => {

const CloudSettingsCard = ({ cfg, setCfg, toast, onApply }) => {
  const [url, setUrl] = useState(cfg.url || DEFAULT_SB_URL);
  const [key, setKey] = useState(cfg.key || '');
  const [enabled, setEnabled] = useState(cfg.enabled || false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleTest = async () => {
    setTesting(true);
    setTestResult(null);
    const ok = CLOUD.init(url.trim(), key.trim());
    if (!ok) { setTestResult({ok:false, msg:CLOUD.lastError || '初始化失败'}); setTesting(false); return; }
    const res = await CLOUD.ping();
    setTestResult(res);
    setTesting(false);
  };

  const handleSave = () => {
    const nextCfg = { url: url.trim(), key: key.trim(), enabled };
    STORE.set('cloud_config', nextCfg);
    setCfg(nextCfg);
    if (enabled && url && key) {
      const ok = CLOUD.init(url.trim(), key.trim());
      if (ok) toast('☁ 云同步已启用'); else toast('⚠ 云同步配置错误');
    } else {
      CLOUD.client = null; CLOUD.enabled = false; CLOUD.status = 'local';
      toast('已切换为本地模式');
    }
    onApply();
  };

  return (
    <div className="paper rounded-2xl p-5 mb-5">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="font-display text-base font-bold" style={{color:'var(--accent)'}}>☁ 云同步设置</div>
          <div className="text-[11px] mt-1" style={{color:'var(--ink-3)'}}>启用后客服记录、报价单、汇报工单、知识库均在 Supabase 云端协同</div>
        </div>
        <span className={`cloud-status ${CLOUD.status}`}><span className="dot"></span>{CLOUD.status === 'ok' ? '已连接' : CLOUD.status === 'err' ? '错误' : '本地模式'}</span>
      </div>
      <div className="space-y-3">
        <div>
          <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>Supabase URL</label>
          <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxx.supabase.co" style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}} />
        </div>
        <div>
          <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>Anon / Publishable Key</label>
          <input value={key} onChange={e => setKey(e.target.value)} placeholder="sb_publishable_xxx 或 eyJ..." style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}} type="password" />
        </div>
        <div className="flex items-center justify-between">
          <label className="flex items-center gap-2 cursor-pointer text-sm">
            <input type="checkbox" checked={enabled} onChange={e => setEnabled(e.target.checked)} />
            启用云同步（关闭后所有操作仅本地）
          </label>
          <div className="flex gap-2">
            <button className="btn-sec text-xs" onClick={handleTest} disabled={testing || !url || !key}>{testing ? '测试中...' : '🔌 测试连接'}</button>
            <button className="btn-pri text-xs" onClick={handleSave}>💾 保存并应用</button>
          </div>
        </div>
        {testResult && (
          <div className={`p-2 rounded text-xs ${testResult.ok ? 'tag-good' : 'tag-warn'}`} style={{background: testResult.ok ? '#dcfce7' : '#fee2e2', color: testResult.ok ? '#166534' : '#991b1b'}}>
            {testResult.ok ? '✓ ' : '✗ '}{testResult.msg}
          </div>
        )}
        <div className="text-[10px] rounded p-2" style={{background:'var(--bg)', color:'var(--ink-3)', lineHeight:1.65}}>
          <strong>📋 首次使用步骤：</strong>
          <ol style={{listStyle:'decimal', paddingLeft:18, marginTop:4}}>
            <li>在 Supabase 仪表板 → SQL Editor 运行附带的 <code>supabase_init.sql</code></li>
            <li>把 <code>knowledge_base.json</code> 导入 <code>workspace_kb</code> 表（详见 SQL 末尾说明）</li>
            <li>在此填入 URL + Publishable Key → 测试连接 → 保存</li>
            <li>团队成员只需复制本 HTML + 在此填同样配置即可共享数据</li>
          </ol>
        </div>
      </div>
    </div>
  );

// ============================================================
// 主 App (Shell + 路由)
// ============================================================
const App = () => {
  // 员工 (localStorage + 云同步备份) - 加版本号机制，代码里改了 INITIAL_EMPLOYEES 后能自动覆盖
  const EMPLOYEES_VERSION = 2;  // 改了员工资料就 +1
  const [employees, setEmployees] = useState(() => {
    const storedVer = STORE.get('employees_version', 0);
    if (storedVer < EMPLOYEES_VERSION) {
      // 版本升级 → 合并 INITIAL_EMPLOYEES 的新数据（按 id），但保留用户自己添加的员工
      const stored = STORE.get('employees', []);
      const merged = INITIAL_EMPLOYEES.map(initial => {
        const old = stored.find(e => e.id === initial.id);
        // 强制用 INITIAL_EMPLOYEES 的 name/alias/sites/role（覆盖 localStorage），但保留用户改过的密码
        return old ? { ...initial, password: old.password || initial.password } : initial;
      });
      // 加上用户自己添加的（不在 INITIAL_EMPLOYEES 里的）
      const extras = stored.filter(e => !INITIAL_EMPLOYEES.some(i => i.id === e.id));
      STORE.set('employees_version', EMPLOYEES_VERSION);
      return [...merged, ...extras];
    }
    return STORE.get('employees', INITIAL_EMPLOYEES);
  });
  useEffect(() => { STORE.set('employees', employees); }, [employees]);

  // 云同步配置（默认启用，嵌入了团队共享的 publishable key）
  const [cloudCfg, setCloudCfg] = useState(() => {
    const saved = STORE.get('cloud_config', null);
    if (saved && saved.url && saved.key) return saved;
    return { url: DEFAULT_SB_URL, key: DEFAULT_SB_KEY, enabled: true };
  });
  const [cloudOn, setCloudOn] = useState(false);
  const [cloudVersion, setCloudVersion] = useState(0); // 用于强制重新加载

  // 初始化云连接
  useEffect(() => {
    if (cloudCfg.enabled && cloudCfg.url && cloudCfg.key) {
      const ok = CLOUD.init(cloudCfg.url, cloudCfg.key);
      setCloudOn(ok);
      if (ok) {
        // 后台 ping
        CLOUD.ping().then(r => { if (!r.ok) setCloudOn(false); });
      }
    } else {
      setCloudOn(false);
    }
  }, [cloudCfg]);

  // 当前登录用户
  const [user, setUser] = useState(() => {
    const stored = STORE.get('current_user', null);
    if (!stored) return null;
    const emp = STORE.get('employees', INITIAL_EMPLOYEES).find(e => e.id === stored.id);
    return emp || null;
  });

  // 所有客服记录 (localStorage + 云同步)
  const [records, setRecords] = useState(() => STORE.get('cs_records', []));
  // 写入 localStorage（永久兜底）
  useEffect(() => { STORE.set('cs_records', records); }, [records]);

  // 云同步：启用时把云端记录拉下来覆盖本地视图（首次加载）
  useEffect(() => {
    if (!cloudOn || !user) return;
    (async () => {
      const cloud = await CLOUD.list('workspace_records', { order:{col:'updated_at', asc:false}, limit:1000 });
      if (cloud !== null) {
        // 合并策略：云端为准
        setRecords(cloud);
      }
    })();
  }, [cloudOn, user, cloudVersion]);

  // 写入云端（每次 records 变化，debounced）
  const recordsRef = useRef(records);
  recordsRef.current = records;
  useEffect(() => {
    if (!cloudOn || !user) return;
    const t = setTimeout(async () => {
      // 找出与上次不同的记录上传（简化：全量）
      // 性能优化点：后续可以做 diff
      const current = recordsRef.current;
      if (current.length === 0) return;
      // 批量 upsert
      try {
        await CLOUD.client.from('workspace_records').upsert(current);
      } catch(e) { console.error('云端写入失败', e); }
    }, 1500);
    return () => clearTimeout(t);
  }, [records, cloudOn, user]);

  // tab - 持久化到 localStorage，刷新后保留
  const [activeTab, setActiveTab] = useState(() => {
    // URL hash 优先 (#tab=kb)，其次 localStorage，最后默认 cs
    const hashMatch = window.location.hash.match(/tab=([a-z]+)/);
    if (hashMatch) return hashMatch[1];
    return localStorage.getItem('ws_active_tab') || 'cs';
  });
  // tab 切换时写入 localStorage + URL hash
  useEffect(() => {
    localStorage.setItem('ws_active_tab', activeTab);
    // 仅当 tab 不是默认才写 hash，避免普通用户看到难看的 hash
    if (activeTab !== 'cs') {
      window.history.replaceState(null, '', `#tab=${activeTab}`);
    } else if (window.location.hash.includes('tab=')) {
      window.history.replaceState(null, '', window.location.pathname);
    }
  }, [activeTab]);

  // Toast
  const [toast, toastNode] = useToast();

  // 通知权限
  const [notifPerm, setNotifPerm] = useState(() => {
    if (typeof Notification === 'undefined') return 'unsupported';
    return Notification.permission;
  });
  const requestNotifPerm = () => {
    if (typeof Notification === 'undefined') { toast('⚠️ 当前浏览器不支持桌面通知'); return; }
    if (Notification.permission === 'denied') { toast('⚠️ 通知已被浏览器禁用，请在浏览器设置中开启'); return; }
    Notification.requestPermission().then(p => {
      setNotifPerm(p);
      if (p === 'granted') { sendDesktopNotification('统一工作台', '✅ 桌面通知已开启', 'workspace-test'); toast('✓ 桌面通知已开启'); }
      else toast('已取消授权');
    });
  };

  // 登录
  const onLogin = (emp) => {
    setUser(emp);
    STORE.set('current_user', { id: emp.id });
    toast(`✓ 欢迎回来, ${emp.name}`);
    // 登录后若用户尚未做选择，温和地引导一次（不强弹，由用户主动点）
  };

  const onLogout = () => {
    if (!confirm('确认退出登录？')) return;
    setUser(null);
    STORE.del('current_user');
  };

  // 统计 badge
  const today = todayISO();
  const stats = useMemo(() => {
    if (!user) return { overdue:0, dueToday:0, trashCount:0, ticketInbox:0 };
    const live = records.filter(r => !r.deleted);
    const mine = user.role === 'admin' ? live : live.filter(r => r.ownerId === user.id);
    const overdue = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today).length;
    const dueToday = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp === today).length;
    const trash = user.role === 'admin'
      ? records.filter(r => r.deleted).length
      : records.filter(r => r.deleted && (r.deletedBy === user.id || r.ownerId === user.id)).length;
    // 工单收件箱（本地缓存计数，准确数字在 ReportModule 内）
    const tickets = STORE.get('tickets_local', []);
    const ticketInbox = tickets.filter(t => (t.target_id === user.id) && (t.status === 'pending' || t.status === 'accepted')).length;
    return { overdue, dueToday, trashCount: trash, ticketInbox };
  }, [records, user, today]);

  // 标题栏徽章: (N) 统一工作台
  useEffect(() => {
    const n = stats.overdue + stats.dueToday;
    document.title = (n > 0 ? `(${n}) ` : '') + '统一工作台';
  }, [stats.overdue, stats.dueToday]);

  // 桌面通知 - 定时检查
  useEffect(() => {
    if (!user) return;
    if (notifPerm !== 'granted') return;

    // 会话内已通知 ID（sessionStorage 保证刷新后重发）
    const notifiedKey = 'workspace_notified_ids';
    const getNotified = () => {
      try { return new Set(JSON.parse(sessionStorage.getItem(notifiedKey) || '[]')); }
      catch(e) { return new Set(); }
    };
    const saveNotified = (set) => {
      try { sessionStorage.setItem(notifiedKey, JSON.stringify([...set])); } catch(e) {}
    };

    const check = () => {
      const today = todayISO();
      const notified = getNotified();
      const live = records.filter(r => !r.deleted);
      const mine = user.role === 'admin' ? live : live.filter(r => r.ownerId === user.id);

      // 逾期
      const overdue = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today && !notified.has('over_' + r.id));
      // 今日到期
      const dueToday = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp === today && !notified.has('today_' + r.id));

      if (overdue.length > 0) {
        const r = overdue[0];
        const more = overdue.length > 1 ? `（另有 ${overdue.length - 1} 单未跟进）` : '';
        sendDesktopNotification(
          `⏰ 跟进已逾期：${r.customer || '未填客户'}`,
          `事项：${r.category || '—'}｜原定 ${r.nextFollowUp} 跟进${more}`,
          'overdue_' + r.id
        );
        overdue.forEach(o => notified.add('over_' + o.id));
      } else if (dueToday.length > 0) {
        const r = dueToday[0];
        const more = dueToday.length > 1 ? `（今日另有 ${dueToday.length - 1} 单）` : '';
        sendDesktopNotification(
          `📌 今日跟进提醒：${r.customer || '未填客户'}`,
          `事项：${r.category || '—'}｜请尽早跟进${more}`,
          'today_' + r.id
        );
        dueToday.forEach(o => notified.add('today_' + o.id));
      }
      saveNotified(notified);
    };

    // 启动后 3 秒检查一次（避免登录瞬间打扰），之后每 5 分钟检查
    const t1 = setTimeout(check, 3000);
    const t2 = setInterval(check, 5 * 60 * 1000);
    return () => { clearTimeout(t1); clearInterval(t2); };
  }, [user, records, notifPerm]);

  if (!user) {
    return <LoginScreen employees={employees} onLogin={onLogin} />;
  }

  return (
    <div className="min-h-screen">
      <TopNav user={user} activeTab={activeTab} setActiveTab={setActiveTab} onLogout={onLogout} stats={stats} notifPerm={notifPerm} requestNotifPerm={requestNotifPerm} cloudOn={cloudOn} />
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {activeTab === 'cs' && (
          <CSModule user={user} employees={employees} records={records} setRecords={setRecords} toast={toast} />
        )}
        {activeTab === 'finance' && (
          <FinanceModule user={user} toast={toast} />
        )}
        {activeTab === 'quote' && (
          <QuoteModule user={user} employees={employees} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'kb' && (
          <KbModule user={user} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'report' && (
          <ReportModule user={user} employees={employees} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'dashboard' && (
          <DashboardModule user={user} employees={employees} records={records} />
        )}
        {activeTab === 'trash' && (
          <TrashModule user={user} employees={employees} records={records} setRecords={setRecords} toast={toast} />
        )}
        {activeTab === 'admin' && user.role === 'admin' && (
          <AdminModule user={user} employees={employees} setEmployees={setEmployees} toast={toast} cloudCfg={cloudCfg} setCloudCfg={setCloudCfg} onCloudApply={() => setCloudVersion(v=>v+1)} />
        )}
      </div>
      <footer style={{textAlign:'center', padding:'40px 20px', color:'var(--ink-4)', fontSize:12, fontWeight:400}}>
        统一工作台 · v2.1 · {cloudOn ? '☁ Supabase 云端协同' : '💾 本地模式'}
      </footer>
      {toastNode}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
