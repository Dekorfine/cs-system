  <!-- 🆕 fix112: Supabase 存储垫片 — 把打分器的 window.storage 接到 cs CLOUD(团队共享/永久),工具本体不改 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  (function(){
    try {
      var SB_URL='https://kwrajryhwyytkjkkidor.supabase.co';
      var SB_KEY='sb_publishable_6j-rSrv1V95FROe-iX6Yew_unE_Y6n9';
      var TABLE='kpi_kv';
      var _c = (window.supabase && window.supabase.createClient) ? window.supabase.createClient(SB_URL, SB_KEY) : null;
      if(!_c) console.warn('[KPI] Supabase 未就绪,改用本地 localStorage(数据不共享)');
      window.storage = {
        get: async function(key){
          if(!_c){ var v=localStorage.getItem('kpi_'+key); return v!=null?{key:key,value:v}:null; }
          try { var r=await _c.from(TABLE).select('v').eq('k',key).maybeSingle(); if(r.error||!r.data) return null; return {key:key,value:r.data.v}; } catch(e){ return null; }
        },
        set: async function(key,value){
          var s = typeof value==='string' ? value : JSON.stringify(value);
          if(!_c){ try{localStorage.setItem('kpi_'+key,s);}catch(e){} return {key:key,value:value}; }
          try { var r=await _c.from(TABLE).upsert({k:key,v:s,updated_at:new Date().toISOString()},{onConflict:'k'}); if(r.error) throw r.error; return {key:key,value:value}; } catch(e){ console.warn('[KPI] set 失败',e); return null; }
        },
        delete: async function(key){
          if(!_c){ localStorage.removeItem('kpi_'+key); return {key:key,deleted:true}; }
          try { await _c.from(TABLE).delete().eq('k',key); return {key:key,deleted:true}; } catch(e){ return null; }
        },
        list: async function(prefix){
          if(!_c){ var ks=[]; for(var i=0;i<localStorage.length;i++){var kk=localStorage.key(i); if(kk&&kk.indexOf('kpi_')===0){var real=kk.slice(4); if(!prefix||real.indexOf(prefix)===0)ks.push(real);}} return {keys:ks}; }
          try { var q=_c.from(TABLE).select('k'); if(prefix) q=q.like('k', String(prefix).replace(/[%_]/g,'\\$&')+'%'); var r=await q.limit(3000); if(r.error) return {keys:[]}; return {keys:(r.data||[]).map(function(x){return x.k;})}; } catch(e){ return {keys:[]}; }
        },
      };
    } catch(e){ console.error('[KPI] 存储垫片初始化失败', e); }
  })();
  </script>

        .num-input {
          width: 100%;
          padding: 8px 10px;
          border: 1px solid #d6d3d1;
          border-radius: 6px;

          text-align: center;
          background: white;
          color: #1c1917;
          transition: all 0.15s;
        }
        .num-input:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,0.1); }
        .num-input:hover:not(:focus) { border-color: #a8a29e; }

        /* \u52A0\u51CF\u5206\u6B65\u8FDB\u5668 */
        .stepper {
          display: inline-flex;
          align-items: stretch;
          width: 100%;
          height: 36px;
          border: 1px solid #d6d3d1;
          border-radius: 7px;
          overflow: hidden;
          background: white;
          transition: all 0.15s;
        }
        .stepper:focus-within { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,0.08); }
        .stepper-accent { background: #fffbeb; border-color: #fde68a; }
        .stepper-accent:focus-within { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
        .stepper-neg { background: #fef2f2; border-color: #fecaca; }
        .stepper-neg .stepper-input { color: #dc2626; }
        .stepper-neg.stepper-accent { background: #fef2f2; border-color: #fecaca; }

        .stepper-btn {
          min-width: 36px;
          padding: 0 4px;
          flex-shrink: 0;
          border: none;
          background: #fafaf9;
          color: #0f172a;
          font-size: 15px;
          font-weight: 700;
          cursor: pointer;
          font-family: 'JetBrains Mono', monospace;
          line-height: 1;
          transition: all 0.1s;
          user-select: none;
          white-space: nowrap;
        }
        .stepper-btn:hover:not(:disabled) { background: #e7e5e4; }
        .stepper-btn:active:not(:disabled) { background: #d6d3d1; transform: scale(0.95); }
        .stepper-btn:disabled { color: #d6d3d1; cursor: not-allowed; background: #fafaf9; }
        .stepper-minus { border-right: 1px solid #e7e5e4; color: #dc2626; }
        .stepper-plus { border-left: 1px solid #e7e5e4; color: #059669; }
        .stepper-accent .stepper-btn { background: #fef3c7; }
        .stepper-accent .stepper-btn:hover:not(:disabled) { background: #fde68a; }
        .stepper-accent .stepper-minus { border-right: 1px solid #fde68a; }
        .stepper-accent .stepper-plus { border-left: 1px solid #fde68a; }

        .stepper-input {
          flex: 1;
          min-width: 0;
          width: 100%;
          border: none;
          outline: none;
          text-align: center;
          background: transparent;
          font-family: 'JetBrains Mono', monospace;
          font-size: 14px;
          font-weight: 600;
          color: #0f172a;
          padding: 0 4px;
          -moz-appearance: textfield;
        }
        .stepper-input::-webkit-outer-spin-button,
        .stepper-input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }

        /* \u6B21\u6570\u6B65\u8FDB\u5668(\u7528\u5728\u89C4\u5219\u7EC6\u5219\u4E0A) */
        .count-stepper {
          display: inline-flex;
          align-items: center;
          gap: 0;
          background: white;
          border: 1px solid #d6d3d1;
          border-radius: 7px;
          overflow: hidden;
          height: 32px;
          flex-shrink: 0;
        }
        .cs-btn {
          width: 30px;
          height: 30px;
          border: none;
          background: white;
          font-size: 17px;
          font-weight: 700;
          cursor: pointer;
          font-family: inherit;
          line-height: 1;
          padding: 0;
          transition: all 0.1s;
          user-select: none;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .cs-btn:hover:not(:disabled) { background: #f5f5f4; }
        .cs-btn:active:not(:disabled) { background: #e7e5e4; transform: scale(0.93); }
        .cs-btn:disabled { color: #d6d3d1; cursor: not-allowed; }
        .cs-minus { color: #dc2626; border-right: 1px solid #e7e5e4; }
        .cs-plus { color: #059669; border-left: 1px solid #e7e5e4; }
        .cs-value {
          min-width: 32px;
          text-align: center;
          font-family: 'JetBrains Mono', monospace;
          font-weight: 700;
          font-size: 14px;
          color: #0f172a;
          padding: 0 4px;
        }

        /* \u89C4\u5219\u9879\u76EE\u5361\u7247 */
        .rule-item-card {
          padding: 18px 22px;
          border-bottom: 1px solid #f5f5f4;
        }
        .rule-item-card:last-child { border-bottom: none; }
        .rule-item-header {
          display: flex;
          gap: 16px;
          align-items: flex-start;
          margin-bottom: 12px;
        }
        .rule-item-title {
          font-size: 15px;
          font-weight: 600;
          color: #0f172a;
          margin-bottom: 3px;
        }
        .rule-item-desc {
          font-size: 12px;
          color: #78716c;
          line-height: 1.5;
        }
        .rule-item-score {
          flex-shrink: 0;
          text-align: right;
          padding: 6px 12px;
          background: #fafaf9;
          border-radius: 8px;
          border: 1px solid #e7e5e4;
          font-family: 'JetBrains Mono', monospace;
          min-width: 110px;
        }
        .rule-score-base { font-size: 10.5px; color: #78716c; letter-spacing: 0.05em; }
        .rule-score-delta { font-size: 13px; font-weight: 600; margin: 1px 0; }
        .rule-score-total { font-size: 18px; font-weight: 700; }

        .rule-list {
          display: flex;
          flex-direction: column;
          gap: 4px;
          margin-bottom: 14px;
        }
        .rule-row {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 8px 12px;
          border-radius: 8px;
          background: #fafaf9;
          border: 1px solid transparent;
          transition: all 0.15s;
        }
        .rule-row:hover { background: #f5f5f4; }
        .rule-row-active { background: white; border-color: #fde68a; box-shadow: 0 1px 3px rgba(245,158,11,0.08); }

        .rule-label {
          flex: 1;
          display: flex;
          align-items: center;
          gap: 10px;
          font-size: 13.5px;
          color: #1c1917;
          min-width: 0;
        }
        .rule-pill {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          min-width: 38px;
          height: 22px;
          padding: 0 6px;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-weight: 700;
          font-size: 11.5px;
          flex-shrink: 0;
        }
        .rule-pill-neg { background: #fee2e2; color: #991b1b; }
        .rule-pill-pos { background: #d1fae5; color: #065f46; }

        .rule-subtotal {
          font-family: 'JetBrains Mono', monospace;
          font-weight: 700;
          font-size: 13.5px;
          min-width: 56px;
          text-align: right;
          flex-shrink: 0;
        }

        .rule-reason {
          background: #fafaf9;
          border-radius: 8px;
          padding: 10px 12px;
          margin-top: 8px;
        }
        .rule-reason-label {
          font-size: 10.5px;
          font-weight: 600;
          color: #78716c;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          margin-bottom: 6px;
        }

        @media (max-width: 700px) {

          .rule-item-score { width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center; }
          .rule-row { flex-wrap: wrap; }

        .reason-input {
          width: 100%;
          padding: 8px 10px;
          border: 1px solid #d6d3d1;
          border-radius: 6px;
          font-family: inherit;
          font-size: 12.5px;
          background: #fefefe;
          color: #1c1917;
          line-height: 1.5;
          resize: vertical;

        }
        .reason-input:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,0.1); background: white; }
        .reason-input:hover:not(:focus) { border-color: #a8a29e; }
        .reason-input::placeholder { color: #a8a29e; font-size: 12px; }

        .image-thumb {
          position: relative;
          width: 48px;
          height: 48px;
          border-radius: 6px;
          overflow: hidden;
          border: 1px solid #d6d3d1;
          cursor: zoom-in;
          flex-shrink: 0;
          background: #fafaf9;
          transition: all 0.15s;
        }
        .image-thumb:hover { border-color: #0f172a; transform: scale(1.05); }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .image-thumb-remove {
          position: absolute;
          top: 2px;
          right: 2px;
          width: 16px;
          height: 16px;

          padding: 0;

          justify-content: center;
          font-size: 13px;
          line-height: 1;
          font-family: inherit;

        .image-thumb-remove:hover { background: #dc2626; }

        .image-upload-btn {
          display: inline-flex;
          align-items: center;
          gap: 4px;
          padding: 6px 10px;
          border: 1px dashed #a8a29e;
          border-radius: 6px;
          font-size: 11.5px;
          color: #57534e;
          cursor: pointer;
          background: white;
          transition: all 0.15s;
          height: 28px;

        }
        .image-upload-btn:hover {
          border-color: #0f172a;
          color: #0f172a;
          background: #f5f5f4;
        }

        .card {

          font-size: 11px;

          transition: background 0.1s;
