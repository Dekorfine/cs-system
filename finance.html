const getPostalRule = (country) => POSTAL_CODE_RULES[country] || { len: 12, pattern: null, ph: '邮编' };
const validatePostalCode = (country, value) => {
  const rule = getPostalRule(country);
  if (rule.len === 0) return { valid: true, isEmpty: true };  // 无邮编国家
  if (!value) return { valid: false, isEmpty: true };
  if (rule.pattern) return { valid: rule.pattern.test(value), isEmpty: false };
  return { valid: true, isEmpty: false };
};

// dims = 产品尺寸 (用于体积重), surchargeBuffer = 加在尺寸上用于附加费判定
// ============================================================
const calcBoxByCarrier = (carrierId, dims, weight, isCrate, region, isMulti, surchargeBuffer = 0) => {
  // 实际包装尺寸 = 产品尺寸 + 缓冲 (体积重和附加费都用这个尺寸)
  const effDims = surchargeBuffer > 0 ? [dims[0]+surchargeBuffer, dims[1]+surchargeBuffer, dims[2]+surchargeBuffer] : [...dims];
  const vol = (effDims[0] * effDims[1] * effDims[2]) / 6000;
  let bw = Math.max(vol, weight);
  const sides = [...effDims].sort((a,b) => b-a);
  const girth = sides[0] + 2*(sides[1]+sides[2]);

  if (carrierId === 'ch') bw = Math.max(bw, 12);
  else if (carrierId === 'my') bw = Math.max(bw, 12);
  else if (carrierId === 'zs') bw = Math.max(bw, 4);
  else bw = Math.max(bw, 5);
  bw = Math.ceil(bw);

  let baseCost = 0, formula = '';
  if (carrierId === 'ch') {
    const r = { east:{b:165,e:17,m:21,h:18}, mid:{b:145,e:15,m:20,h:17}, west:{b:135,e:14,m:19,h:16} }[region];
    if (bw >= 101) baseCost = bw * r.h;
    else if (bw >= 12) baseCost = bw * r.m;
    else baseCost = r.b + (bw - 5) * r.e;
    formula = bw >= 101 ? `${bw}kg × ¥${r.h}` : bw >= 12 ? `${bw}kg × ¥${r.m}` : `¥${r.b}+(${bw}-5)×¥${r.e}`;
  } else if (carrierId === 'ch_small') {
    const r = { east:{b:165,e:17}, mid:{b:145,e:15}, west:{b:135,e:14} }[region];
    baseCost = r.b + (bw - 5) * r.e;
    formula = `¥${r.b}+(${bw}-5)×¥${r.e}`;
  } else if (carrierId === 'my') {
    if (bw >= 101) { const rate = { east:16, mid:15, west:14 }[region]; baseCost = bw*rate; formula = `${bw}kg × ¥${rate}`; }
    else if (bw >= 12) { const rate = { east:20, mid:19, west:14 }[region]; baseCost = bw*rate; formula = `${bw}kg × ¥${rate}`; }
    else { const c = { east:{base:160,extra:17}, mid:{base:150,extra:16}, west:{base:140,extra:15} }[region]; baseCost = (bw-5)*c.extra+c.base; formula = `¥${c.base}+(${bw}-5)×¥${c.extra}`; }
  } else if (carrierId === 'my_small') {
    const c = { east:{base:160,extra:17}, mid:{base:150,extra:16}, west:{base:140,extra:15} }[region];
    baseCost = (bw-5)*c.extra+c.base;
    formula = `¥${c.base}+(${bw}-5)×¥${c.extra}`;
  } else if (carrierId === 'zs') {
    if (bw <= 10) {
      const steps = { east:{4:155,5:160,6:166,7:172,8:178,9:184,10:190}, mid:{4:135,5:142,6:150,7:158,8:166,9:174,10:180}, west:{4:126,5:131,6:140,7:149,8:158,9:167,10:175} }[region];
      baseCost = steps[Math.max(bw, 4)] || steps[10];
      formula = `阶梯价 ${bw}kg`;
    } else {
      const rate = { east: bw>=96?18:19, mid: bw>=96?17:18, west: bw>=96?16.5:17.5 }[region];
      baseCost = bw * rate;
      formula = `${bw}kg × ¥${rate}`;
    }
  }

  const surList = [];
  const addSur = (n, c) => { surList.push({ name: n, cost: c }); };

  if (carrierId === 'ch' || carrierId === 'ch_small') {
    if (isCrate) addSur('木箱费', 10);
    if (weight > 22.5) addSur('重量附加费', weight >= 40 ? 400 : 100);
    if (sides[0] > 120) addSur('超长附加费', sides[0] >= 240 ? 910 : 100);
    if (sides[1] >= 75) addSur('二边超限费', 100);
    if (girth > 265) addSur('围长附加费', girth > 320 ? 600 : 120);
  } else if (carrierId === 'my' || carrierId === 'my_small') {
    if (sides[0] > 120 && sides[0] < 200) addSur('长边120-200', 100);
    else if (sides[0] >= 200) addSur('长边≥200', 200);
    if (sides[1] > 75) addSur('二边>75', 100);
    if (weight >= 22) addSur('实重≥22', 100);
    if (girth > 266 && girth < 320) addSur('围长266-320', 100);
    else if (girth >= 320) addSur('围长≥320', 600);
  } else if (carrierId === 'zs') {
    const dimSurs = [];
    if (sides[0] >= 120) dimSurs.push(80);
    if (sides[1] >= 76) dimSurs.push(80);
    if (girth >= 263 && girth < 326) dimSurs.push(80);
    if (sides[0] >= 240 || girth >= 326) dimSurs.push(500);
    if (dimSurs.length > 0) addSur('尺寸类最高项', Math.max(...dimSurs));
    if (weight >= 40) addSur('实重附加费', 500);
    else if (weight >= 21) addSur('实重附加费', 80);
  }

  const surTotal = surList.reduce((s, x) => s + x.cost, 0);
  return { carrierId, name: US_CARRIERS[carrierId].name, freight: baseCost, billWeight: bw, formula, surcharges: surList, surTotal, totalCost: baseCost + surTotal };
};

// 加拿大 - 信源
const calcCarrierCAXY = (boxes, opts) => {

// 澳洲海派
const calcCarrierAU = (boxes, opts) => {
  const zip = opts.zip || '';
  let totalBW = 0;
  let sumOW = 0, sumOS = 0, countOW = 0, countOS = 0, maxOWMin = 0, maxOSMin = 0;
  boxes.forEach(box => {
    for (let i = 0; i < box.qty; i++) {
      const sBuf = box.surchargeBuffer || 0;
      const effDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
      const sides = [...effDims].sort((a,b) => b-a);
      const L = sides[0], W = sides[1];
      let bw = Math.max(effDims[0]*effDims[1]*effDims[2]/6000, box.weight);
      if (bw < 10) bw = 10;
      totalBW += bw;
      if (bw >= 80 && bw < 800) { sumOW += 300; maxOWMin = Math.max(maxOWMin, 300); countOW++; }
      else if (bw >= 50) { sumOW += 150; maxOWMin = Math.max(maxOWMin, 300); countOW++; }
      else if (bw >= 30) { sumOW += 50; maxOWMin = Math.max(maxOWMin, 300); countOW++; }
      if (L >= 300 && L <= 369) {
        if (W <= 39) { sumOS += 300; maxOSMin = Math.max(maxOSMin, 600); countOS++; }
        else if (W <= 119) { sumOS += 500; maxOSMin = Math.max(maxOSMin, 1000); countOS++; }
        else if (W <= 199) { sumOS += 800; maxOSMin = Math.max(maxOSMin, 1600); countOS++; }
      } else if (L >= 220 && L <= 299) {
        if (W <= 39) { sumOS += 250; maxOSMin = Math.max(maxOSMin, 500); countOS++; }
        else if (W <= 119) { sumOS += 300; maxOSMin = Math.max(maxOSMin, 600); countOS++; }
        else if (W <= 199) { sumOS += 600; maxOSMin = Math.max(maxOSMin, 1200); countOS++; }
      } else if (L >= 180 && L <= 219) {
        if (W <= 39) { sumOS += 100; maxOSMin = Math.max(maxOSMin, 300); countOS++; }
        else if (W <= 119) { sumOS += 200; maxOSMin = Math.max(maxOSMin, 500); countOS++; }
        else if (W <= 179) { sumOS += 500; maxOSMin = Math.max(maxOSMin, 1000); countOS++; }
      } else if (L >= 120 && L <= 179) {
        if (W <= 39) { sumOS += 50; maxOSMin = Math.max(maxOSMin, 400); countOS++; }
        else if (W <= 119) { sumOS += 150; maxOSMin = Math.max(maxOSMin, 500); countOS++; }
        else if (W <= 179) { sumOS += 300; maxOSMin = Math.max(maxOSMin, 600); countOS++; }
      }
    }
  });
  totalBW = Math.ceil(totalBW);
  const surList = [];
  if (countOW > 0) surList.push({ name: `超重费 (${countOW}件)`, cost: Math.max(sumOW, maxOWMin) });
  if (countOS > 0) surList.push({ name: `超长费 (${countOS}件)`, cost: Math.max(sumOS, maxOSMin) });
  surList.push({ name: '专线附加费 (1元/kg)', cost: totalBW * 1 });
  let zone = 'other';
  const nz = parseInt(zip);
  if (!isNaN(nz)) {
    if (nz >= 1000 && nz <= 3999) zone = 'z1';
    else if (nz >= 4000 && nz <= 5999) zone = 'z2';
    else if (nz >= 6000 && nz <= 6999) zone = 'z3';
  }
  const rates = {
    z1: { first5:100, add1:13, over10:14, over21:13, over50:13, over100:12 },
    z2: { first5:105, add1:15, over10:16, over21:15, over50:15, over100:14 },
    z3: { first5:105, add1:19, over10:20, over21:19, over50:18, over100:17 },
    other: { first5:110, add1:24, over10:24, over21:23, over50:22, over100:22 }
  };
  const r = rates[zone];
  let freight, formula;
  if (totalBW >= 100) { freight = totalBW * r.over100; formula = `${totalBW}kg × ¥${r.over100}`; }
  else if (totalBW >= 50) { freight = totalBW * r.over50; formula = `${totalBW}kg × ¥${r.over50}`; }
  else if (totalBW >= 21) { freight = totalBW * r.over21; formula = `${totalBW}kg × ¥${r.over21}`; }
  else if (totalBW >= 10) { freight = totalBW * r.over10; formula = `${totalBW}kg × ¥${r.over10}`; }
  else { freight = r.first5 + (totalBW - 5) * r.add1; formula = `¥${r.first5}+(${totalBW}-5)×¥${r.add1}`; }
  const surTotal = surList.reduce((s, x) => s + x.cost, 0);
  return { carrierId: 'au_seaair', name: '澳洲海派', valid: true, totalCost: freight + surTotal, billWeight: totalBW, surcharges: surList, surTotal, formula, freight };
};

// 中东 (UAE/SA, 海/空)
const _calcME = (boxes, opts, def) => {
  let totalCBM = 0, totalBW = 0, pieceCount = 0;
  boxes.forEach(box => {
    const sBuf = box.surchargeBuffer || 0;
    const effDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
    for (let i = 0; i < box.qty; i++) {
      totalCBM += (effDims[0]*effDims[1]*effDims[2])/1000000;
      let bw = Math.max(effDims[0]*effDims[1]*effDims[2]/6000, box.weight);
      if (bw < 10) bw = 10;
      totalBW += bw;
      pieceCount++;
    }
  });
  totalBW = Math.ceil(totalBW);
  let billedCBM = totalCBM;
  if (billedCBM < 1 && pieceCount > 0) billedCBM = 1;
  let freight, formula;
  if (def.isAir) {
    freight = totalBW * def.ratePerKg;
    formula = `${totalBW}kg × ¥${def.ratePerKg}`;
  } else {
    const byWeight = totalBW * def.ratePerKg;
    const byCBM = billedCBM * def.cbmRate;
    const cheaper = byWeight <= byCBM;
    freight = cheaper ? byWeight : byCBM;
    formula = cheaper ? `${totalBW}kg × ¥${def.ratePerKg}` : `${billedCBM.toFixed(2)}方 × ¥${def.cbmRate}`;
  }
  const anyCrate = boxes.some(b => b.isCrate);
  const deliveryFee = anyCrate ? billedCBM * def.deliveryCrateRate : pieceCount * def.deliveryCartonPerPiece;
  const surList = [{ name: '派送费', cost: parseFloat(deliveryFee.toFixed(1)) }];
  return { carrierId: def.id, name: def.name, valid: true, totalCost: freight + deliveryFee, billWeight: totalBW, surcharges: surList, surTotal: deliveryFee, formula, freight };
};

// 国际航空包裹 (7折)
const calcCarrierCNAir = (boxes, opts) => {
  const targetCN = opts.targetCN || 'X';
  const rate = INTL_AIR_RATES[targetCN];
  const discount = 0.7;
  if (!rate) return { carrierId:'cn_air', name:`国际航空包裹·${targetCN}`, valid:false, invalidReason:`不通达 ${targetCN}`, totalCost:Infinity, billWeight:0, surcharges:[], surTotal:0, formula:'', freight:0 };
  let totalCost = 0, totalBW = 0, anyOverWeight = false, anyOverSize = false;
  const sizeLimits = {1:{side:200,perimSum:300}, 2:{side:150,perimSum:300}, 3:{side:105,perimSum:200}};
  const lim = sizeLimits[rate.c] || sizeLimits[3];
  boxes.forEach(box => {
    const sBuf = box.surchargeBuffer || 0;
    const effDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
    const sides = [...effDims].sort((a,b) => b-a);
    const perimSum = sides[0] + 2*(sides[1]+sides[2]);
    let aw = Math.max((effDims[0]*effDims[1]*effDims[2])/6000, box.weight || 0);
    if (aw > rate.m) anyOverWeight = true;
    if (sides[0] > lim.side || perimSum > lim.perimSum) anyOverSize = true;
    let perPiece;
    if (aw <= 1) perPiece = rate.s;
    else perPiece = rate.s + Math.ceil(aw - 1) * rate.p;
    perPiece *= discount;
    totalBW += aw * box.qty;
    totalCost += perPiece * box.qty;
  });
  return {
    carrierId: 'cn_air', name: `国际航空包裹·${targetCN}`,
    valid: !(anyOverWeight || anyOverSize),
    invalidReason: anyOverWeight ? `超${rate.m}kg限重` : (anyOverSize ? `超第${rate.c}类尺寸` : null),
    totalCost, billWeight: Math.ceil(totalBW), surcharges: [], surTotal: 0,
    formula: `起重¥${rate.s} + 续重¥${rate.p}/kg × 7折`, freight: totalCost
  };
};

  boxes.forEach(box => {
    const sBuf = box.surchargeBuffer || 0;
    const effDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
    const maxSide = Math.max(...effDims);
    const useVol = maxSide > 60;
    if (useVol) anyOver60 = true;
    let w = useVol
      ? Math.max((effDims[0]*effDims[1]*effDims[2])/6000, box.weight || 0)
      : (box.weight || (effDims[0]*effDims[1]*effDims[2])/6000);
    const wg = w * 1000;
    let perPiece = wg <= 500 ? z.start : z.start + Math.ceil((wg - 500) / 500) * z.perHalf;
    perPiece *= discount;
    totalBW += w * box.qty;
    totalCost += perPiece * box.qty;
  });
  return {
    carrierId: 'cn_ems', name: `EMS·${targetCN}·${z.name}`,
    valid: true, totalCost, billWeight: Math.ceil(totalBW),
    surcharges: [], surTotal: 0,
    formula: `${z.name} · 起重¥${z.start} + 续重¥${z.perHalf}/500g × 6折${anyOver60 ? ' (记抛)' : ''}`,
    freight: totalCost
  };
};

// 云鼎卡车 (美国专属)
const calcYunding = (boxes, opts) => {
  let totalVol = 0, totalActual = 0, maxSide = 0;
  let twoSidesOver200 = false;
  boxes.forEach(box => {
    const sBuf = box.surchargeBuffer || 0;
    const effDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
    totalVol += (effDims[0] * effDims[1] * effDims[2] * box.qty) / 6000;
    totalActual += (box.weight || 0) * box.qty;
    maxSide = Math.max(maxSide, ...effDims);
    if (effDims.filter(d => d >= 200).length >= 2) twoSidesOver200 = true;
  });
  // 云鼎 101kg 起收 (不足101kg按101kg计费)
  let billWeight = Math.max(totalVol, totalActual);
  if (billWeight < 101) billWeight = 101;
  const baseRate = 20;
  const freight = billWeight * baseRate;
  const delivery = 500;
  let surcharge = 0, tier = null;
  let invalid = false, reason = null;
  if (maxSide >= 600) { invalid = true; reason = `最长边${maxSide.toFixed(0)}cm≥600`; }
  else if (twoSidesOver200) { invalid = true; reason = '任两边≥200'; }
  else if (maxSide >= 500) { surcharge = Math.max(billWeight * 5, 10500); tier = '≥500cm'; }
  else if (maxSide >= 400) { surcharge = Math.max(billWeight * 4, 4100); tier = '≥400cm'; }
  else if (maxSide >= 300) { surcharge = Math.max(billWeight * 3, 2000); tier = '≥300cm'; }
  else if (maxSide >= 250 && billWeight > 301) { surcharge = billWeight * 1; tier = '≥250cm'; }
  else if (maxSide >= 250) { invalid = true; reason = '≥250cm 但 ≤301kg 需单询'; }
  const surList = [{ name: '派送费', cost: delivery }];
  if (surcharge > 0) surList.push({ name: `超长${tier}`, cost: Math.round(surcharge) });
  return {
    carrierId: 'yunding', name: '云鼎卡车',
    valid: !invalid, invalidReason: reason,
    totalCost: invalid ? Infinity : freight + delivery + surcharge,
    billWeight: Math.ceil(billWeight),
    surcharges: surList, surTotal: delivery + surcharge,
    formula: `${Math.ceil(billWeight)}kg × ¥${baseRate}`,
    freight
  };
};

// === 推演运费 (用于售价公式) ===
// 与原版 V1 calcCH + deducedShippingInfo 等价
// 规则:
//   bw ≤ 5kg     → ¥200 固定 (起步价)
//   5 < bw ≤ 12  → ¥276 固定
//   bw > 12      → bw × ¥23/kg
//   + 昌晖加班船所有附加费 (木箱+重量+超长+二边+围长)
// 围长 > 410cm  → 改用云鼎: bw × ¥20/kg + ¥500派送 + 云鼎超长附加费
const calcDeducedShipping = (boxes) => {
  let pieces = [];
  let surTotal = 0;
  let maxGirth = 0;
  let maxSide = 0;

  boxes.forEach(box => {
    for (let i = 0; i < box.qty; i++) {
      const sBuf = box.surchargeBuffer || 0;
      const effDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
      const sides = [...effDims].sort((a,b) => b-a);
      const girth = sides[0] + 2*(sides[1]+sides[2]);
      maxGirth = Math.max(maxGirth, girth);
      maxSide = Math.max(maxSide, ...effDims);

      const v = (effDims[0]*effDims[1]*effDims[2]) / 6000;
      const a = box.weight || 0;
      pieces.push({ v, a });

      // 昌晖加班船的所有附加费 (per piece)
      if (box.isCrate) surTotal += 10;
      if (a > 22.5) surTotal += a >= 40 ? 400 : 100;
      if (sides[0] > 120) surTotal += sides[0] >= 240 ? 910 : 100;
      if (sides[1] >= 75) surTotal += 100;
      if (girth > 265) surTotal += girth > 320 ? 600 : 120;
    }
  });

  if (pieces.length === 0) return null;
  const isMulti = pieces.length > 1;

  // 计算昌晖的 bw (多件时每件最低12kg)
  let bw;
  if (isMulti) {
    let t = 0;
    pieces.forEach(p => { let pb = Math.max(p.v, p.a); if (pb < 12) pb = 12; t += pb; });
    bw = Math.ceil(t);
  } else {
    bw = Math.ceil(Math.max(pieces[0].v, pieces[0].a));
  }
  if (bw < 12) bw = 12;

  // 围长 > 410 → 云鼎兜底
  if (maxGirth > 410) {
    const totalV = pieces.reduce((s, p) => s + p.v, 0);
    const totalA = pieces.reduce((s, p) => s + p.a, 0);
    const ydW = Math.max(101, Math.ceil(Math.max(totalV, totalA)));
    let sideSur = 0;
    if (maxSide >= 500) sideSur = 10500;
    else if (maxSide >= 400) sideSur = 4100;
    else if (maxSide >= 300) sideSur = 2000;
    return {
      total: ydW * 20 + 500 + sideSur,
      type: '云鼎兜底 (围长>410)',
      bw: ydW,
      base: ydW * 20,
      surcharge: 500 + sideSur,
      formula: `${ydW}kg × ¥20 + ¥500派送${sideSur > 0 ? ` + ¥${sideSur}超长` : ''}`,
      maxGirth
    };
  }

  // 昌晖阶梯
  let base, rateText;
  if (bw <= 5) { base = 200; rateText = `¥200 起步价 (≤5kg)`; }
  else if (bw <= 12) { base = 276; rateText = `¥276 (5-12kg)`; }
  else { base = bw * 23; rateText = `${bw}kg × ¥23/kg`; }

  return {
    total: base + surTotal,
    type: '昌晖加班船 (推演)',
    bw,
    base,
    surcharge: surTotal,
    formula: rateText + (surTotal > 0 ? ` + ¥${surTotal}附加费` : ''),
    maxGirth
  };
};

// 评估所有承运商 (按目的国分派)
const evaluateAll = (boxes, country, opts) => {
  const totalQty = boxes.reduce((s, b) => s + b.qty, 0);
  const isMulti = totalQty > 1;
  const region = opts.region || 'east';
  let results = [];
  if (country === 'US') {
    const ids = isMulti ? ['ch', 'my', 'zs'] : ['ch', 'ch_small', 'my', 'my_small', 'zs'];
    results = ids.map(id => {
      let total = 0, billW = 0;
      boxes.forEach(box => {
        const r = calcBoxByCarrier(id, box.dims, box.weight, !!box.isCrate, region, isMulti, box.surchargeBuffer || 0);
        total += r.totalCost * box.qty;
        billW += r.billWeight * box.qty;
      });
      return { carrierId: id, name: US_CARRIERS[id].name, valid: true, totalCost: total, billWeight: Math.ceil(billW) };
    });
    results.push(calcYunding(boxes, opts));
  } else if (country === 'CA') {
    results = [calcCarrierCAXY(boxes, opts), calcCarrierCAHC(boxes, opts), calcCarrierCAZS(boxes, opts)];
  } else if (country === 'AU') {
    results = [calcCarrierAU(boxes, opts)];
  } else if (country === 'ME') {
    results = [calcCarrierUAE(boxes, opts), calcCarrierSA(boxes, opts), calcCarrierUAEAir(boxes, opts), calcCarrierSAAir(boxes, opts)];
  }
  // 所有国家 + 中国邮政
  const targetCN = opts.targetCN || COUNTRY_CN_MAP[country];
  if (targetCN) {
    results.push(calcCarrierCNAir(boxes, { ...opts, targetCN }));
    results.push(calcCarrierCNEMS(boxes, { ...opts, targetCN }));
  }
  return results;
};

const usZipToRegion = (zip) => {
  const p = (zip || '').trim()[0];
  if (['0','1','2','3','4'].includes(p)) return 'east';
  if (['5','6','7'].includes(p)) return 'mid';
  if (['8','9'].includes(p)) return 'west';
  return 'east';
};

const CopyButton = ({ text, label = '复制' }) => {
  const [copied, setCopied] = useState(false);
  const onCopy = () => {
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };
  return (
    <button className="btn-sec inline-flex items-center gap-1.5" onClick={onCopy}>
      {copied ? <><Icon name="check" className="w-3 h-3" />已复制</> : <><Icon name="copy" className="w-3 h-3" />{label}</>}
    </button>
  );
};

// ============================================================
// 主 App
// ============================================================
const App = () => {
  // 订单信息
  const [orderNumber, setOrderNumber] = useState('');
  const [sku, setSku] = useState('');
  const [targetCN, setTargetCN] = useState('美国');
  const [usZip, setUsZip] = useState('');
  const [regionMode, setRegionMode] = useState('auto'); // auto/east/mid/west
  const [auZip, setAuZip] = useState('');
  const [isRemoteCA, setIsRemoteCA] = useState(false);

  // 包装信息
  const [packages, setPackages] = useState([
    { id: 1, l: '', w: '', h: '', weight: '', qty: 1, isCrate: false }
  ]);

  // 财务参数 (与原版 V1 公式对齐: × 防损倍数 × 折扣倍数 ÷ 推演汇率)
  const [purchaseCost, setPurchaseCost] = useState('');
  const [damageMultiplier, setDamageMultiplier] = useState('2.0');   // 防损倍数 (运输损坏补发)
  const [discountMultiplier, setDiscountMultiplier] = useState('1.2'); // 折扣倍数 (客户折扣回扣)
  const [exchangeRate, setExchangeRate] = useState('6.2');           // 推演汇率 (固定 6.2 预留空间)
  const [currentPriceUSD, setCurrentPriceUSD] = useState('');         // 可选 - 当前网站售价

  // 运费对账
  const [actualCarrierId, setActualCarrierId] = useState('');
  const [actualAmount, setActualAmount] = useState('');

  // 本地持久化
  useEffect(() => {
    try {
      const saved = localStorage.getItem('financeCalc_v3');
      if (saved) {
        const s = JSON.parse(saved);
        if (s.exchangeRate) setExchangeRate(s.exchangeRate);
        if (s.damageMultiplier) setDamageMultiplier(s.damageMultiplier);
        if (s.discountMultiplier) setDiscountMultiplier(s.discountMultiplier);
        if (s.targetCN) setTargetCN(s.targetCN);
      }
    } catch(e) {}
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem('financeCalc_v3', JSON.stringify({
        exchangeRate, damageMultiplier, discountMultiplier, targetCN
      }));
    } catch(e) {}
  }, [exchangeRate, damageMultiplier, discountMultiplier, targetCN]);

  // 派生状态
  const country = CN_TO_REGION[targetCN] || null; // null = 只能走中邮
  const region = regionMode === 'auto' ? usZipToRegion(usZip) : regionMode;

  const validPackages = useMemo(() => {
    return packages.filter(p => p.l > 0 && p.w > 0 && p.h > 0).map(p => ({
      ...p,
      l: parseFloat(p.l), w: parseFloat(p.w), h: parseFloat(p.h),
      weight: parseFloat(p.weight) || 0,
      qty: parseInt(p.qty) || 1
    }));
  }, [packages]);

  const hasInput = validPackages.length > 0;
  const totalQty = validPackages.reduce((s, p) => s + p.qty, 0);

  // 构造 boxes 用于计算
  const boxes = useMemo(() => {
    return validPackages.map(p => ({
      dims: [p.l, p.w, p.h],
      weight: p.weight,
      qty: p.qty,
      isCrate: !!p.isCrate,
      surchargeBuffer: p.isCrate ? CRATE_BUFFER : PACK_BUFFER
    }));
  }, [validPackages]);

  // 全渠道运费
  const allCarriers = useMemo(() => {
    if (!hasInput) return [];
    const results = evaluateAll(boxes, country, {
      region, zip: auZip, isRemote: isRemoteCA, targetCN
    });
    // 排序: 有效的按价格升序 + 无效的放最后
    const valid = results.filter(r => r.valid !== false && isFinite(r.totalCost));
    const invalid = results.filter(r => r.valid === false || !isFinite(r.totalCost));
    valid.sort((a, b) => a.totalCost - b.totalCost);
    return [...valid, ...invalid];
  }, [boxes, country, region, auZip, isRemoteCA, targetCN, hasInput]);

  const cheapest = allCarriers.find(r => r.valid !== false && isFinite(r.totalCost)) || null;

  // 财务分析: (产品成本 + 推演运费 + 木箱费) × 防损 × 折扣 ÷ 推演汇率
  const finance = useMemo(() => {
    const pc = parseFloat(purchaseCost) || 0;
    const rate = parseFloat(exchangeRate) || 6.2;
    const dam = parseFloat(damageMultiplier) || 2.0;
    const disc = parseFloat(discountMultiplier) || 1.2;
    const totalMultiplier = dam * disc;  // 等价于原版 2.4
    const curPrice = parseFloat(currentPriceUSD) || 0;

    const totalProductCost = pc * totalQty;

    // 木箱制造费 (per piece × qty) - 仅木箱包装
    const calcCrateCost = (l, w, h) => {
      const surface = 2 * (l*w + l*h + w*h);
      return (surface / 10000) * 44;
    };
    let totalCrateCost = 0;
    validPackages.forEach(p => {
      if (p.isCrate) totalCrateCost += calcCrateCost(p.l, p.w, p.h) * p.qty;
    });

    // 推演运费
    const deducedShipping = hasInput ? calcDeducedShipping(boxes) : null;
    const shippingForPricing = deducedShipping ? deducedShipping.total : 0;

    // 综合成本基数
    const baseCost = totalProductCost + shippingForPricing + totalCrateCost;
    const suggestedTotalUSD = (baseCost * totalMultiplier) / rate;
    const suggestedUnitUSD = totalQty > 0 ? suggestedTotalUSD / totalQty : 0;

    // 校验当前售价
    let priceStatus = null;
    if (curPrice > 0 && suggestedUnitUSD > 0) {
      const ratio = curPrice / suggestedUnitUSD;
      if (ratio >= 0.97) priceStatus = { color:'good', text:`售价合理 (${(ratio*100).toFixed(0)}% × 建议)` };
      else if (ratio >= 0.9) priceStatus = { color:'warn', text:`略低于建议 (差 ${((1-ratio)*100).toFixed(1)}%)` };
      else priceStatus = { color:'bad', text:`低于建议太多 (差 ${((1-ratio)*100).toFixed(1)}%) 需调价` };
    }

    // 每个承运商: 节省/利润分析
    const carrierAnalysis = allCarriers.map(c => {
      const valid = c.valid !== false && isFinite(c.totalCost);
      const freight = valid ? c.totalCost : 0;
      const revPerOrder = (curPrice > 0 ? curPrice : suggestedUnitUSD) * totalQty * rate;
      const cogs = totalProductCost + freight + totalCrateCost;
      const profit = revPerOrder - cogs;
      const savings = shippingForPricing - freight;
      return {
        ...c,
        valid,
        freight,
        savings,
        profit,
        margin: revPerOrder > 0 ? (profit / revPerOrder) * 100 : 0,
        status: !valid ? 'invalid' : (savings >= 0 ? 'good' : 'warn')
      };
    });

    return {
      totalProductCost, totalCrateCost, deducedShipping,
      shippingForPricing, baseCost,
      suggestedTotalUSD, suggestedUnitUSD,
      priceStatus, currentPriceUSD: curPrice,
      damageMult: dam, discountMult: disc, totalMultiplier,
      exchangeRate: rate,
      hasFinance: pc > 0,
      hasCurrentPrice: curPrice > 0,
      carrierAnalysis
    };
  }, [allCarriers, purchaseCost, exchangeRate, damageMultiplier, discountMultiplier, currentPriceUSD, totalQty, validPackages, boxes, hasInput]);

  // 运费对账分析
  const reconcile = useMemo(() => {
    const actual = parseFloat(actualAmount) || 0;
    if (!actualCarrierId || actual <= 0) return null;
    const expected = allCarriers.find(c => c.carrierId === actualCarrierId);
    if (!expected || !isFinite(expected.totalCost)) return null;
    const diff = actual - expected.totalCost;
    const diffPct = expected.totalCost > 0 ? (diff / expected.totalCost) * 100 : 0;
    let status = 'good';
    if (Math.abs(diffPct) > 10) status = 'bad';
    else if (Math.abs(diffPct) > 3) status = 'warn';
    return { expected: expected.totalCost, actual, diff, diffPct, carrierName: expected.name, status };
  }, [actualCarrierId, actualAmount, allCarriers]);

  // 包装更新
  const updatePkg = (id, key, val) => setPackages(prev => prev.map(p => p.id === id ? {...p, [key]: val} : p));
  const addPkg = () => setPackages(prev => [...prev, { id: Math.max(...prev.map(p => p.id), 0) + 1, l: '', w: '', h: '', weight: '', qty: 1, isCrate: false }]);
  const delPkg = (id) => setPackages(prev => prev.length > 1 ? prev.filter(p => p.id !== id) : prev);

  // 复制文本
  const csInstructionText = (cheapest && hasInput) ? buildCSText({
    orderNumber, sku, targetCN, packages: validPackages, cheapest, allCarriers, region
  }) : '';

  // 给美工的售价建议
  const designInstructionText = (finance.hasFinance) ? buildDesignText({
    sku,
    suggestedUnitUSD: finance.suggestedUnitUSD,
    currentPriceUSD: finance.currentPriceUSD,
    totalQty,
    baseCost: finance.baseCost,
    damageMult: finance.damageMult,
    discountMult: finance.discountMult,
    exchangeRate: finance.exchangeRate,
    deducedShipping: finance.deducedShipping
  }) : '';

  return (
    <div className="min-h-screen pb-12">
      <Header />
      <div className="max-w-6xl mx-auto px-4 sm:px-6 mt-6 space-y-5">
        <NotesCard kind="finance" />
        <OrderCard {...{orderNumber, setOrderNumber, sku, setSku, targetCN, setTargetCN, country, usZip, setUsZip, regionMode, setRegionMode, auZip, setAuZip, isRemoteCA, setIsRemoteCA, region}} />
        <PackagesCard {...{packages, validPackages, totalQty, updatePkg, addPkg, delPkg}} />
        <FinanceCard {...{purchaseCost, setPurchaseCost, damageMultiplier, setDamageMultiplier, discountMultiplier, setDiscountMultiplier, exchangeRate, setExchangeRate, currentPriceUSD, setCurrentPriceUSD, totalProductCost: finance.totalProductCost, totalCrateCost: finance.totalCrateCost}} />

        {hasInput && (
          <>
            <Divider />
            <ResultSummary {...{cheapest, finance, totalQty, currentPriceUSD}} />
            <CarrierTable {...{carriers: finance.carrierAnalysis, financeOn: finance.hasFinance, hasCurrentPrice: finance.hasCurrentPrice, totalQty}} />
            <ActionCards {...{cheapest, finance, csText: csInstructionText, designText: designInstructionText, orderNumber, totalQty}} />
            <Divider />
            <ReconcileCard {...{allCarriers, actualCarrierId, setActualCarrierId, actualAmount, setActualAmount, reconcile}} />
          </>
        )}

        {!hasInput && <PromptCard />}

// ============================================================
// 文本生成 (给客服/美工)
// ============================================================
function buildCSText({ orderNumber, sku, targetCN, packages, cheapest, allCarriers, region }) {
  const orderPart = orderNumber ? `订单 ${orderNumber}` : 'SKU ' + (sku || '待填');
  const top3 = allCarriers.filter(c => c.valid !== false && isFinite(c.totalCost)).slice(0, 3);
  const lines = [];
  lines.push(`【发货指令】${orderPart}`);
  lines.push(``);
  lines.push(`目的地：${targetCN}${region ? ` (${region === 'east' ? '美东' : region === 'mid' ? '美中' : region === 'west' ? '美西' : ''})` : ''}`);
  lines.push(`包装：${packages.map((p, i) => `${i+1}# ${p.l}×${p.w}×${p.h}cm × ${p.qty}件 (${p.weight || '?'}kg, ${p.isCrate ? '木箱' : '纸箱'})`).join('  ')}`);
  lines.push(``);
  lines.push(`✓ 请使用「${cheapest.name}」发货`);
  lines.push(`预估运费：¥${fmt(cheapest.totalCost)} (计费重 ${cheapest.billWeight}kg)`);
  if (top3.length > 1) {
    lines.push(``);
    lines.push(`备选方案 (按价格排序):`);
    top3.slice(1).forEach((c, i) => {
      lines.push(`  ${i+2}. ${c.name} ¥${fmt(c.totalCost)} (贵 ¥${fmt(c.totalCost - cheapest.totalCost)})`);
    });
  }
  return lines.join('\n');
}

function buildDesignText({ sku, suggestedUnitUSD, currentPriceUSD, totalQty, baseCost, damageMult, discountMult, exchangeRate, deducedShipping }) {
  const lines = [];
  lines.push(`【建议售价】${sku ? `SKU ${sku}` : '新品'}`);
  lines.push(``);
  if (currentPriceUSD > 0) {
    const diff = suggestedUnitUSD - currentPriceUSD;
    const pct = (diff / currentPriceUSD * 100);
    lines.push(`当前售价：$${currentPriceUSD.toFixed(2)}`);
    lines.push(`建议售价：$${suggestedUnitUSD.toFixed(2)}`);
    lines.push(``);
    if (diff > 0.01) {
      lines.push(`⚠ 建议调价：当前低于建议 $${Math.abs(diff).toFixed(2)} (${pct.toFixed(1)}%)`);
      lines.push(`  建议提价至 $${suggestedUnitUSD.toFixed(2)} 或以上`);
    } else {
      lines.push(`✓ 当前售价已达标 (高于建议 ${Math.abs(pct).toFixed(1)}%)`);
    }
  } else {
    lines.push(`✓ 建议单件售价：$${suggestedUnitUSD.toFixed(2)}`);
    if (totalQty > 1) lines.push(`  (共 ${totalQty} 件，总价 $${(suggestedUnitUSD * totalQty).toFixed(2)})`);
  }
  lines.push(``);
  if (deducedShipping) {
    lines.push(`推演运费 (${deducedShipping.type})：¥${fmtNum(deducedShipping.total)}`);
    lines.push(`  ${deducedShipping.formula}`);
  }
  lines.push(``);
  lines.push(`公式：综合成本 ¥${fmtNum(baseCost)}`);
  lines.push(`     × ${damageMult.toFixed(1)} (防损补发)`);
  lines.push(`     × ${discountMult.toFixed(1)} (${((discountMult-1)*100).toFixed(0)}% 折扣预留)`);
  lines.push(`     ÷ ${exchangeRate} (推演汇率)`);
  lines.push(`     = $${(baseCost * damageMult * discountMult / exchangeRate).toFixed(2)}`);
  return lines.join('\n');
}

function fmtNum(n) { return isFinite(n) ? Math.round(n).toLocaleString() : '-'; }
