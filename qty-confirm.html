<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数量核实跟进 · JANEDECOR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#f7f7f4;--card:#fff;--border:#e7e5e0;--text:#1c1a17;--sec:#6b6660;--ter:#9c9690;
        --accent:#2563eb;--ok:#16a34a;--warn:#f59e0b;--danger:#dc2626;--revise:#7c3aed;--closed:#6b7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
       background:var(--bg);color:var(--text);padding:14px;font-size:14px;}
  a{color:var(--accent);text-decoration:none;} a:hover{text-decoration:underline;}
  .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  h1{font-size:17px;display:flex;align-items:center;gap:8px;}
  .sub{font-size:11px;color:var(--ter);}
  .followup-on h1::after{content:"· 需跟单处理视图";color:var(--revise);font-size:13px;font-weight:600;margin-left:4px;}

  /* 统计卡 */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(124px,1fr));gap:8px;margin-bottom:10px;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;cursor:pointer;transition:.12s;}
  .stat:hover{border-color:var(--accent);}
  .stat.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .stat .n{font-size:21px;font-weight:700;line-height:1.1;}
  .stat .l{font-size:11px;color:var(--sec);margin-top:2px;}
  .stat.warn .n{color:var(--warn);} .stat.danger .n{color:var(--danger);}
  .stat.revise .n{color:var(--revise);} .stat.ok .n{color:var(--ok);} .stat.closed .n{color:var(--closed);}

  /* 店铺分组 */
  .shops{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .shopchip{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:14px;background:var(--card);color:var(--sec);cursor:pointer;}
  .shopchip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .shopchip b{font-weight:700;}

  /* 筛选 */
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  input[type=text],input[type=date],select{padding:7px 11px;font-size:13px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);}
  input#q{flex:1;min-width:200px;border-radius:18px;}
  .chip{padding:6px 12px;font-size:12px;border:1px solid var(--border);border-radius:16px;background:var(--card);color:var(--sec);cursor:pointer;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .chip.danger.on{background:var(--danger);border-color:var(--danger);}
  .chip.revise.on{background:var(--revise);border-color:var(--revise);}
  .btn{padding:6px 12px;font-size:12px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);cursor:pointer;}
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.followup{background:var(--revise);color:#fff;border-color:var(--revise);}
  .count{font-size:12px;color:var(--sec);margin-bottom:8px;}

  /* 列表 */
  .rows{display:flex;flex-direction:column;gap:8px;}
  .row{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;cursor:pointer;
       display:grid;grid-template-columns:130px 1fr 1.2fr 88px 96px;gap:10px;align-items:center;transition:.12s;}
  .row:hover{border-color:var(--accent);}
  .row.overdue{border-color:var(--danger);background:#fef4f4;}
  .ordno{font-weight:700;font-size:14px;}
  .ordno .shop{display:block;font-size:10.5px;color:var(--ter);font-weight:500;margin-top:1px;}
  .cust{font-size:12px;line-height:1.4;overflow:hidden;}
  .cust .em{color:var(--sec);font-size:11px;}
  .items{display:flex;flex-wrap:wrap;gap:4px;}
  .skuchip{font-size:10.5px;font-family:monospace;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1px 6px;color:var(--sec);}
  .skuchip b{color:var(--danger);}
  .dt{font-size:11px;color:var(--sec);line-height:1.4;}
  .dt .dl.over{color:var(--danger);font-weight:700;}
  .stcol{text-align:right;}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap;}
  .handler{font-size:10.5px;color:var(--ter);margin-top:3px;}
  .empty{padding:48px;text-align:center;color:var(--ter);}

  /* 编辑弹层(iframe 内固定覆盖,内部单滚动) */
  .mask{position:fixed;inset:0;background:rgba(20,18,16,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:20px;overflow-y:auto;}
  .mask.show{display:flex;}
  .modal{background:var(--card);border-radius:14px;width:min(560px,100%);padding:18px 20px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
  .modal h2{font-size:16px;margin-bottom:2px;}
  .modal .msub{font-size:12px;color:var(--sec);margin-bottom:14px;}
  .field{margin-bottom:12px;} .field label{display:block;font-size:11px;color:var(--sec);margin-bottom:4px;font-weight:600;}
  textarea{width:100%;min-height:64px;padding:8px 11px;font:inherit;font-size:13px;border:1px solid var(--border);border-radius:9px;resize:vertical;}
  .statusbtns{display:flex;gap:8px;flex-wrap:wrap;}
  .sbtn{flex:1;min-width:96px;padding:9px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--sec);text-align:center;}
  .sbtn.sel{color:#fff;}
  .sbtn[data-s=pending].sel{background:var(--warn);border-color:var(--warn);}
  .sbtn[data-s=revise].sel{background:var(--revise);border-color:var(--revise);}
  .sbtn[data-s=confirmed].sel{background:var(--ok);border-color:var(--ok);}
  .sbtn[data-s=closed].sel{background:var(--closed);border-color:var(--closed);}
  .modal-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px;}
  .modal-foot .right{display:flex;gap:8px;}
  .itembox{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 10px;font-size:12px;line-height:1.7;}

  /* toast */
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1c1a17;color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;z-index:90;opacity:0;transition:.25s;max-width:90%;}
  #toast.show{opacity:1;}
  #toast.warn{background:#b45309;} #toast.err{background:#b91c1c;} #toast.ok{background:#15803d;}

  .itemrow{display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
  .itemrow:last-child{border-bottom:none;}
  .ithumb{width:48px;height:48px;border-radius:7px;background:var(--bg);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ithumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;}
  .thumbph{font-size:18px;opacity:.4;}
  .itxt{font-size:12px;line-height:1.45;}

  /* 分页 */
  .pager{display:flex;gap:6px;justify-content:center;align-items:center;margin-top:14px;flex-wrap:wrap;}
  .pgbtn{padding:6px 11px;font-size:12px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer;}
  .pgbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
  .pgbtn:disabled{opacity:.4;cursor:default;}
  .pgdots{color:var(--ter);padding:0 2px;}

  /* 看大图灯箱(独立打开时本地用;嵌入时提到父窗口) */
  .lb{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;padding:4vh 4vw;cursor:zoom-out;}
  .lb.show{display:flex;}
  .lb img{max-width:100%;max-height:92vh;object-fit:contain;border-radius:8px;cursor:default;}
  .lb .lbx{position:fixed;top:14px;right:22px;color:#fff;font-size:30px;cursor:pointer;line-height:1;}

  @media(max-width:680px){
    .row{grid-template-columns:1fr;gap:6px;}
    .stcol{text-align:left;}
  }
</style>
</head>
<body>
  <div class="top" id="topbar">
    <h1>📦 数量核实跟进</h1>
    <span class="sub" id="refreshInfo"></span>
    <span style="flex:1"></span>
    <button class="btn followup" id="followupBtn" onclick="toggleFollowup()">🧵 需跟单处理</button>
    <button class="btn" onclick="load()">↻ 刷新</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="shops" id="shops"></div>

  <div class="controls">
    <input type="text" id="q" placeholder="🔍 订单号 / 客户邮箱">
    <span class="chip on" data-f="all" onclick="setStatus('all')">全部</span>
    <span class="chip" data-f="pending" onclick="setStatus('pending')">待处理</span>
    <span class="chip danger" data-f="overdue" onclick="setStatus('overdue')">逾期未回复</span>
    <span class="chip revise" data-f="revise" onclick="setStatus('revise')">需跟单</span>
    <span class="chip" data-f="confirmed" onclick="setStatus('confirmed')">已发货</span>
    <span class="chip" data-f="closed" onclick="setStatus('closed')">已完成</span>
    <span class="chip" data-t="all" onclick="setPreset('all')">全部时间</span>
    <span class="chip" data-t="today" onclick="setPreset('today')">今天</span>
    <span class="chip" data-t="7" onclick="setPreset('7')">近7天</span>
    <span class="chip" data-t="30" onclick="setPreset('30')">近30天</span>
    <input type="date" id="dFrom" title="创建起" onchange="applyFilterChange()">
    <span class="sub">~</span>
    <input type="date" id="dTo" title="创建止" onchange="applyFilterChange()">
  </div>
  <div class="count" id="count"></div>
  <div id="list"><div class="empty">加载中…</div></div>

  <!-- 编辑弹层 -->
  <div class="mask" id="mask" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>
  <!-- 本地看大图(仅独立打开时用;嵌入 cs-system 时提到父窗口) -->
  <div class="lb" id="localLB" onclick="closeLightbox()"><img onclick="event.stopPropagation()" alt=""><span class="lbx" onclick="closeLightbox()">✕</span></div>
  <div id="toast"></div>

<script>
/* ============ 连接(po-system 项目,与 Shopify 集成同库)============ */
const PROJECT_URL = 'https://pyfmuknvjqfwcqvbrsvw.supabase.co';
const PUB_KEY = 'sb_publishable_dFjk1WN_Hc0Te6IhXZysZg_SXvKQU4C';
const EDGE = PROJECT_URL + '/functions/v1';
const SB = supabase.createClient(PROJECT_URL, PUB_KEY);

/* 店铺 handle → 品牌(展示用;未知则显示 handle) */
const SHOP_BRAND = {
  vakkerlighting:'Vakkerlight', vkfrench:'Pinlighting', dekorfine:'Dekorfine',
  docolight:'Docos', vkwholesale:'Mooiehome', docolamp:'Docolamp',
  vakkerge:'Radilum', decormote:'Rayonshine', janedecor:'Mooijane', mooielight:'Mooielight'
};
/* 状态 → 标签回写映射(对齐 Shopify add_order_tags) */
const TAG_MAP = {
  confirmed:{tags:['确认无误'], remove:['数量待确认']},
  revise:{tags:['客户要改'], remove:['数量待确认']},
  closed:{tags:['已处理'], remove:[]}
};
const ST = {
  pending:{label:'待处理·等客户', col:'var(--warn)', bg:'rgba(245,158,11,.13)'},
  revise:{label:'客户已回复·需跟单', col:'var(--revise)', bg:'rgba(124,58,237,.12)'},
  confirmed:{label:'确认无误·按原单发货', col:'var(--ok)', bg:'rgba(22,163,74,.12)'},
  closed:{label:'已完成', col:'var(--closed)', bg:'rgba(107,114,128,.13)'}
};

let ALL=[], statusF='all', shopF='all', Q='', followup=false;
let PAGE=1, PAGE_SIZE=50;     // 分页(客户端分页,统计仍用全量)
let imgCache={};              // order_name → 行项目图缓存
let editing=null;

/* URL 参数:?me=跟进人  ?view=followup */
const qp = new URLSearchParams(location.search);
const ME = qp.get('me') || '';
if(qp.get('view')==='followup') followup=true;

const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const brandOf=h=>SHOP_BRAND[h]||h||'—';
function fmtDT(s){ if(!s)return '—'; const d=new Date(s); if(isNaN(d))return '—';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtDate(s){ if(!s)return ''; return String(s).slice(0,10); }
const isOverdue=r=>r.status==='pending' && r.reply_deadline && new Date(r.reply_deadline) < new Date();

function toast(msg,kind){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(kind?' '+kind:''); clearTimeout(t._t); t._t=setTimeout(()=>t.className='',kind==='err'||kind==='warn'?4200:2400); }

/* ============ 加载 ============ */
async function load(){
  try{
    // 分页全量拉(PostgREST 单次≤1000;循环 range 累加,统计才准),最多 5000 条
    let all=[], from=0, size=1000;
    for(let i=0;i<5;i++){
      const { data, error } = await SB.from('qty_confirmations').select('*')
        .order('created_at',{ascending:false}).range(from, from+size-1);
      if(error) throw error;
      all=all.concat(data||[]);
      if(!data || data.length<size) break;
      from+=size;
    }
    ALL=all;
    document.getElementById('refreshInfo').textContent='共 '+ALL.length+' 条 · 更新于 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    renderStats(); render();
  }catch(e){ document.getElementById('list').innerHTML='<div class="empty">加载失败:'+esc(e.message||e)+'<br><span class="sub">检查 qty_conf_read 策略 / 网络</span></div>'; }
}

/* ============ 统计卡 + 店铺分组 ============ */
function renderStats(){
  const c={total:ALL.length,pending:0,overdue:0,revise:0,confirmed:0,closed:0};
  ALL.forEach(r=>{ if(c[r.status]!=null)c[r.status]++; if(isOverdue(r))c.overdue++; });
  const cards=[
    {k:'all',n:c.total,l:'总发送',cls:''},
    {k:'pending',n:c.pending,l:'待处理',cls:'warn'},
    {k:'overdue',n:c.overdue,l:'逾期未回复',cls:'danger'},
    {k:'revise',n:c.revise,l:'客户已回复',cls:'revise'},
    {k:'confirmed',n:c.confirmed,l:'到期/确认发货',cls:'ok'},
    {k:'closed',n:c.closed,l:'已完成',cls:'closed'},
  ];
  document.getElementById('stats').innerHTML=cards.map(x=>
    `<div class="stat ${x.cls} ${statusF===x.k?'on':''}" onclick="setStatus('${x.k}')"><div class="n">${x.n}</div><div class="l">${x.l}</div></div>`).join('');

  const byShop={}; ALL.forEach(r=>{ const s=r.shop||'(无)'; byShop[s]=(byShop[s]||0)+1; });
  const shops=Object.keys(byShop).sort((a,b)=>byShop[b]-byShop[a]);
  document.getElementById('shops').innerHTML=
    `<span class="shopchip ${shopF==='all'?'on':''}" onclick="setShop('all')">全部店铺</span>`+
    shops.map(s=>`<span class="shopchip ${shopF===s?'on':''}" onclick="setShop('${esc(s)}')">${esc(brandOf(s))} <b>${byShop[s]}</b></span>`).join('');
}

function applyFilterChange(){ PAGE=1; render(); }
function setStatus(f){ statusF=f; PAGE=1; if(followup&&f!=='revise'){followup=false;syncFollowupUI();} document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',c.dataset.f===f)); renderStats(); render(); }
function setShop(s){ shopF=s; PAGE=1; renderStats(); render(); }
function setPreset(t){
  const dF=document.getElementById('dFrom'), dT=document.getElementById('dTo');
  const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(t==='all'){ dF.value=''; dT.value=''; }
  else if(t==='today'){ const n=new Date(); dF.value=fmt(n); dT.value=fmt(n); }
  else { const n=new Date(), s=new Date(Date.now()-(Number(t)-1)*86400000); dF.value=fmt(s); dT.value=fmt(n); }
  document.querySelectorAll('.chip[data-t]').forEach(c=>c.classList.toggle('on',c.dataset.t===t));
  PAGE=1; render();
}
function toggleFollowup(){ followup=!followup; PAGE=1; if(followup){statusF='revise';} else {statusF='all';} syncFollowupUI(); document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',c.dataset.f===statusF)); renderStats(); render(); }
function syncFollowupUI(){ document.body.classList.toggle('followup-on',followup); const b=document.getElementById('followupBtn'); b.textContent=followup?'← 返回全部':'🧵 需跟单处理'; }
document.getElementById('q').addEventListener('input',e=>{ Q=e.target.value.trim().toLowerCase(); PAGE=1; render(); });

/* ============ 列表渲染 ============ */
function passFilter(r){
  if(statusF==='overdue'){ if(!isOverdue(r))return false; }
  else if(statusF!=='all'){ if(r.status!==statusF)return false; }
  if(shopF!=='all' && (r.shop||'(无)')!==shopF) return false;
  if(Q){ const hit=(r.order_name||'').toLowerCase().includes(Q)||(r.customer_email||'').toLowerCase().includes(Q)||(r.customer_name||'').toLowerCase().includes(Q); if(!hit)return false; }
  const df=document.getElementById('dFrom').value, dt=document.getElementById('dTo').value;
  if(df && fmtDate(r.created_at) < df) return false;
  if(dt && fmtDate(r.created_at) > dt) return false;
  return true;
}
function itemsHtml(items){
  if(!Array.isArray(items)||!items.length) return '<span class="sub">—</span>';
  return items.map(it=>`<span class="skuchip" title="${esc(it.title||'')}">${esc(it.sku||'?')} <b>×${esc(it.quantity!=null?it.quantity:'?')}</b></span>`).join('');
}
function render(){
  let list=ALL.filter(passFilter);
  const total=list.length;
  const pages=Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(PAGE>pages) PAGE=pages; if(PAGE<1) PAGE=1;
  const start=(PAGE-1)*PAGE_SIZE;
  const pageList=list.slice(start, start+PAGE_SIZE);
  document.getElementById('count').textContent='匹配 '+total+' 条'+(pages>1?(' · 第 '+PAGE+'/'+pages+' 页'):'')+(followup?' · 交给跟单团队处理(改完标「已完成」)':'');
  const el=document.getElementById('list');
  if(!total){ el.innerHTML='<div class="empty">'+(followup?'🎉 暂无需跟单处理的记录':'没有匹配的记录')+'</div>'; return; }
  el.innerHTML='<div class="rows">'+pageList.map(r=>{
    const ov=isOverdue(r), st=ST[r.status]||ST.pending;
    const stLabel=ov?'⚠ 逾期未回复':st.label, stCol=ov?'var(--danger)':st.col, stBg=ov?'rgba(220,38,38,.12)':st.bg;
    const dlOver = r.status==='pending' && ov;
    return `<div class="row ${ov?'overdue':''}" onclick="openModal(${ALL.indexOf(r)})">
      <div class="ordno"><a href="${esc(r.admin_url||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(r.order_name||'—')} ↗</a><span class="shop">${esc(brandOf(r.shop))}</span></div>
      <div class="cust">${esc(r.customer_name||'(未填名)')}<div class="em">${esc(r.customer_email||'')}</div></div>
      <div class="items">${itemsHtml(r.items)}</div>
      <div class="dt">发信 ${fmtDate(r.email_sent_at)}<br><span class="dl ${dlOver?'over':''}">截 ${fmtDate(r.reply_deadline)}</span></div>
      <div class="stcol"><span class="pill" style="color:${stCol};background:${stBg};">${stLabel}</span><div class="handler">${r.handler?'👤 '+esc(r.handler):'未指派'}</div></div>
    </div>`;
  }).join('')+'</div>'+pagerHtml(pages);
}
function pagerHtml(pages){
  if(pages<=1) return '';
  let win=[]; for(let p=1;p<=pages;p++){ if(p===1||p===pages||Math.abs(p-PAGE)<=2) win.push(p); }
  let html='<button class="pgbtn" '+(PAGE<=1?'disabled':'')+' onclick="goPage('+(PAGE-1)+')">‹ 上一页</button>';
  let last=0; win.forEach(p=>{ if(last&&p-last>1) html+='<span class="pgdots">…</span>'; html+='<button class="pgbtn '+(p===PAGE?'on':'')+'" onclick="goPage('+p+')">'+p+'</button>'; last=p; });
  html+='<button class="pgbtn" '+(PAGE>=pages?'disabled':'')+' onclick="goPage('+(PAGE+1)+')">下一页 ›</button>';
  return '<div class="pager">'+html+'</div>';
}
function goPage(p){ PAGE=p; render(); try{ document.getElementById('list').scrollIntoView({behavior:'smooth',block:'start'}); }catch(_){ window.scrollTo(0,0); } }

/* ============ 编辑弹层 ============ */
function openModal(idx){
  const r=ALL[idx]; if(!r)return; editing={...r, _idx:idx, _newStatus:r.status, _note:r.note||'', _handler:r.handler||ME||''};
  const st=ST[r.status]||ST.pending;
  document.getElementById('modal').innerHTML=`
    <h2>${esc(r.order_name||'—')} · ${esc(brandOf(r.shop))}
      <a href="${esc(r.admin_url||'#')}" target="_blank" rel="noopener" style="font-size:12px;font-weight:500;">在 Shopify 打开 ↗</a></h2>
    <div class="msub">${esc(r.customer_name||'')} · ${esc(r.customer_email||'')} · ${esc(r.currency||'')} ${esc(r.order_total!=null?r.order_total:'')}</div>
    <div class="field"><label>触发超量商品(${r.item_count!=null?r.item_count:(r.items||[]).length} 项)· 点图看大图</label>
      <div class="itembox" id="itemBox">${(Array.isArray(r.items)&&r.items.length)?r.items.map((it,ii)=>`
        <div class="itemrow">
          <div class="ithumb" id="ithumb${ii}"><span class="thumbph">🖼</span></div>
          <div class="itxt"><b>${esc(it.sku||'?')}</b> ×<b style="color:var(--danger)">${esc(it.quantity)}</b><div class="sub">${esc(it.title||'')}</div></div>
        </div>`).join(''):'—'}</div>
      <div class="sub" id="imgStatus" style="margin-top:5px"></div></div>
    <div class="field"><label>发信 ${fmtDT(r.email_sent_at)} · 回复截止 ${fmtDT(r.reply_deadline)} ${isOverdue(r)?'<span style="color:var(--danger);font-weight:700">· 已逾期</span>':''}</label></div>
    <div class="field"><label>状态(改动会同步回写 Shopify 订单标签)</label>
      <div class="statusbtns" id="sbtns">
        <div class="sbtn" data-s="pending"  onclick="pickStatus('pending')">待处理·等客户</div>
        <div class="sbtn" data-s="revise"   onclick="pickStatus('revise')">客户要改·需跟单</div>
        <div class="sbtn" data-s="confirmed" onclick="pickStatus('confirmed')">确认无误·发货</div>
        <div class="sbtn" data-s="closed"   onclick="pickStatus('closed')">已完成</div>
      </div></div>
    <div class="field"><label>跟进人 handler</label><input type="text" id="mHandler" value="${esc(editing._handler)}" placeholder="指派/认领" style="width:100%"></div>
    <div class="field"><label>备注 / 客户诉求(转 revise 时务必写清)</label><textarea id="mNote" placeholder="客户要求改成…/ 取消多余数量 等">${esc(editing._note)}</textarea></div>
    <div class="modal-foot">
      <span class="sub" id="mWarn"></span>
      <div class="right"><button class="btn" onclick="closeModal()">取消</button><button class="btn primary" id="mSave" onclick="saveEdit()">保存并回写标签</button></div>
    </div>`;
  pickStatus(editing._newStatus);
  document.getElementById('mask').classList.add('show');
  loadOrderImages(editing);
}
function pickStatus(s){ editing._newStatus=s; document.querySelectorAll('#sbtns .sbtn').forEach(b=>b.classList.toggle('sel',b.dataset.s===s)); }
function closeModal(){ document.getElementById('mask').classList.remove('show'); editing=null; }

async function saveEdit(){
  if(!editing)return;
  const r=editing, newStatus=r._newStatus;
  const note=document.getElementById('mNote').value.trim();
  const handler=document.getElementById('mHandler').value.trim();
  const btn=document.getElementById('mSave'); btn.disabled=true; btn.textContent='保存中…';
  try{
    const patch={status:newStatus, note:note||null, handler:handler||null, updated_at:new Date().toISOString()};
    if((newStatus==='confirmed'||newStatus==='closed') && !r.resolved_at) patch.resolved_at=new Date().toISOString();
    const { error } = await SB.from('qty_confirmations').update(patch).eq('shopify_order_id', r.shopify_order_id);
    if(error) throw error;
    // 本地同步
    Object.assign(ALL[r._idx], patch);
    // 回写 Shopify 标签(best-effort;Woo 店跳过)
    let warn='';
    if(TAG_MAP[newStatus]){
      if((r.shop||'')==='mooielight'){ warn='(Woo 店,标签未回写)'; }
      else{
        try{ await writeTags(r, newStatus); }
        catch(e){ warn='状态已存,但标签回写失败:'+(e.message||e); }
      }
    }
    closeModal(); renderStats(); render();
    toast(warn? warn : '✓ 已保存并回写标签', warn?'warn':'ok');
  }catch(e){ btn.disabled=false; btn.textContent='保存并回写标签'; document.getElementById('mWarn').textContent='保存失败:'+(e.message||e); document.getElementById('mWarn').style.color='var(--danger)'; }
}

async function writeTags(r, status){
  const m=TAG_MAP[status]; if(!m)return;
  const shop=(r.shop||'').includes('.myshopify.com')? r.shop : (r.shop||'')+'.myshopify.com';
  const res=await fetch(EDGE+'/shopify-api',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+PUB_KEY},
    body:JSON.stringify({shop, action:'add_order_tags', params:{order_id:r.shopify_order_id, tags:m.tags, remove:m.remove}})
  });
  let j={}; try{ j=await res.json(); }catch(_){}
  if(!res.ok) throw new Error(j.error||j.message||('HTTP '+res.status));
  return j;
}

/* ============ 订单图(开详情时按订单号实时拉 Shopify 行项目图)============ */
async function loadOrderImages(r){
  const box=document.getElementById('itemBox'); if(!box)return;
  const status=document.getElementById('imgStatus');
  if((r.shop||'')==='mooielight'){ if(status)status.textContent='(Woo 店,暂不拉订单图)'; return; }
  if(status)status.textContent='正在拉取订单图…';
  try{
    const prods=await fetchOrderProducts(r);
    const bySku={}; prods.forEach(p=>{ if(p.sku) bySku[String(p.sku).toLowerCase()]=p.image_url; });
    (r.items||[]).forEach((it,ii)=>{
      const el=document.getElementById('ithumb'+ii); if(!el)return;
      let img = it.image_url||it.image||it.img || bySku[String(it.sku||'').toLowerCase()];
      if(!img && prods.length===1) img=prods[0].image_url; // 单品兜底
      if(img){ el.innerHTML='<img src="'+esc(img)+'" loading="lazy" data-full="'+esc(img)+'" onclick="openLightbox(this.dataset.full)">'; }
    });
    if(status)status.textContent = prods.length? '' : '未取到订单图(订单号可能与 Shopify 不一致)';
  }catch(e){ if(status)status.textContent='订单图拉取失败:'+esc(e.message||e); }
}
async function fetchOrderProducts(r){
  const key=(r.shop||'')+'|'+(r.order_name||'');
  if(imgCache[key]) return imgCache[key];
  const domain=(r.shop||'').includes('.myshopify.com')? r.shop : (r.shop||'')+'.myshopify.com';
  const base=String(r.order_name||'').trim().replace(/^#/,'');
  for(const nm of [base, '#'+base]){
    let res; try{
      res=await fetch(EDGE+'/shopify-api',{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+PUB_KEY,'apikey':PUB_KEY},
        body:JSON.stringify({shop:domain,action:'list_orders',params:{name:nm,status:'any',limit:5,auto_save:false}})});
    }catch(_){ continue; }
    if(!res.ok) continue;
    const json=await res.json().catch(()=>null);
    const arr=json&&(json.orders||json.data||[]);
    if(json&&json.ok!==false&&Array.isArray(arr)&&arr.length){
      const o=arr[0];
      const li=o.line_items||(o.raw_payload&&o.raw_payload.line_items)||[];
      const products=li.map(it=>({title:it.title||it.name||'', image_url:pickImg(it), quantity:it.quantity||1, sku:it.sku||(it.variant&&it.variant.sku)||''})).filter(p=>p.image_url||p.title);
      imgCache[key]=products; return products;
    }
  }
  imgCache[key]=[]; return [];
}
function pickImg(li){
  const c=[li.image_url,li.imageUrl,li.img,li.img_url,li.thumbnail,li.product_image,li.featured_image,li.image];
  for(const x of c){ if(typeof x==='string'&&x.trim())return x.trim(); if(x&&typeof x==='object'){const s=x.src||x.url||x.image_url; if(s)return s;} }
  return '';
}

/* ============ 看大图:嵌入 cs-system 时提到父窗口顶层;独立打开时本地显示 ============ */
function openLightbox(url){
  if(!url)return;
  if(window.parent && window.parent!==window){
    try{ window.parent.postMessage({__lightbox:{url:url}}, '*'); return; }catch(_){}
  }
  const ov=document.getElementById('localLB'); ov.querySelector('img').src=url; ov.classList.add('show'); document.body.style.overflow='hidden';
}
function closeLightbox(){ const ov=document.getElementById('localLB'); ov.classList.remove('show'); ov.querySelector('img').src=''; document.body.style.overflow=''; }

/* 初始化 */
syncFollowupUI();
if(followup){ statusF='revise'; document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',c.dataset.f==='revise')); }
document.addEventListener('keydown',e=>{ if(e.key!=='Escape')return; const lb=document.getElementById('localLB'); if(lb&&lb.classList.contains('show'))closeLightbox(); else closeModal(); });
load();
setInterval(()=>{ if(!editing && !document.getElementById('localLB').classList.contains('show')) load(); }, 120000); // 2 分钟刷新,编辑/看图时暂停
</script>
