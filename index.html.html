// ============================================================
// 跟进 / 截图 Modal
// ============================================================
// ============================================================
// 批量转交工作 Modal — 主管选源员工 + 多选记录 + 选目标员工
// ============================================================
const BatchTransferModal = ({ employees, records, user, fromUserId, setFromUserId, onClose, onTransfer }) => {
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [filterSite, setFilterSite] = useState('');
  const [targetUserId, setTargetUserId] = useState('');
  
  // 候选源员工列表
  const candidateEmployees = employees.filter(e => e.role !== 'finance');
  
  // 当前选中员工的活跃工作
  const sourceRecords = useMemo(() => {
    if (!fromUserId) return [];
    return records.filter(r => 
      r.ownerId === fromUserId && !r.deleted && r.status !== 'resolved'
    ).sort((a, b) => {
      const aDate = a.nextFollowUp || '9999';
      const bDate = b.nextFollowUp || '9999';
      return aDate.localeCompare(bDate);
    });
  }, [records, fromUserId]);
  
  // 按 site 分组
  const sites = useMemo(() => [...new Set(sourceRecords.map(r => r.site).filter(Boolean))].sort(), [sourceRecords]);
  
  const filteredRecords = useMemo(() => {
    if (!filterSite) return sourceRecords;
    return sourceRecords.filter(r => r.site === filterSite);
  }, [sourceRecords, filterSite]);
  
  const toggleSelect = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };
  
  const toggleAll = () => {
    if (selectedIds.size === filteredRecords.length) {
      setSelectedIds(new Set());
    } else {
      setSelectedIds(new Set(filteredRecords.map(r => r.id)));
    }
  };
  
  // 按网站一键全选
  const selectBySite = (site) => {
    const ids = sourceRecords.filter(r => r.site === site).map(r => r.id);
    setSelectedIds(new Set(ids));
  };
  
  const handleSubmit = () => {
    if (!targetUserId) { alert('请选择目标员工'); return; }
    if (selectedIds.size === 0) { alert('请勾选要转交的记录'); return; }
    if (!confirm(`确认将 ${selectedIds.size} 单工作转交给 ${employees.find(e => e.id === targetUserId)?.name}？`)) return;
    onTransfer([...selectedIds], targetUserId);
  };
  
  const today = todayISO();
  
  return (
    <div onClick={onClose}
      style={{position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:'white', borderRadius:'var(--radius-lg)', maxWidth:900, width:'100%', maxHeight:'90vh', display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* 头部 */}
        <div style={{padding:'18px 24px', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div className="font-display" style={{fontSize:18, fontWeight:600, letterSpacing:'-.022em'}}>🔄 批量转交工作</div>
            <div style={{fontSize:12, color:'var(--ink-3)', marginTop:4}}>
              选择源员工 → 勾选要转的工作（可按网站筛选）→ 选目标员工 → 一键转交
            </div>
          </div>
          <button className="btn-sec" onClick={onClose} style={{padding:'4px 12px'}}>×</button>
        </div>
        
        {/* Step 1: 选源员工 */}
        <div style={{padding:'14px 24px', borderBottom:'1px solid var(--line)', background:'var(--bg-soft)'}}>
          <div style={{fontSize:12, fontWeight:600, color:'var(--ink-3)', marginBottom:8}}>
            Step 1 · 选择源员工（要转出工作的人）
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
            {candidateEmployees.map(emp => {
              const workload = records.filter(r => r.ownerId === emp.id && !r.deleted && r.status !== 'resolved').length;
              const isSelected = fromUserId === emp.id;
              return (
                <button key={emp.id}
                  onClick={() => { setFromUserId(emp.id); setSelectedIds(new Set()); setFilterSite(''); }}
                  style={{
                    padding:'6px 12px', borderRadius:8,
                    border: '1px solid ' + (isSelected ? 'var(--accent)' : 'var(--line)'),
                    background: isSelected ? 'var(--accent-soft)' : 'white',
                    color: isSelected ? 'var(--accent)' : 'var(--ink-2)',
                    cursor:'pointer', fontSize:12, fontFamily:'inherit',
                    fontWeight: isSelected ? 600 : 400,
                  }}>
                  {emp.name}{emp.alias ? ' ' + emp.alias : ''}
                  <span style={{marginLeft:6, color: workload > 8 ? 'var(--bad)' : 'var(--ink-4)', fontSize:10}}>
                    {workload}单
                  </span>
                </button>
              );
            })}
          </div>
        </div>
        
        {/* Step 2: 勾选工作（按网站筛选） */}
        {fromUserId && (
          <>
            <div style={{padding:'14px 24px', borderBottom:'1px solid var(--line)'}}>
              <div style={{fontSize:12, fontWeight:600, color:'var(--ink-3)', marginBottom:8}}>
                Step 2 · 勾选要转的工作（共 {sourceRecords.length} 单）
              </div>
              {sites.length > 0 && (
                <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:8}}>
                  <span style={{fontSize:11, color:'var(--ink-3)'}}>按网站筛选：</span>
                  <button onClick={() => setFilterSite('')}
                    style={{padding:'3px 8px', borderRadius:6, border:'1px solid ' + (filterSite === '' ? 'var(--accent)' : 'var(--line)'), background: filterSite === '' ? 'var(--accent-soft)' : 'white', color:'var(--ink-2)', fontSize:11, cursor:'pointer'}}>
                    全部 ({sourceRecords.length})
                  </button>
                  {sites.map(s => {
                    const n = sourceRecords.filter(r => r.site === s).length;
                    return (
                      <button key={s} onClick={() => setFilterSite(s)}
                        style={{padding:'3px 8px', borderRadius:6, border:'1px solid ' + (filterSite === s ? 'var(--accent)' : 'var(--line)'), background: filterSite === s ? 'var(--accent-soft)' : 'white', color:'var(--ink-2)', fontSize:11, cursor:'pointer'}}>
                        {s} ({n})
                        <span onClick={(e) => { e.stopPropagation(); selectBySite(s); }}
                          style={{marginLeft:6, padding:'1px 5px', borderRadius:4, background:'var(--gold)', color:'white', fontSize:9, fontWeight:600}}
                          title="一键选中这个网站的所有">
                          全选
                        </span>
                      </button>
                    );
                  })}
                </div>
              )}
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <button onClick={toggleAll} style={{padding:'4px 10px', borderRadius:6, border:'1px solid var(--line)', background:'white', color:'var(--ink-2)', fontSize:11, cursor:'pointer'}}>
                  {selectedIds.size === filteredRecords.length && filteredRecords.length > 0 ? '☑ 取消全选' : '☐ 全选当前列表'}
                </button>
                <span style={{fontSize:12, color:'var(--accent)', fontWeight:600}}>
                  已选 {selectedIds.size} 单
                </span>
              </div>
            </div>
            
            {/* 工作列表 */}
            <div style={{flex:1, overflow:'auto', maxHeight:350}}>
              {filteredRecords.length === 0 ? (
                <div style={{textAlign:'center', padding:'40px', color:'var(--ink-4)', fontSize:13}}>
                  {sourceRecords.length === 0 ? '该员工没有未完成的工作' : '该网站下没有工作'}
                </div>
              ) : (
                filteredRecords.map(r => {
                  const checked = selectedIds.has(r.id);
                  const isOverdue = r.nextFollowUp && r.nextFollowUp < today;
                  return (
                    <label key={r.id} onClick={() => toggleSelect(r.id)}
                      style={{display:'flex', alignItems:'center', gap:10, padding:'10px 24px', borderBottom:'1px solid var(--line)', cursor:'pointer', background: checked ? 'var(--accent-soft)' : 'white', fontSize:13}}>
                      <input type="checkbox" checked={checked} readOnly style={{cursor:'pointer', accentColor:'var(--accent)'}} />
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                          <span style={{fontWeight:600}}>{r.orderRef || r.customer || '(无订单号)'}</span>
                          {r.customer && r.orderRef && <span style={{color:'var(--ink-3)', fontSize:11}}>· {r.customer}</span>}
                          {r.site && <span className="tag" style={{fontSize:10, padding:'1px 6px'}}>{r.site}</span>}
                          {isOverdue && <span style={{color:'var(--bad)', fontSize:11, fontWeight:600}}>逾期</span>}
                        </div>
                        {r.note && <div style={{color:'var(--ink-3)', fontSize:11, marginTop:2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>💬 {r.note}</div>}
                      </div>
                      <div style={{fontSize:11, color:'var(--ink-3)', flexShrink:0}}>
                        下次跟进：{r.nextFollowUp || '未设'}
                      </div>
                    </label>
                  );
                })
              )}
            </div>
          </>
        )}
        
        {/* Step 3: 选目标员工 + 提交 */}
        {fromUserId && selectedIds.size > 0 && (
          <div style={{padding:'14px 24px', borderTop:'1px solid var(--line)', background:'var(--bg-soft)'}}>
            <div style={{fontSize:12, fontWeight:600, color:'var(--ink-3)', marginBottom:8}}>
              Step 3 · 选目标员工
            </div>
            <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}}>
              {candidateEmployees.filter(e => e.id !== fromUserId).map(emp => {
                const workload = records.filter(r => r.ownerId === emp.id && !r.deleted && r.status !== 'resolved').length;
                const isSelected = targetUserId === emp.id;
                return (
                  <button key={emp.id}
                    onClick={() => setTargetUserId(emp.id)}
                    style={{
                      padding:'6px 12px', borderRadius:8,
                      border: '1px solid ' + (isSelected ? 'var(--accent)' : 'var(--line)'),
                      background: isSelected ? 'var(--accent-soft)' : 'white',
                      color: isSelected ? 'var(--accent)' : 'var(--ink-2)',
                      cursor:'pointer', fontSize:12, fontFamily:'inherit',
                      fontWeight: isSelected ? 600 : 400,
                    }}>
                    {emp.name}{emp.alias ? ' ' + emp.alias : ''}
                    <span style={{marginLeft:6, color: workload > 8 ? 'var(--bad)' : 'var(--ink-4)', fontSize:10}}>
                      {workload}单
                    </span>
                  </button>
                );
              })}
            </div>
            <button className="btn-pri" onClick={handleSubmit} disabled={!targetUserId}
              style={{width:'100%', padding:'10px', fontSize:14, fontWeight:600, opacity: targetUserId ? 1 : 0.5}}>
              ✓ 把 {selectedIds.size} 单从 {employees.find(e => e.id === fromUserId)?.name} 转交给 {targetUserId ? employees.find(e => e.id === targetUserId)?.name : '...'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

const FollowUpModal = ({ record, onClose, onUpdate, toast, readonly = false }) => {
  const [newFollowText, setNewFollowText] = useState('');
  const [newFollowStatus, setNewFollowStatus] = useState(record.status);
  const fileInputRef = useRef(null);
  const dropZoneRef = useRef(null);

  // 粘贴图片（只读模式下禁用）
  useEffect(() => {
    if (readonly) return;
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) {
        if (it.type.indexOf('image') === 0) {
          const file = it.getAsFile();
          handleFile(file);
          e.preventDefault();
        }
      }
    };
    window.addEventListener('paste', handlePaste);
    return () => window.removeEventListener('paste', handlePaste);
  }, [record, readonly]);

  const handleFile = (file) => {
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) {
      toast('⚠ 图片过大 (>3MB)，请压缩后再上传');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const screenshots = [...(record.screenshots || []), {
        id: uid(),
        data: e.target.result,
        name: file.name || 'screenshot.png',
        time: nowISO(),
      }];
      onUpdate({ screenshots });
      toast('✓ 截图已添加');
    };
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    dropZoneRef.current?.classList.remove('dragover');
    const file = e.dataTransfer.files?.[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  };

  const removeScreenshot = (sid) => {
    const screenshots = (record.screenshots || []).filter(s => s.id !== sid);
    onUpdate({ screenshots });
  };

  const addFollowUp = () => {
    if (!newFollowText.trim()) return;
    const followUps = [...(record.followUps || []), {
      id: uid(),
      time: nowISO(),
      text: newFollowText.trim(),
      status: newFollowStatus,
    }];
    onUpdate({ followUps, status: newFollowStatus });
    setNewFollowText('');
    toast('✓ 跟进记录已保存');
  };

  const [viewingImg, setViewingImg] = useState(null);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card paper p-6 w-full" style={{maxWidth:'780px'}} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="flex items-center gap-2">
              <span className="font-display text-lg font-bold">跟进 & 截图</span>
              {readonly && <span className="tag" style={{background:'rgba(168,168,160,0.18)', color:'var(--ink-3)', fontSize:'10px'}}>🔒 历史只读</span>}
            </div>
            <div className="text-xs font-mono mt-0.5" style={{color:'var(--ink-3)'}}>
              {record.customer || '未填客户'} · {record.category || '未选事项'} · {record.date}
            </div>
          </div>
          <button className="btn-ghost" onClick={onClose}>
            <Icon name="x" className="w-5 h-5" />
          </button>
        </div>

        {/* 截图区 */}
        <div className="mb-5">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <Icon name="image" className="w-4 h-4" style={{color:'var(--accent)'}} />
              <span className="font-display text-sm font-bold">客户反馈截图 ({record.screenshots?.length || 0})</span>
            </div>
            {!readonly && (
              <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
                支持: 粘贴 / 拖拽 / 点击上传
              </span>
            )}
          </div>
          {!readonly && (
            <div
              ref={dropZoneRef}
              className="dropzone"
              onClick={() => fileInputRef.current?.click()}
              onDragOver={e => { e.preventDefault(); dropZoneRef.current?.classList.add('dragover'); }}
              onDragLeave={() => dropZoneRef.current?.classList.remove('dragover')}
              onDrop={handleDrop}
            >
              <Icon name="upload" className="w-6 h-6 mx-auto mb-1" style={{color:'var(--ink-4)'}} />
              <div className="text-xs font-bold" style={{color:'var(--ink-2)'}}>点击上传 · 拖拽至此 · Ctrl+V 粘贴</div>
              <div className="text-[10px] mt-1" style={{color:'var(--ink-4)'}}>支持 PNG/JPG，单张 ≤3MB</div>
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFile(e.target.files?.[0])} />
            </div>
          )}
          {readonly && (!record.screenshots || record.screenshots.length === 0) && (
            <div className="text-xs text-center py-4" style={{color:'var(--ink-4)'}}>无截图</div>
          )}
          {record.screenshots?.length > 0 && (
            <div className="mt-3 flex gap-2 flex-wrap">
              {record.screenshots.map(s => (
                <div key={s.id} className="relative group">
                  <img src={s.data} alt={s.name} className="thumb" onClick={() => setViewingImg(s.data)} />
                  {!readonly && (
                    <button onClick={() => removeScreenshot(s.id)}
                      className="absolute -top-1 -right-1 w-5 h-5 rounded-full text-white text-xs font-bold flex items-center justify-center opacity-0 group-hover:opacity-100"
                      style={{background:'var(--bad)', border:'1.5px solid white'}}>
                      ×
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* 跟进时间线 */}
        <div className="mb-5">
          <div className="flex items-center gap-2 mb-2">
            <Icon name="calendar" className="w-4 h-4" style={{color:'var(--accent)'}} />
            <span className="font-display text-sm font-bold">跟进时间线 ({record.followUps?.length || 0})</span>
          </div>
          {record.followUps?.length > 0 && (
            <div className="space-y-2 mb-3 max-h-60 overflow-y-auto scrollbar-thin">
              {record.followUps.map(f => (
                <div key={f.id} className="rounded-lg p-3 border" style={{borderColor:'var(--line)', background:'var(--bg)'}}>
                  <div className="flex items-center justify-between mb-1">
                    <span className={`tag tag-${f.status === 'resolved' ? 'good' : f.status === 'waiting' ? 'info' : 'warn'}`}>
                      {STATUSES.find(s => s.key === f.status)?.label || f.status}
                    </span>
                    <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
                      {new Date(f.time).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}
                    </span>
                  </div>
                  <div className="text-xs leading-relaxed">{f.text}</div>
                </div>
              ))}
            </div>
          )}
          {!readonly && (
            <div className="rounded-lg p-3 border-2" style={{borderColor:'var(--accent-mid)', background:'var(--accent-soft)'}}>
              <div className="text-[10px] font-bold uppercase tracking-wider mb-1.5" style={{color:'var(--accent)'}}>+ 添加新跟进</div>
              <textarea
                value={newFollowText}
                onChange={e => setNewFollowText(e.target.value)}
                placeholder="今天联系客户的进展，例: 已联系供应商等回复 / 客户提供了照片..."
                rows="2"
                style={{background:'white'}}
              />
              <div className="mt-2 flex items-center gap-2 flex-wrap">
                <select value={newFollowStatus} onChange={e => setNewFollowStatus(e.target.value)} style={{width:'auto', padding:'4px 8px', fontSize:'11px'}}>
                  {STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
                <button className="btn-pri" onClick={addFollowUp} disabled={!newFollowText.trim()}>保存跟进</button>
              </div>
            </div>
          )}
        </div>

        {/* 下次跟进设置 */}
        <div className="pt-4 border-t flex items-center gap-3" style={{borderColor:'var(--line)'}}>
          <span className="text-xs font-bold" style={{color:'var(--ink-2)'}}>下次跟进日期:</span>
          <input disabled={readonly} type="date" value={record.nextFollowUp} onChange={e => onUpdate({nextFollowUp:e.target.value})} style={{width:'160px'}} />
          {record.nextFollowUp && !readonly && (
            <button className="btn-ghost text-[11px]" onClick={() => onUpdate({nextFollowUp:''})}>清除</button>
          )}
          {readonly && <span className="text-[11px]" style={{color:'var(--ink-4)'}}>(只读)</span>}
        </div>

        {/* 大图预览 */}
        {viewingImg && (
          <div className="modal-backdrop" style={{zIndex:60}} onClick={() => setViewingImg(null)}>
            <img src={viewingImg} alt="" style={{maxWidth:'90vw', maxHeight:'90vh', borderRadius:'8px'}} />
          </div>
        )}
      </div>
    </div>
  );
};


// ============================================================
// 数据看板 - 当天/7天/本月
// ============================================================
const DashboardModule = ({ user, employees, records }) => {
  const isAdmin = (user.role === 'admin' || user.role === 'super_admin');
  const [scope, setScope] = useState(isAdmin ? 'team' : 'me'); // me | team
  const [selectedEmpId, setSelectedEmpId] = useState(user.id);

  const live = records.filter(r => !r.deleted);

  // 过滤范围
  const scopedRecords = useMemo(() => {
    if (scope === 'me') return live.filter(r => r.ownerId === user.id);
    if (scope === 'one' && selectedEmpId) return live.filter(r => r.ownerId === selectedEmpId);
    return live; // team
  }, [scope, selectedEmpId, live, user.id]);

  const today = todayISO();
  const last7Start = addDays(today, -6);
  const monthStart = today.slice(0, 8) + '01';

  // 时段统计
  const calcRange = (startDate, endDate) => {
    const filtered = scopedRecords.filter(r => r.date >= startDate && r.date <= endDate);
    const totalEmails = filtered.length;
    const totalMins = filtered.reduce((s, r) => s + (r.durationMin || 0), 0);
    const easy = filtered.filter(r => r.difficulty === 'easy').length;
    const mid = filtered.filter(r => r.difficulty === 'mid').length;
    const hard = filtered.filter(r => r.difficulty === 'hard').length;
    const resolved = filtered.filter(r => r.status === 'resolved').length;
    const overdue = filtered.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today).length;
    return { totalEmails, totalMins, easy, mid, hard, resolved, overdue };
  };

  const todayStats = calcRange(today, today);
  const week7Stats = calcRange(last7Start, today);
  const monthStats = calcRange(monthStart, today);

  // 7天每天柱状图数据
  const daily7 = useMemo(() => {
    const arr = [];
    for (let i = 6; i >= 0; i--) {
      const d = addDays(today, -i);
      const recs = scopedRecords.filter(r => r.date === d);
      arr.push({
        date: d,
        label: d.slice(5).replace('-','/'),
        weekday: ['日','一','二','三','四','五','六'][new Date(d).getDay()],
        count: recs.length,
        mins: recs.reduce((s, r) => s + (r.durationMin || 0), 0),
      });
    }
    return arr;
  }, [scopedRecords]);

  const maxCount = Math.max(...daily7.map(d => d.count), 1);

  // 每员工本月排行 (主管视角)
  const empRanking = useMemo(() => {
    if (scope !== 'team') return null;
    return employees.map(e => {
      const recs = live.filter(r => r.ownerId === e.id && r.date >= monthStart);
      const mins = recs.reduce((s, r) => s + (r.durationMin || 0), 0);
      const easy = recs.filter(r => r.difficulty === 'easy').length;
      const mid = recs.filter(r => r.difficulty === 'mid').length;
      const hard = recs.filter(r => r.difficulty === 'hard').length;
      const resolved = recs.filter(r => r.status === 'resolved').length;
      const score = easy + mid * 2 + hard * 3;
      return { ...e, count: recs.length, mins, easy, mid, hard, resolved, score };
    }).sort((a, b) => b.score - a.score);
  }, [scope, employees, live, monthStart]);

  return (
    <div className="space-y-5 fade-in">
      {/* 范围切换 */}
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <Icon name="chart" className="w-5 h-5" style={{color:'var(--accent)'}} />
            <span className="font-display text-base font-bold">数据看板</span>
            <span className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>
              当天 · 近 7 天 · 本月
            </span>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {isAdmin && (
              <>
                <button className={`btn-sec ${scope==='team'?'!bg-[var(--accent)] !text-white !border-[var(--accent)]':''}`} onClick={() => setScope('team')}>全团队</button>
                <button className={`btn-sec ${scope==='one'?'!bg-[var(--accent)] !text-white !border-[var(--accent)]':''}`} onClick={() => setScope('one')}>指定员工</button>
                {scope === 'one' && (
                  <select value={selectedEmpId} onChange={e => setSelectedEmpId(e.target.value)} style={{width:'auto', padding:'5px 10px', fontSize:'12px'}}>
                    {employees.map(e => <option key={e.id} value={e.id}>{e.name}{e.alias && ` (${e.alias})`}</option>)}
                  </select>
                )}
              </>
            )}
            <button className={`btn-sec ${scope==='me'?'!bg-[var(--accent)] !text-white !border-[var(--accent)]':''}`} onClick={() => setScope('me')}>我的</button>
          </div>
        </div>
      </div>

      {/* 三段统计 */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <RangeCard title="今日" range={today} stats={todayStats} accent="var(--good)" />
        <RangeCard title="近 7 天" range={`${last7Start.slice(5)} → ${today.slice(5)}`} stats={week7Stats} accent="var(--info)" />
        <RangeCard title="本月" range={`${monthStart.slice(5,7)}月`} stats={monthStats} accent="var(--accent)" />
      </div>

      {/* 7天每天柱状图 */}
      <div className="paper rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="font-display text-sm font-bold">近 7 天工作量趋势</div>
            <div className="text-[10px] font-mono" style={{color:'var(--ink-3)'}}>邮件数 / 工作时长</div>
          </div>
        </div>
        <div className="flex items-end gap-2 h-44">
          {daily7.map(d => {
            const heightPct = (d.count / maxCount) * 100;
            const isToday = d.date === today;
            return (
              <div key={d.date} className="flex-1 flex flex-col items-center gap-1" style={{minWidth:'40px'}}>
                <div className="text-[10px] font-mono font-bold" style={{color: d.count > 0 ? 'var(--ink)' : 'var(--ink-4)'}}>{d.count || ''}</div>
                <div style={{
                  width:'100%',
                  height: Math.max(heightPct, 2) + '%',
                  background: isToday ? 'var(--accent)' : (d.count > 0 ? 'var(--accent-mid)' : 'var(--line-soft)'),
                  borderRadius:'4px 4px 0 0',
                  transition:'all .3s',
                  position:'relative',
                  display:'flex',
                  alignItems:'flex-end',
                  justifyContent:'center',
                }} title={`${d.count} 封 · ${fmtDuration(d.mins)}`}>
                </div>
                <div className="text-center">
                  <div className="text-[10px] font-mono font-bold" style={{color: isToday ? 'var(--accent)' : 'var(--ink-2)'}}>{d.label}</div>
                  <div className="text-[9px]" style={{color:'var(--ink-4)'}}>周{d.weekday}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 员工排行 (仅主管/全团队) */}
      {empRanking && (
        <div className="paper rounded-2xl overflow-hidden">
          <div className="p-4 border-b" style={{borderColor:'var(--line)'}}>
            <div className="flex items-center gap-2">
              <Icon name="star" className="w-4 h-4" style={{color:'var(--gold)'}} />
              <span className="font-display text-sm font-bold">本月工作量排行</span>
              <span className="text-[10px] font-mono" style={{color:'var(--ink-3)'}}>简 ×1 + 中 ×2 + 复 ×3 = 加权分</span>
            </div>
          </div>
          <div className="overflow-x-auto scrollbar-thin">
            <table>
              <thead>
                <tr>
                  <th style={{width:'40px'}}>#</th>
                  <th>员工</th>
                  <th>负责网站</th>
                  <th style={{textAlign:'right'}}>邮件数</th>
                  <th style={{textAlign:'right'}}>总时长</th>
                  <th style={{textAlign:'right'}}>简/中/复</th>
                  <th style={{textAlign:'right'}}>已解决</th>
                  <th style={{textAlign:'right'}}>加权分</th>
                </tr>
              </thead>
              <tbody>
                {empRanking.map((e, idx) => (
                  <tr key={e.id}>
                    <td>
                      <span className={`tag ${idx<3?'tag-gold':'tag-neutral'}`}>{idx+1}</span>
                    </td>
                    <td>
                      <div className="font-bold text-xs">{e.name}{e.alias && ` · ${e.alias}`}</div>
                      {(e.role === 'admin' || e.role === 'super_admin') && <div className="text-[10px]" style={{color:'var(--accent)'}}>{e.title || '主管'}</div>}
                    </td>
                    <td><span className="text-[11px]" style={{color:'var(--ink-3)'}}>{e.sites || '—'}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono font-bold">{e.count}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono">{fmtDuration(e.mins)}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono text-[11px]" style={{color:'var(--ink-3)'}}>{e.easy}/{e.mid}/{e.hard}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono font-bold" style={{color:'var(--good)'}}>{e.resolved}</span></td>
                    <td style={{textAlign:'right'}}><span className="font-mono font-bold text-base" style={{color:'var(--accent)'}}>{e.score}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

  <div className="paper rounded-2xl p-5" style={{borderLeft:`4px solid ${accent}`}}>
    <div className="flex items-center justify-between mb-3">
      <div>
        <div className="font-display text-base font-bold">{title}</div>
        <div className="text-[10px] font-mono" style={{color:'var(--ink-3)'}}>{range}</div>
      </div>
    </div>
    <div className="grid grid-cols-2 gap-3 text-sm">
      <div>
        <div className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>邮件数</div>
        <div className="font-mono font-bold text-2xl tabular-nums" style={{color:accent}}>{stats.totalEmails}</div>
      </div>
      <div>
        <div className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>总时长</div>
        <div className="font-mono font-bold text-2xl tabular-nums">{fmtDuration(stats.totalMins)}</div>
      </div>
    </div>
    <div className="mt-3 pt-3 border-t space-y-1.5 text-[11px]" style={{borderColor:'var(--line-soft)'}}>
      <div className="flex justify-between"><span style={{color:'var(--ink-3)'}}>简/中/复</span>
        <span className="font-mono"><span style={{color:'var(--good)'}}>{stats.easy}</span>/<span style={{color:'var(--gold)'}}>{stats.mid}</span>/<span style={{color:'var(--bad)'}}>{stats.hard}</span></span>
      </div>
      <div className="flex justify-between"><span style={{color:'var(--ink-3)'}}>已解决</span>
        <span className="font-mono font-bold" style={{color:'var(--good)'}}>{stats.resolved}</span></div>
      <div className="flex justify-between"><span style={{color:'var(--ink-3)'}}>逾期</span>
        <span className="font-mono font-bold" style={{color: stats.overdue > 0 ? 'var(--bad)' : 'var(--ink-4)'}}>{stats.overdue}</span></div>
    </div>
  </div>
);

// ============================================================
// 回收站
// ============================================================
const TrashModule = ({ user, employees, records, setRecords, toast }) => {
  const isAdmin = (user.role === 'admin' || user.role === 'super_admin');
  const deleted = records.filter(r => r.deleted);

  // 员工只能看自己删除的
  const visible = isAdmin ? deleted : deleted.filter(r => r.deletedBy === user.id || r.ownerId === user.id);

  const restore = (id) => {
    setRecords(prev => prev.map(r => r.id === id ? { ...r, deleted: false, deletedAt: null, deletedBy: null } : r));
    toast('✓ 已恢复');
  };

  const permaDelete = (id) => {
    if (!isAdmin) { toast('⚠ 仅主管可永久删除'); return; }
    if (!confirm('确认永久删除？此操作不可撤销！')) return;
    setRecords(prev => prev.filter(r => r.id !== id));
    toast('✗ 已永久删除');
  };

  const clearAll = () => {
    if (!isAdmin) return;
    if (!confirm(`确认永久删除全部 ${deleted.length} 条记录？此操作不可撤销！`)) return;
    setRecords(prev => prev.filter(r => !r.deleted));
    toast('✗ 已清空回收站');
  };

  return (
    <div className="space-y-5 fade-in">
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2">
            <Icon name="trash" className="w-5 h-5" style={{color:'var(--ink-3)'}} />
            <span className="font-display text-base font-bold">回收站</span>
            <span className="tag tag-neutral">{visible.length} 条</span>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-[11px]" style={{color:'var(--ink-3)'}}>
              {isAdmin ? '主管视角 · 可恢复或永久删除全部记录' : '仅显示你删除的记录 · 永久删除需主管操作'}
            </span>
            {isAdmin && visible.length > 0 && (
              <button className="btn-danger" onClick={clearAll}>清空回收站</button>
            )}
          </div>
        </div>
      </div>

      <div className="paper rounded-2xl overflow-hidden">
        <div className="overflow-x-auto scrollbar-thin">
          <table>
            <thead>
              <tr>
                <th>原日期</th>
                <th>员工</th>
                <th>客户</th>
                <th>事项</th>
                <th>备注</th>
                <th>删除时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              {visible.length === 0 ? (
                <tr><td colSpan="7" style={{textAlign:'center', padding:'30px', color:'var(--ink-3)'}}>回收站为空</td></tr>
              ) : visible.map(r => {
                const owner = employees.find(e => e.id === r.ownerId);
                return (
                  <tr key={r.id}>
                    <td><span className="font-mono text-xs">{r.date}</span></td>
                    <td>{owner?.name || '—'}</td>
                    <td><span className="text-xs">{r.customer || '—'}</span></td>
                    <td><span className="tag tag-neutral">{r.category || '—'}</span></td>
                    <td><span className="text-xs" style={{color:'var(--ink-3)'}}>{r.orderRef || r.note || '—'}</span></td>
                    <td><span className="font-mono text-[10px]" style={{color:'var(--ink-4)'}}>
                      {r.deletedAt ? new Date(r.deletedAt).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}) : '—'}
                    </span></td>
                    <td>
                      <div className="flex gap-1">
                        <button className="btn-sec" onClick={() => restore(r.id)} title="恢复">

                        </button>
                        {isAdmin && (

                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

  const [geminiTestResult, setGeminiTestResult] = useState('');
  
  // 简单加密（与 kb.html 完全一致）
  const _SECRET = 'wk2024-radilum-cs-team';
  const _xorEncrypt = (text) => {
    let r = '';
    for (let i = 0; i < text.length; i++) r += String.fromCharCode(text.charCodeAt(i) ^ _SECRET.charCodeAt(i % _SECRET.length));
    return btoa(unescape(encodeURIComponent(r)));
  };
  const _xorDecrypt = (b64) => {
    try {
      const s = decodeURIComponent(escape(atob(b64)));
      let r = '';
      for (let i = 0; i < s.length; i++) r += String.fromCharCode(s.charCodeAt(i) ^ _SECRET.charCodeAt(i % _SECRET.length));
      return r;
    } catch(e) { return ''; }
  };
  
  const loadGeminiKey = async () => {
    if (!CLOUD.client) { setGeminiStatus('❌ 云同步未启用'); return; }
    try {
      const { data } = await CLOUD.client.from('kb_team_config').select('value').eq('key', 'gemini_api_key').maybeSingle();
      if (!data) { setGeminiStatus('未配置'); return; }
      const encrypted = data.value?.encrypted || '';
      const decoded = encrypted ? _xorDecrypt(encrypted) : '';
      if (decoded) {
        setGeminiStatus(`✓ 已配置 (${decoded.slice(0,8)}...)`);
      } else {
        setGeminiStatus('未配置');
      }
    } catch(e) { setGeminiStatus('❌ 读取失败: ' + e.message); }
  };
  
  useEffect(() => { if (section === 'gemini') loadGeminiKey(); }, [section]);
  
  const saveGeminiKey = async () => {
    if (!geminiKey.trim()) { toast('⚠ 请输入 Gemini API key'); return; }

    if (!confirm('保存 Gemini API key 到云端？\n会用 XOR 加密后存储到 Supabase，所有团队成员都能使用此 key。')) return;
    try {
      const encrypted = _xorEncrypt(geminiKey.trim());
      console.log('[GEMINI] saving encrypted key, len=', encrypted.length);
      const { data, error } = await CLOUD.client.from('kb_team_config').upsert({
        key: 'gemini_api_key',
        value: { encrypted, hint: geminiKey.slice(0,8) + '...' },
        updated_at: new Date().toISOString(),
      }, { onConflict: 'key' }).select();
      if (error) {
        console.error('[GEMINI] save error:', error);

        return;
      }
      console.log('[GEMINI] saved, verifying...');
      // 立即读出来验证
      const { data: verify } = await CLOUD.client.from('kb_team_config').select('value').eq('key', 'gemini_api_key').maybeSingle();
      const encryptedBack = verify?.value?.encrypted || '';

        return;

      toast('✓ Gemini key 已加密保存 · 知识库可立即使用');

  const testGemini = async () => {

      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {

const FinanceModule = ({ user, toast }) => {

  // 监听 iframe 内的 postMessage 高度更新（让整页只有一个滚动条）
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === 'iframe-resize' && e.data?.source === 'finance') {
        // 限制 iframe 高度不超过 viewport-160（避免破坏内部 modal 的 fixed 定位）

    <div className="fade-in" style={{margin:'-20px -24px -20px'}}>

    { v:'express', label:'📦 快递' },

    { v:'sea',     label:'🚢 海运' },

  const categoryLabel = (v) => CATEGORIES.find(c => c.v === v)?.label || v;

  const loadAll = async () => {

      if (r2.error) throw r2.error;
      setCarriers(r1.data || []);
      setPayments(r2.data || []);
    } catch(e) {
      const msg = e.message || '';
      if (msg.includes('schema cache') || msg.includes('does not exist') || msg.includes('PGRST')) {
        toast('⚠ 运费表还没建好，请联系管理员跑 SQL', 'error');
      } else {
        toast('❌ 加载失败: ' + msg);

  useEffect(() => { if (cloudOn) loadAll(); }, [cloudOn]);

  const [newPayment, setNewPayment] = useState({
    carrier_id: '', category: 'express', amount: '', currency: 'CNY',

  const [editingPaymentId, setEditingPaymentId] = useState(null);
  
  // 📎 附件状态
  const [pendingAttachments, setPendingAttachments] = useState([]);  // [{name, type, size, url, path, uploading}]
  const fileInputRef = React.useRef(null);
  const dropZoneRef = React.useRef(null);
  
  // 上传单个文件到 Supabase Storage
  const uploadFile = async (file) => {
    if (!CLOUD.client) throw new Error('云同步未启用');
    const ext = file.name.split('.').pop() || 'bin';
    const safeName = file.name.replace(/[^\w.-]/g, '_').slice(0, 60);
    const path = `${new Date().toISOString().slice(0,7)}/${Date.now()}_${Math.random().toString(36).slice(2,8)}_${safeName}`;
    const { data, error } = await CLOUD.client.storage.from('freight-receipts').upload(path, file, {
      cacheControl: '3600', upsert: false, contentType: file.type,
    });
    if (error) throw error;
    const { data: urlData } = CLOUD.client.storage.from('freight-receipts').getPublicUrl(path);
    return { name: file.name, type: file.type, size: file.size, path, url: urlData.publicUrl };
  };
  
  const handleFiles = async (fileList) => {
    if (!fileList || fileList.length === 0) return;
    if (!CLOUD.client) { toast('⚠ 云同步未启用，无法上传附件'); return; }
    const files = Array.from(fileList).filter(f => {
      if (f.size > 10 * 1024 * 1024) { toast(`⚠ ${f.name} 超过 10MB 已跳过`); return false; }
      if (!f.type.startsWith('image/') && f.type !== 'application/pdf') { toast(`⚠ ${f.name} 不是图片或 PDF`); return false; }
      return true;
    });
    if (files.length === 0) return;
    
    // 先显示 uploading 状态
    const placeholders = files.map(f => ({ name: f.name, type: f.type, size: f.size, uploading: true, url: URL.createObjectURL(f) }));
    setPendingAttachments(prev => [...prev, ...placeholders]);
    
    // 并行上传
    for (let i = 0; i < files.length; i++) {
      try {
        const result = await uploadFile(files[i]);
        setPendingAttachments(prev => {
          const next = [...prev];
          const idx = next.findIndex(a => a.name === files[i].name && a.uploading);
          if (idx >= 0) next[idx] = result;
          return next;
        });
        toast(`✓ ${files[i].name} 上传完成`);
      } catch(e) {
        setPendingAttachments(prev => prev.filter(a => !(a.name === files[i].name && a.uploading)));
        toast(`❌ ${files[i].name} 上传失败: ${e.message}`);
      }
    }
  };
  
  // 粘贴板事件
  const handlePaste = (e) => {
    const items = e.clipboardData?.items || [];
    const files = [];
    for (const item of items) {
      if (item.kind === 'file') {
        const f = item.getAsFile();
        if (f) files.push(f);
      }
    }
    if (files.length > 0) {
      e.preventDefault();
      handleFiles(files);
    }
  };

      const pct = summary.totalCNY > 0 ? (a / summary.totalCNY * 100) : 0;

    }).join('');
    
    win.document.write(`<!doctype html>

const ReportModule = ({ user, employees, toast, cloudOn }) => {
  const [tab, setTab] = useState('inbox');  // inbox | mine | new | all (admin)
  const [tickets, setTickets] = useState([]);
  const [openTicket, setOpenTicket] = useState(null);
  const [draft, setDraft] = useState(null);

  const isAdmin = (user.role === 'admin' || user.role === 'super_admin');

  // 加载工单（云端优先）
  const loadTickets = async () => {
    if (cloudOn && CLOUD.client) {
      const cloud = await CLOUD.list('workspace_tickets', { order:{col:'updated_at', asc:false}, limit:500 });
      if (cloud !== null) { setTickets(cloud); return; }
    }
    setTickets(STORE.get('tickets_local', []));
  };

  useEffect(() => { loadTickets(); }, [cloudOn]);

  // 保存工单
  const saveTicket = async (ticket) => {
    const now = nowISO();
    const record = { ...ticket, id: ticket.id || uid(), updated_at: now, created_at: ticket.created_at || now };
    if (cloudOn && CLOUD.client) {
      const saved = await CLOUD.upsert('workspace_tickets', record);
      if (saved) { await loadTickets(); return record; }
      toast('⚠ 云端保存失败，已存至本地');
    }
    const local = STORE.get('tickets_local', []);
    const idx = local.findIndex(t => t.id === record.id);
    if (idx >= 0) local[idx] = record; else local.unshift(record);
    STORE.set('tickets_local', local);
    setTickets(local);
    return record;
  };

  // 新建工单
  const createTicket = async (t) => {
    const record = {
      ...t,
      created_by_id: user.id,
      created_by_name: user.name + (user.alias ? ' ' + user.alias : ''),
      status: 'pending',
      comments: [],
      attachments: t.attachments || [],
    };
    await saveTicket(record);
    setDraft(null);
    toast('✓ 工单已提交');
    setTab('mine');
  };

  // 状态变更
  const updateStatus = async (ticket, newStatus) => {
    const comment = {
      id: uid(),
      by_id: user.id,
      by_name: user.name + (user.alias ? ' ' + user.alias : ''),
      time: nowISO(),
      type: 'status',
      content: `状态变更为「${TICKET_STATUS.find(s=>s.key===newStatus)?.label}」`,
      from: ticket.status,
      to: newStatus,
    };
    const updated = { ...ticket, status: newStatus, comments: [...(ticket.comments||[]), comment] };
    if (newStatus === 'resolved' || newStatus === 'rejected') updated.resolved_at = nowISO();
    const saved = await saveTicket(updated);
    setOpenTicket(saved);
    toast(`✓ ${comment.content}`);
  };

  // 添加评论
  const addComment = async (ticket, text) => {
    if (!text.trim()) return;
    const comment = { id: uid(), by_id: user.id, by_name: user.name + (user.alias ? ' ' + user.alias : ''), time: nowISO(), type: 'comment', content: text.trim() };
    const updated = { ...ticket, comments: [...(ticket.comments||[]), comment] };
    const saved = await saveTicket(updated);
    setOpenTicket(saved);
  };

  // 删除（仅创建人或主管）
  const deleteTicket = async (id) => {
    if (!confirm('永久删除此工单？')) return;
    if (cloudOn && CLOUD.client) {
      const ok = await CLOUD.del('workspace_tickets', id);
      if (ok) await loadTickets();
    } else {
      const local = STORE.get('tickets_local', []).filter(t => t.id !== id);
      STORE.set('tickets_local', local);
      setTickets(local);
    }
    setOpenTicket(null);
    toast('已删除');
  };

  // 筛选
  const inbox = tickets.filter(t =>
    (isAdmin && t.target_id === user.id) || (isAdmin && !t.target_id && t.assignee === 'admin') ||
    (t.target_id === user.id)
  );
  const mine = tickets.filter(t => t.created_by_id === user.id);
  const all = tickets;

  const list = tab === 'inbox' ? inbox : tab === 'mine' ? mine : tab === 'all' ? all : [];
  const pendingCount = inbox.filter(t => t.status === 'pending' || t.status === 'accepted').length;
  const myPendingCount = mine.filter(t => t.status === 'pending' || t.status === 'accepted' || t.status === 'processing').length;

  return (
    <div className="space-y-5 fade-in">
      <div className="paper rounded-2xl p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-wrap">
            <button className={`tab-btn ${tab==='inbox'?'active':''}`} onClick={() => setTab('inbox')}>
              📥 我的收件箱 {pendingCount > 0 && <span className="badge">{pendingCount}</span>}
            </button>
            <button className={`tab-btn ${tab==='mine'?'active':''}`} onClick={() => setTab('mine')}>
              📤 我发起的 {myPendingCount > 0 && <span className="badge" style={{background:'var(--gold)'}}>{myPendingCount}</span>}
            </button>
            {isAdmin && (
              <button className={`tab-btn ${tab==='all'?'active':''}`} onClick={() => setTab('all')}>
                🗂 全部工单 ({tickets.length})
              </button>
            )}
          </div>
          <div className="flex items-center gap-2">
            <span className={`cloud-status ${cloudOn?'ok':'local'}`}>
              <span className="dot"></span>
              {cloudOn ? '云端协同' : '本地'}
            </span>
            <button className="btn-pri" onClick={() => setDraft({
              title:'', department:'merchandiser', priority:'mid', related_order:'',
              target_id: isAdmin ? '' : (employees.find(e => (e.role === 'admin' || e.role === 'super_admin'))?.id || ''),
              target_name:'', description:'', attachments:[]
            })}>+ 新建工单</button>
          </div>
        </div>
      </div>

      {/* 工单列表 */}
      <div className="paper rounded-2xl overflow-hidden">
        <div className="overflow-x-auto scrollbar-thin">
          <table style={{minWidth:'900px'}}>
            <thead>
              <tr>
                <th style={{width:50}}>优先级</th>
                <th style={{width:80}}>状态</th>
                <th style={{minWidth:240}}>标题</th>
                <th style={{width:90}}>对接部门</th>
                <th style={{width:100}}>发起人</th>
                <th style={{width:100}}>接收人</th>
                <th style={{width:120}}>更新时间</th>
                <th style={{width:50}}></th>
              </tr>
            </thead>
            <tbody>
              {list.length === 0 ? (
                <tr><td colSpan={8} style={{textAlign:'center', padding:'40px', color:'var(--ink-3)'}}>
                  {tab === 'inbox' ? '收件箱为空 ✨' : tab === 'mine' ? '你还没发起过工单 · 点击右上"+ 新建工单"' : '暂无工单'}
                </td></tr>
              ) : list.map(t => {
                const dept = DEPARTMENTS.find(d => d.key === t.department);
                const st = TICKET_STATUS.find(s => s.key === t.status);
                const pri = TICKET_PRIORITY.find(p => p.key === t.priority);
                return (
                  <tr key={t.id} style={{cursor:'pointer'}} onClick={() => setOpenTicket(t)}>
                    <td><span className={`tag ${pri?.cls}`} style={{fontSize:10}}>{pri?.label}</span></td>
                    <td><span className={`tag ${st?.cls}`} style={{fontSize:10}}>{st?.label}</span></td>
                    <td className="font-bold text-xs">{t.title}{t.related_order && <span className="font-mono ml-2 text-[10px]" style={{color:'var(--ink-4)'}}>· {t.related_order}</span>}</td>
                    <td className="text-xs">{dept?.icon} {dept?.label}</td>
                    <td className="text-xs" style={{color:'var(--ink-3)'}}>{t.created_by_name}</td>
                    <td className="text-xs" style={{color:'var(--ink-3)'}}>{t.target_name || '主管'}</td>
                    <td className="text-[10px] font-mono" style={{color:'var(--ink-4)'}}>{new Date(t.updated_at).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</td>
                    <td>{(t.comments?.length||0) > 0 && <span className="text-[10px]" style={{color:'var(--ink-3)'}}>💬{t.comments.length}</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* 新建 modal */}
      {draft && (
        <TicketDraftModal
          draft={draft}
          setDraft={setDraft}
          employees={employees}
          user={user}
          onCancel={() => setDraft(null)}
          onSubmit={createTicket}
        />
      )}

      {/* 查看 modal */}
      {openTicket && (
        <TicketDetailModal
          ticket={openTicket}
          user={user}
          employees={employees}
          onClose={() => setOpenTicket(null)}
          onUpdateStatus={(s) => updateStatus(openTicket, s)}
          onAddComment={(t) => addComment(openTicket, t)}
          onDelete={() => deleteTicket(openTicket.id)}
        />
      )}
    </div>
  );
};

const TicketDraftModal = ({ draft, setDraft, employees, user, onCancel, onSubmit }) => {
  const fileInputRef = useRef(null);
  const handleFile = (file) => {
    if (!file) return;
    if (file.size > 2*1024*1024) { alert('图片需小于 2MB'); return; }
    const r = new FileReader();
    r.onload = e => setDraft({ ...draft, attachments:[...(draft.attachments||[]), { id:uid(), data:e.target.result, name:file.name, time:nowISO() }] });
    r.readAsDataURL(file);
  };
  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) if (it.type.startsWith('image')) handleFile(it.getAsFile());
    };
    window.addEventListener('paste', onPaste);
    return () => window.removeEventListener('paste', onPaste);
  }, [draft]);

  const canSubmit = draft.title.trim() && draft.description.trim() && draft.target_id;

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal-card paper p-6 w-full" style={{maxWidth:680}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="font-display text-lg font-bold">📝 新建跨部门工单</div>
          <button className="btn-ghost" onClick={onCancel}><Icon name="x" className="w-5 h-5" /></button>
        </div>
        <div className="space-y-3">
          <div>
            <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>标题 *</label>
            <input value={draft.title} onChange={e => setDraft({...draft, title:e.target.value})} placeholder="例：VK6080 工厂未按时出货，客户在线追问" />
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div>
              <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>对接部门 *</label>
              <select value={draft.department} onChange={e => setDraft({...draft, department:e.target.value})}>
                {DEPARTMENTS.map(d => <option key={d.key} value={d.key}>{d.icon} {d.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>优先级</label>
              <select value={draft.priority} onChange={e => setDraft({...draft, priority:e.target.value})}>
                {TICKET_PRIORITY.map(p => <option key={p.key} value={p.key}>{p.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>关联订单号</label>
              <input value={draft.related_order} onChange={e => setDraft({...draft, related_order:e.target.value})} placeholder="可选" />
            </div>
          </div>
          <div>
            <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>接收人 * (默认发给主管)</label>
            <select value={draft.target_id} onChange={e => {
              const emp = employees.find(em => em.id === e.target.value);
              setDraft({...draft, target_id:e.target.value, target_name: emp ? emp.name + (emp.alias?' '+emp.alias:'') : ''});

const CloudSettingsCard = ({ cfg, setCfg, toast, onApply }) => {
  const [url, setUrl] = useState(cfg.url || DEFAULT_SB_URL);
  const [key, setKey] = useState(cfg.key || '');
  const [enabled, setEnabled] = useState(cfg.enabled || false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleTest = async () => {
    setTesting(true);
    setTestResult(null);
    const ok = CLOUD.init(url.trim(), key.trim());
    if (!ok) { setTestResult({ok:false, msg:CLOUD.lastError || '初始化失败'}); setTesting(false); return; }
    const res = await CLOUD.ping();
    setTestResult(res);
    setTesting(false);
  };

  const handleSave = () => {
    const nextCfg = { url: url.trim(), key: key.trim(), enabled };
    STORE.set('cloud_config', nextCfg);
    setCfg(nextCfg);
    if (enabled && url && key) {
      const ok = CLOUD.init(url.trim(), key.trim());
      if (ok) toast('☁ 云同步已启用'); else toast('⚠ 云同步配置错误');
    } else {
      CLOUD.client = null; CLOUD.enabled = false; CLOUD.status = 'local';
      toast('已切换为本地模式');

    onApply();
  };

  return (
    <div className="paper rounded-2xl p-5 mb-5">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="font-display text-base font-bold" style={{color:'var(--accent)'}}>☁ 云同步设置</div>

        </div>
        <span className={`cloud-status ${CLOUD.status}`}><span className="dot"></span>{CLOUD.status === 'ok' ? '已连接' : CLOUD.status === 'err' ? '错误' : '本地模式'}</span>
      </div>
      <div className="space-y-3">
        <div>
          <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>Supabase URL</label>
          <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxx.supabase.co" style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}} />
        </div>
        <div>
          <label className="text-[10px] font-bold uppercase" style={{color:'var(--ink-3)'}}>Anon / Publishable Key</label>
          <input value={key} onChange={e => setKey(e.target.value)} placeholder="sb_publishable_xxx 或 eyJ..." style={{fontFamily:'JetBrains Mono, monospace', fontSize:12}} type="password" />

          <label className="flex items-center gap-2 cursor-pointer text-sm">
            <input type="checkbox" checked={enabled} onChange={e => setEnabled(e.target.checked)} />

          <div className="flex gap-2">
            <button className="btn-sec text-xs" onClick={handleTest} disabled={testing || !url || !key}>{testing ? '测试中...' : '🔌 测试连接'}</button>
            <button className="btn-pri text-xs" onClick={handleSave}>💾 保存并应用</button>
          </div>
        </div>
        {testResult && (
          <div className={`p-2 rounded text-xs ${testResult.ok ? 'tag-good' : 'tag-warn'}`} style={{background: testResult.ok ? '#dcfce7' : '#fee2e2', color: testResult.ok ? '#166534' : '#991b1b'}}>

const App = () => {
  // 员工 (localStorage + 云同步备份) - 加版本号机制，代码里改了 INITIAL_EMPLOYEES 后能自动覆盖
  const EMPLOYEES_VERSION = 3;  // 改了员工资料就 +1
  const [employees, setEmployees] = useState(() => {
    const storedVer = STORE.get('employees_version', 0);
    if (storedVer < EMPLOYEES_VERSION) {
      // 版本升级 → 合并 INITIAL_EMPLOYEES 的新数据（按 id），但保留用户自己添加的员工
      const stored = STORE.get('employees', []);
      const merged = INITIAL_EMPLOYEES.map(initial => {
        const old = stored.find(e => e.id === initial.id);
        // 强制用 INITIAL_EMPLOYEES 的 name/alias/sites/role（覆盖 localStorage），但保留用户改过的密码
        return old ? { ...initial, password: old.password || initial.password } : initial;
      });
      // 加上用户自己添加的（不在 INITIAL_EMPLOYEES 里的）
      const extras = stored.filter(e => !INITIAL_EMPLOYEES.some(i => i.id === e.id));
      STORE.set('employees_version', EMPLOYEES_VERSION);
      return [...merged, ...extras];
    }
    return STORE.get('employees', INITIAL_EMPLOYEES);
  });
  useEffect(() => { STORE.set('employees', employees); }, [employees]);

  // 云同步配置（默认启用 + 版本号机制：URL 变化时强制更新）
  const CLOUD_CFG_VERSION = 3;  // 客服项目正确配置后的版本
  const [cloudCfg, setCloudCfg] = useState(() => {
    const saved = STORE.get('cloud_config', null);
    const savedVer = STORE.get('cloud_config_version', 0);
    // 版本号过期 / URL 不匹配 → 强制用默认（避免 PO 项目旧配置残留）
    if (!saved || savedVer < CLOUD_CFG_VERSION || saved.url !== DEFAULT_SB_URL) {
      const fresh = { url: DEFAULT_SB_URL, key: DEFAULT_SB_KEY, enabled: true };
      STORE.set('cloud_config', fresh);
      STORE.set('cloud_config_version', CLOUD_CFG_VERSION);
      return fresh;
    }
    // 即使保留旧 cfg，也强制 enabled = true（数据必须能同步）
    if (saved.enabled === false) {
      const fixed = { ...saved, enabled: true };
      STORE.set('cloud_config', fixed);
      return fixed;
    }
    return saved;
  });
  const [cloudOn, setCloudOn] = useState(false);
  const [cloudVersion, setCloudVersion] = useState(0); // 用于强制重新加载

  // 初始化云连接
  useEffect(() => {
    if (cloudCfg.enabled && cloudCfg.url && cloudCfg.key) {
      const ok = CLOUD.init(cloudCfg.url, cloudCfg.key);
      setCloudOn(ok);
      if (ok) {
        // 后台 ping
        CLOUD.ping().then(r => { if (!r.ok) setCloudOn(false); });
      }
    } else {
      setCloudOn(false);
    }
  }, [cloudCfg]);

  // 当前登录用户
  const [user, setUser] = useState(() => {
    const stored = STORE.get('current_user', null);
    if (!stored) return null;
    const emp = STORE.get('employees', INITIAL_EMPLOYEES).find(e => e.id === stored.id);
    return emp || null;
  });

  // 所有客服记录 (localStorage + 云同步)
  const [records, setRecords] = useState(() => STORE.get('cs_records', []));
  // 写入 localStorage（永久兜底）
  useEffect(() => { STORE.set('cs_records', records); }, [records]);

  // 云同步：启用时把云端记录拉下来覆盖本地视图（首次加载）
  useEffect(() => {
    if (!cloudOn || !user) return;
    (async () => {
      const cloud = await CLOUD.list('workspace_records', { order:{col:'updated_at', asc:false}, limit:1000 });
      if (cloud !== null) {
        // 合并策略：云端为准
        setRecords(cloud);
      }
    })();
  }, [cloudOn, user, cloudVersion]);

  // 写入云端（每次 records 变化，debounced）
  const recordsRef = useRef(records);
  recordsRef.current = records;
  const [cloudSyncError, setCloudSyncError] = useState(null);
  useEffect(() => {
    if (!cloudOn || !user) return;
    const t = setTimeout(async () => {
      const current = recordsRef.current;
      if (current.length === 0) return;
      try {
        const { error } = await CLOUD.client.from('workspace_records').upsert(current);
        if (error) throw error;
        setCloudSyncError(null);  // 成功，清错误
      } catch(e) {
        console.error('云端写入失败', e);
        setCloudSyncError(e.message);
      }
    }, 1500);
    return () => clearTimeout(t);
  }, [records, cloudOn, user]);

  // tab - 持久化到 localStorage，刷新后保留
  const [activeTab, setActiveTab] = useState(() => {
    // URL hash 优先 (#tab=kb)，其次 localStorage，最后按角色默认
    const hashMatch = window.location.hash.match(/tab=([a-z]+)/);
    if (hashMatch) return hashMatch[1];
    const saved = localStorage.getItem('ws_active_tab');
    if (saved) return saved;
    // 财务人员默认进入财务 tab（user 可能为 null - 未登录状态）
    if (user && user.role === 'finance') return 'finance';
    return 'cs';
  });
  // tab 切换时写入 localStorage + URL hash
  useEffect(() => {
    localStorage.setItem('ws_active_tab', activeTab);
    // 仅当 tab 不是默认才写 hash，避免普通用户看到难看的 hash
    if (activeTab !== 'cs') {
      window.history.replaceState(null, '', `#tab=${activeTab}`);
    } else if (window.location.hash.includes('tab=')) {
      window.history.replaceState(null, '', window.location.pathname);
    }
  }, [activeTab]);
  
  // 跟踪访问过的 iframe tab —— 让 iframe 保持挂载，避免切 tab 时丢数据
  const [visitedTabs, setVisitedTabs] = useState(() => {
    const s = new Set();
    // 如果初始 tab 是 iframe 类，也算访问过
    if (['finance','quote','kb'].includes(activeTab)) s.add(activeTab);
    return s;
  });
  useEffect(() => {
    if (['finance','quote','kb'].includes(activeTab) && !visitedTabs.has(activeTab)) {
      setVisitedTabs(prev => new Set([...prev, activeTab]));
    }
  }, [activeTab]);

  // Toast
  const [toast, toastNode] = useToast();

  // 通知权限
  const [notifPerm, setNotifPerm] = useState(() => {
    if (typeof Notification === 'undefined') return 'unsupported';
    return Notification.permission;
  });
  const requestNotifPerm = () => {
    if (typeof Notification === 'undefined') { toast('⚠️ 当前浏览器不支持桌面通知'); return; }
    if (Notification.permission === 'denied') { toast('⚠️ 通知已被浏览器禁用，请在浏览器设置中开启'); return; }
    Notification.requestPermission().then(p => {
      setNotifPerm(p);
      if (p === 'granted') { sendDesktopNotification('统一工作台', '✅ 桌面通知已开启', 'workspace-test'); toast('✓ 桌面通知已开启'); }
      else toast('已取消授权');
    });
  };

  // 登录
  const onLogin = (emp) => {
    setUser(emp);
    STORE.set('current_user', { id: emp.id });
    toast(`✓ 欢迎回来, ${emp.name}`);
    // 登录后若用户尚未做选择，温和地引导一次（不强弹，由用户主动点）
  };

  const onLogout = () => {
    if (!confirm('确认退出登录？')) return;
    setUser(null);
    STORE.del('current_user');
  };

  // 切换账号 - 提示输入新账号密码
  const switchAccount = (targetEmployee) => {
    const password = prompt(`切换到 ${targetEmployee.name}${targetEmployee.alias ? ' ' + targetEmployee.alias : ''} 的账号\n\n请输入该账号的密码：`);
    if (password === null) return;  // 取消
    if (!password) { alert('密码不能为空'); return; }
    if (password !== targetEmployee.password) {
      alert('❌ 密码错误');
      return;
    }
    const newUser = { ...targetEmployee };
    setUser(newUser);
    STORE.set('current_user', newUser);
    toast(`✓ 已切换到 ${newUser.name}${newUser.alias ? ' ' + newUser.alias : ''}`);
  };

  // 统计 badge
  const today = todayISO();
  const stats = useMemo(() => {
    if (!user) return { overdue:0, dueToday:0, trashCount:0, ticketInbox:0 };
    const live = records.filter(r => !r.deleted);
    const mine = (user.role === 'admin' || user.role === 'super_admin') ? live : live.filter(r => r.ownerId === user.id);
    const overdue = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today).length;
    const dueToday = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp === today).length;
    const trash = (user.role === 'admin' || user.role === 'super_admin')
      ? records.filter(r => r.deleted).length
      : records.filter(r => r.deleted && (r.deletedBy === user.id || r.ownerId === user.id)).length;
    // 工单收件箱（本地缓存计数，准确数字在 ReportModule 内）
    const tickets = STORE.get('tickets_local', []);
    const ticketInbox = tickets.filter(t => (t.target_id === user.id) && (t.status === 'pending' || t.status === 'accepted')).length;
    return { overdue, dueToday, trashCount: trash, ticketInbox };
  }, [records, user, today]);

  // 标题栏徽章: (N) 统一工作台
  useEffect(() => {
    const n = stats.overdue + stats.dueToday;
    document.title = (n > 0 ? `(${n}) ` : '') + '统一工作台';
  }, [stats.overdue, stats.dueToday]);

  // 桌面通知 - 定时检查
  useEffect(() => {
    if (!user) return;
    if (notifPerm !== 'granted') return;

    // 会话内已通知 ID（sessionStorage 保证刷新后重发）
    const notifiedKey = 'workspace_notified_ids';
    const getNotified = () => {
      try { return new Set(JSON.parse(sessionStorage.getItem(notifiedKey) || '[]')); }
      catch(e) { return new Set(); }
    };
    const saveNotified = (set) => {
      try { sessionStorage.setItem(notifiedKey, JSON.stringify([...set])); } catch(e) {}
    };

    const check = () => {
      const today = todayISO();
      const notified = getNotified();
      const live = records.filter(r => !r.deleted);
      const mine = (user.role === 'admin' || user.role === 'super_admin') ? live : live.filter(r => r.ownerId === user.id);

      // 逾期
      const overdue = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp && r.nextFollowUp < today && !notified.has('over_' + r.id));
      // 今日到期
      const dueToday = mine.filter(r => r.status !== 'resolved' && r.nextFollowUp === today && !notified.has('today_' + r.id));

      if (overdue.length > 0) {
        const r = overdue[0];
        const more = overdue.length > 1 ? `（另有 ${overdue.length - 1} 单未跟进）` : '';
        sendDesktopNotification(
          `⏰ 跟进已逾期：${r.customer || '未填客户'}`,
          `事项：${r.category || '—'}｜原定 ${r.nextFollowUp} 跟进${more}`,
          'overdue_' + r.id
        );
        overdue.forEach(o => notified.add('over_' + o.id));
      } else if (dueToday.length > 0) {
        const r = dueToday[0];
        const more = dueToday.length > 1 ? `（今日另有 ${dueToday.length - 1} 单）` : '';
        sendDesktopNotification(
          `📌 今日跟进提醒：${r.customer || '未填客户'}`,
          `事项：${r.category || '—'}｜请尽早跟进${more}`,
          'today_' + r.id
        );
        dueToday.forEach(o => notified.add('today_' + o.id));
      }
      saveNotified(notified);
    };

    // 启动后 3 秒检查一次（避免登录瞬间打扰），之后每 5 分钟检查
    const t1 = setTimeout(check, 3000);
    const t2 = setInterval(check, 5 * 60 * 1000);
    return () => { clearTimeout(t1); clearInterval(t2); };
  }, [user, records, notifPerm]);

  if (!user) {
    return <LoginScreen employees={employees} onLogin={onLogin} />;
  }

  return (
    <div className="min-h-screen">
      <TopNav user={user} activeTab={activeTab} setActiveTab={setActiveTab} onLogout={onLogout} stats={stats} notifPerm={notifPerm} requestNotifPerm={requestNotifPerm} cloudOn={cloudOn} employees={employees} switchAccount={switchAccount} />
      
      {/* 🆕 云同步状态横幅 - 失败时大红警告 */}
      {cloudOn === false && (
        <div style={{background:'#fef2f2', borderBottom:'1.5px solid #ef4444', padding:'10px 20px', textAlign:'center', fontSize:13, color:'#991b1b'}}>
          ⚠ <strong>云同步未连接</strong> · 你的数据只存在本地浏览器，换浏览器/电脑会看不到 · 
          <button onClick={() => setCloudVersion(v => v + 1)} style={{marginLeft:8, padding:'3px 10px', background:'#dc2626', color:'white', border:'none', borderRadius:6, cursor:'pointer', fontFamily:'inherit', fontSize:12}}>
            🔄 重试连接
          </button>
        </div>
      )}
      {cloudOn && cloudSyncError && (
        <div style={{background:'#fef3c7', borderBottom:'1.5px solid #f59e0b', padding:'10px 20px', textAlign:'center', fontSize:13, color:'#854d0e'}}>
          ⚠ <strong>云端写入失败</strong>：{cloudSyncError.slice(0, 100)} · 数据可能未同步到云端 · 
          <button onClick={async () => {
            try {
              const { error } = await CLOUD.client.from('workspace_records').upsert(records);
              if (error) throw error;
              setCloudSyncError(null);
              toast(`✓ 已成功上传 ${records.length} 条记录到云端`);
            } catch(e) {
              setCloudSyncError(e.message);
              alert('❌ 上传失败：' + e.message);
            }
          }} style={{marginLeft:8, padding:'3px 10px', background:'#d97706', color:'white', border:'none', borderRadius:6, cursor:'pointer', fontFamily:'inherit', fontSize:12}}>
            🔄 强制上传 ({records.length} 条)
          </button>
        </div>
      )}
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {activeTab === 'cs' && (
          <CSModule user={user} employees={employees} records={records} setRecords={setRecords} toast={toast} />
        )}
        {/* iframe 类模块用 display 切换，避免切 tab 时丢失填写的数据 */}
        {visitedTabs.has('finance') && (
          <div style={{display: activeTab === 'finance' ? 'block' : 'none'}}>
            <FinanceModule user={user} toast={toast} />
          </div>
        )}
        {visitedTabs.has('quote') && (
          <div style={{display: activeTab === 'quote' ? 'block' : 'none'}}>
            <QuoteModule user={user} employees={employees} toast={toast} cloudOn={cloudOn} />
          </div>
        )}
        {visitedTabs.has('kb') && (
          <div style={{display: activeTab === 'kb' ? 'block' : 'none'}}>
            <KbModule user={user} toast={toast} cloudOn={cloudOn} />
          </div>
        )}
        {activeTab === 'freight' && (
          <FreightModule user={user} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'report' && (
          <ReportModule user={user} employees={employees} toast={toast} cloudOn={cloudOn} />
        )}
        {activeTab === 'dashboard' && (
          <DashboardModule user={user} employees={employees} records={records} />
        )}
        {activeTab === 'trash' && (
          <TrashModule user={user} employees={employees} records={records} setRecords={setRecords} toast={toast} />
        )}
        {activeTab === 'admin' && (user.role === 'admin' || user.role === 'super_admin') && (
          <AdminModule user={user} employees={employees} setEmployees={setEmployees} toast={toast} cloudCfg={cloudCfg} setCloudCfg={setCloudCfg} onCloudApply={() => setCloudVersion(v=>v+1)} />
        )}
      </div>
      <footer style={{textAlign:'center', padding:'40px 20px', color:'var(--ink-4)', fontSize:12, fontWeight:400}}>
        统一工作台 · v2.1 · {cloudOn ? '☁ Supabase 云端协同' : '💾 本地模式'}
      </footer>
      {toastNode}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
